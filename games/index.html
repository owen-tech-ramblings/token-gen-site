<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Gen Games</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #090b12;
        color: #f4efe7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 32px 18px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }
      h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.5rem); }
      a { color: inherit; }
      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 8px;
        padding: 9px 12px;
        text-decoration: none;
        background: rgba(255,255,255,.06);
      }
      .game-card {
        display: grid;
        gap: 12px;
        padding: 18px;
        border: 1px solid rgba(209, 65, 85, .45);
        border-radius: 10px;
        background: linear-gradient(135deg, rgba(130, 13, 32, .28), rgba(26, 28, 41, .92));
      }
      .game-card h2 { margin: 0; font-size: 1.6rem; }
      .muted { color: #b7aeb2; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Games</h1>
        <nav class="nav">
          <a class="btn" href="../">Home</a>
          <a class="btn" href="../server-monitor.html">Monitor</a>
          <a class="btn" href="../chat.html">Chat</a>
        </nav>
      </header>
      <section class="game-card">
        <div>
          <h2>Vampire Survival</h2>
          <p class="muted">Parked experiment: a Token Gen/Qwen and Codex-iterated browser game where a vampire breaks Sun Reliquaries before dawn while humans escalate their defenses.</p>
        </div>
        <a class="btn" href="./vampire-survival.html">Play Vampire Survival</a>
        <a class="btn" href="./vampire-survival-parked.html">Parked Notes</a>
      </section>
    </main>
  </body>
</html>
