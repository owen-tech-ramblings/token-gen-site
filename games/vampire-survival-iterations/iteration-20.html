<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival — Iteration 20</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{image-rendering:pixelated;cursor:crosshair;display:block}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.9);z-index:10}
#menu h1{color:#cc2222;font-size:36px;text-shadow:0 0 30px #ff0000;margin-bottom:2px;letter-spacing:4px}
#menu h2{color:#666;font-size:12px;margin-bottom:14px}
#menu .info{color:#888;font-size:11px;margin:2px 0}
#menu button{margin-top:16px;padding:10px 34px;font-size:16px;font-family:monospace;background:#771111;color:#fff;border:2px solid #bb2222;cursor:pointer;letter-spacing:2px}
#menu button:hover{background:#992222}
#hs{color:#777;font-size:10px;margin-top:12px;text-align:center;line-height:1.6;max-width:300px}
#hs span{color:#cc2222}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<h1>🧛 VAMPIRE SURVIVAL</h1>
<h2>— Iteration 20 —</h2>
<div class="info">WASD/Arrows: Move &nbsp;|&nbsp; Click: Feed &nbsp;|&nbsp; Space: Dash</div>
<div class="info">Survive. Feed. Keep blood above zero.</div>
<div class="info">Humans fortify, hunt, and create sanctified zones.</div>
<button id="startBtn">AWAKEN</button>
<div id="hs"></div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W=800,H=600;
function resize(){W=C.width=Math.min(innerWidth,960);H=C.height=Math.min(innerHeight,720)}
resize();addEventListener('resize',resize);

let G={},keys={},mouse={x:0,y:0,down:false},running=false,gameOver=false;
let highScores=[];
try{highScores=JSON.parse(localStorage.getItem('vs20_hs'))||[]}catch(e){highScores=[]}
function saveHS(s,t){try{highScores.push({s,t,d:new Date().toLocaleDateString()});highScores.sort((a,b)=>b.s-a.s);highScores=highScores.slice(0,10);localStorage.setItem('vs20_hs',JSON.stringify(highScores))}catch(e){}}
function showHS(){let h=document.getElementById('hs');if(!highScores.length){h.innerHTML='<span>No scores yet</span>';return}h.innerHTML='<span>TOP SCORES</span><br>'+highScores.slice(0,5).map((e,i)=>`${i+1}. ${e.t}s | Score: ${e.s}`).join('<br>')}
showHS();

const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const rand=(a,b)=>Math.random()*(b-a)+a;
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const TAU=Math.PI*2;

let particles=[];
function emit(x,y,n,col,speed,life,size){for(let i=0;i<n;i++){let a=rand(0,TAU),s=rand(speed*.3,speed);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(life*.5,life),maxLife:life,col,sz:size||3})}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=.95;p.vy*=.95;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(let p of particles){let a=p.life/p.maxLife;X.globalAlpha=a;X.fillStyle=p.col;X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz*a+1,p.sz*a+1)}X.globalAlpha=1}

let shake={x:0,y:0,intensity:0};
function doShake(i){shake.intensity=Math.max(shake.intensity,i)}
function updateShake(dt){shake.intensity*=.88;if(shake.intensity<.1)shake.intensity=0;shake.x=(Math.random()-.5)*shake.intensity*2;shake.y=(Math.random()-.5)*shake.intensity*2}

let districts=[];
function initDistricts(){districts=[];for(let i=0;i<6;i++){let d={x:rand(40,W-220),y:rand(40,H-170),w:rand(110,200),h:rand(80,140),type:randInt(0,3),buildings:[],fortified:false,sanctified:false,sanctTimer:0,light:rand(.2,.7),name:['Old Town','Market','Church','Alley','Square','Tavern'][i]};genBuildings(d);districts.push(d)}}
function genBuildings(d){d.buildings=[];let cols=Math.floor(d.w/26),rows=Math.floor(d.h/20);for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(Math.random()<.5)d.buildings.push({x:d.x+c*26+3,y:d.y+r*20+3,w:rand(12,20),h:rand(12,16),shade:rand(.1,.3)})}}
initDistricts();

let weather={type:'clear',timer:0,intensity:0,raindrops:[],lightning:0,lightningFlash:0};
function updateWeather(dt){weather.timer-=dt;if(weather.timer<=0){weather.timer=rand(10,30);let r=Math.random();if(r<.3)weather.type='clear';else if(r<.6)weather.type='rain';else if(r<.8)weather.type='fog';else weather.type='storm'}weather.intensity=lerp(weather.intensity,weather.type==='clear'?0:weather.type==='storm'?1:.4,.012);if(weather.type==='rain'||weather.type==='storm'){for(let i=0;i<weather.intensity*3;i++)weather.raindrops.push({x:rand(0,W),y:-5,speed:rand(220,420),len:rand(6,14)});for(let i=weather.raindrops.length-1;i>=0;i--){let r=weather.raindrops[i];r.y+=r.speed*dt;r.x-=35*dt;if(r.y>H)weather.raindrops.splice(i,1)}}if(weather.type==='storm'){weather.lightning-=dt;if(weather.lightning<=0&&Math.random()<.015){weather.lightning=rand(1.5,5);weather.lightningFlash=1}}weather.lightningFlash=lerp(weather.lightningFlash||0,0,.08)}
function drawWeather(){if(weather.intensity<.05)return;if(weather.type==='fog'){X.fillStyle=`rgba(60,60,80,${weather.intensity*.2})`;X.fillRect(0,0,W,H)}if(weather.type==='rain'||weather.type==='storm'){X.strokeStyle=`rgba(120,140,180,${weather.intensity*.3})`;X.lineWidth=1;X.beginPath();for(let r of weather.raindrops){X.moveTo(r.x,r.y);X.lineTo(r.x-3,r.y+r.len)}X.stroke()}if(weather.lightningFlash>.01){X.fillStyle=`rgba(180,180,230,${weather.lightningFlash*.12})`;X.fillRect(0,0,W,H)}}

function initPlayer(){return{x:W/2,y:H/2,speed:160,blood:100,maxBlood:100,xp:0,level:1,xpNeeded:50,dashCD:0,dashTimer:0,angle:0,feedRange:44,feedCD:0,hitFlash:0,invuln:0}}

let humans=[];
const H_TYPES=['civilian','guard','hunter','elite'];
const H_COLS=['#8B7355','#556B8A','#8B4513','#4A0E0E'];
const H_ARMOR=[0,1,2,3];
function spawnHuman(){let tier=Math.min(3,Math.floor(G.time/30));let typeIdx=Math.random()<.2+tier*.2?Math.min(3,randInt(0,tier)):0;let d=districts[randInt(0,districts.length-1)];let sx=d.x+rand(15,d.w-15),sy=d.y+rand(15,d.h-15);if(Math.random()<.25){let side=randInt(0,3);if(side===0){sx=rand(20,W-20);sy=-15}else if(side===1){sx=W+15;sy=rand(20,H-20)}else if(side===2){sx=rand(20,W-20);sy=H+15}else{sx=-15;sy=rand(20,H-20)}}let h={x:sx,y:sy,type:typeIdx,tier,tierLabel:H_TYPES[typeIdx],speed:rand(30,50)+tier*10,hp:2+typeIdx*2,maxHp:2+typeIdx*2,state:'roam',stateTimer:rand(2,5),target:null,angle:rand(0,TAU),armor:H_ARMOR[typeIdx],hasTorch:typeIdx>=1&&Math.random()<.25+tier*.2,hasShield:typeIdx>=2&&Math.random()<.3,hasCross:typeIdx>=2&&Math.random()<.25,aggroRange:80+typeIdx*40+tier*20,attackCD:0,hitFlash:0,patrolTarget:null,investigateTarget:null,alertLevel:0,groupID:null,regroupTarget:null,fortifyTimer:0};humans.push(h);return h}

function updateHuman(h,dt){
h.stateTimer-=dt;h.attackCD-=dt;h.hitFlash-=dt;h.fortifyTimer-=dt;
let dx=G.player.x-h.x,dy=G.player.y-h.y,d=Math.hypot(dx,dy);
let nearPlayer=d<h.aggroRange;
if(nearPlayer){h.alertLevel=Math.min(3,h.alertLevel+.6*dt);if(h.state!=='flee'&&h.state!=='fortify')h.state=h.type>=2?'hunt':'investigate'}else{h.alertLevel=Math.max(0,h.alertLevel-.15*dt)}
if(h.state==='roam'&&h.stateTimer<=0){h.stateTimer=rand(2,6);let d2=districts[randInt(0,districts.length-1)];h.patrolTarget={x:d2.x+rand(10,d2.w-10),y:d2.y+rand(10,d2.h-10)};h.state='patrol'}
if(h.state==='patrol'&&h.patrolTarget){let pd=dist(h,h.patrolTarget);if(pd<20){h.state='roam';h.stateTimer=rand(1,4)}else{h.angle=Math.atan2(h.patrolTarget.y-h.y,h.patrolTarget.x-h.x)}}
if(h.state==='investigate'){if(!h.investigateTarget||dist(h,h.investigateTarget)<30){h.investigateTarget={x:G.player.x+rand(-100,100),y:G.player.y+rand(-100,100)};h.stateTimer=rand(2,4)}else{h.angle=Math.atan2(h.investigateTarget.y-h.y,h.investigateTarget.x-h.x)}}
if(h.state==='hunt'){h.angle=Math.atan2(dy,dx);if(d<26&&h.attackCD<=0){if(G.player.invuln<=0){G.player.blood-=1+h.tier*.5;G.player.hitFlash=.2;doShake(4);emit(G.player.x,G.player.y,6,'#ff0000',80,.4,3)}h.attackCD=.7;if(G.player.blood<=0)endGame()}}
if(h.state==='flee'){h.angle=Math.atan2(-dy,-dx);if(h.stateTimer<=0)h.state='roam'}
if(h.state==='fortify'){let d2=districts.find(dd=>dist(h,{x:dd.x+dd.w/2,y:dd.y+dd.h/2})<100);if(d2){h.fortifyTimer-=dt;if(h.fortifyTimer<=0&&!d2.fortified){d2.fortified=true;emit(d2.x+d2.w/2,d2.y+d2.h/2,10,'#888',50,.6,3)}h.state='roam';h.stateTimer=rand(3,6)}else{h.state='roam'}}
let spd=h.speed*(h.state==='flee'?1.5:h.state==='hunt'?1.2:h.state==='fortify'?.3:1);
h.x+=Math.cos(h.angle)*spd*dt;h.y+=Math.sin(h.angle)*spd*dt;
h.x=clamp(h.x,8,W-8);h.y=clamp(h.y,8,H-8);
if(h.hasTorch&&Math.random()<.06)emit(h.x+rand(-5,5),h.y+rand(-5,5),1,'#ff8800',15,.3,2);
if(h.state==='hunt'&&Math.random()<.04)emit(h.x,h.y,1,'#ff4444',20,.2,2);
}

function drawHuman(h){
let s=8+Math.floor(h.tier*1.5);
X.save();X.translate(h.x,h.y);
let col=h.hitFlash>.0?'#fff':H_COLS[h.type];
X.fillStyle=col;X.fillRect(-s/2,-s/2,s,s);
if(h.armor>0){X.fillStyle=`rgba(80,80,100,${h.armor*.2})`;X.fillRect(-s/2-1,-s/2-1,s+2,s+2)}
if(h.hasShield){X.fillStyle='#778899';X.fillRect(s/2-1,-s/2,3,s)}
if(h.hasTorch){X.fillStyle='#ff6600';X.fillRect(-s/2-3,-s/2,2,5);X.fillStyle='#ffaa00';X.fillRect(-s/2-2,-s/2-2,4,3)}
if(h.hasCross){X.fillStyle='#ffdd44';X.fillRect(-1,-s/2-6,2,8);X.fillRect(-2,-s/2-4,4,2)}
X.fillStyle=h.state==='hunt'?'#ff0000':h.alertLevel>1?'#ff8800':'#ffff00';
let ex=Math.cos(h.angle)*2,ey=Math.sin(h.angle)*2;
X.fillRect(-2+ex,-2+ey,2,2);X.fillRect(1+ex,-2+ey,2,2);
if(h.tier>0){X.fillStyle='#ff4444';for(let t=0;t<h.tier;t++)X.fillRect(-s/2+t*4,-s/2-4,3,2)}
if(h.state==='fortify'){X.strokeStyle='rgba(140,140,140,0.6)';X.lineWidth=1;X.beginPath();X.arc(0,0,s+2,0,TAU);X.stroke()}
X.restore();
}

let bloodDrops=[];
function spawnBloodDrop(x,y){bloodDrops.push({x,y,life:10+rand(0,6),maxLife:16,sz:rand(2,4)})}

let sanctZones=[];
function updateSanctified(dt){
for(let i=sanctZones.length-1;i>=0;i--){let z=sanctZones[i];z.timer-=dt;z.pulse+=dt;if(z.timer<=0){sanctZones.splice(i,1);continue}
let p=G.player;if(dist(p,z)<z.r){if(p.invuln<=0){p.blood-=dt*2.5;p.hitFlash=.1;doShake(1.5)}}
if(Math.random()<.04)emit(z.x+rand(-z.r,z.r),z.y+rand(-z.r,z.r),1,'#ffdd44',12,.3,2)}
for(let d of districts){if(d.fortified&&!d.sanctified&&G.time>35&&Math.random()<.0015){d.sanctified=true;sanctZones.push({x:d.x+d.w/2,y:d.y+d.h/2,r:55,timer:20,pulse:0})}}}

function drawSanctified(){for(let z of sanctZones){let a=.12+Math.sin(z.pulse*3)*.06;X.fillStyle=`rgba(255,220,100,${a})`;X.beginPath();X.arc(z.x,z.y,z.r,0,TAU);X.fill();X.strokeStyle=`rgba(255,220,100,${a*1.3})`;X.lineWidth=1;X.beginPath();X.arc(z.x,z.y,z.r,0,TAU);X.stroke();X.fillStyle=`rgba(255,220,100,${a*1.8})`;X.font='8px monospace';X.textAlign='center';X.fillText('✝',z.x,z.y+3)}}

function updateDistricts(dt){
for(let d of districts){
if(!d.fortified&&G.time>20){let nearHuman=humans.some(h=>dist(h,{x:d.x+d.w/2,y:d.y+d.h/2})<100&&h.tier>=1&&h.state==='fortify');if(nearHuman&&Math.random()<.003){d.fortified=true;emit(d.x+d.w/2,d.y+d.h/2,10,'#888',50,.6,3)}}
d.light=lerp(d.light,.35+Math.sin(G.time*.06+d.x)*.15,.008);
}}

function getDayNight(){let t=(G.time%120)/120;return clamp(Math.sin(t*Math.PI)*.5+.5,0,1)}

function drawBackground(){
let day=getDayNight();
let r=lerp(6,30,day),g=lerp(6,20,day),b=lerp(10,18,day);
X.fillStyle=`rgb(${r},${g},${b})`;X.fillRect(0,0,W,H);
X.fillStyle=`rgba(15,15,20,0.3)`;
for(let i=0;i<50;i++){let gx=(i*137+G.time*.03)%W,gy=(i*251)%H;X.fillRect(gx,gy,2,2)}
}

function drawDistricts(){
for(let d of districts){
X.fillStyle=`rgba(${22+d.light*15},${18+d.light*10},${16+d.light*6},0.5)`;
X.fillRect(d.x,d.y,d.w,d.h);
for(let b of d.buildings){
X.fillStyle=`rgb(${Math.floor(b.shade*50)},${Math.floor(b.shade*40)},${Math.floor(b.shade*30)})`;
X.fillRect(b.x,b.y,b.w,b.h);
if(Math.random()<.2){X.fillStyle=`rgba(255,200,100,${rand(.06,.2)})`;X.fillRect(b.x+2,b.y+2,3,3)}
}
if(d.fortified){
X.strokeStyle='rgba(130,130,130,0.4)';X.lineWidth=2;X.strokeRect(d.x,d.y,d.w,d.h);
X.fillStyle='rgba(130,130,130,0.2)';
for(let i=0;i<4;i++){let bx=d.x+i*(d.w/4)+6,by=d.y-3;X.fillRect(bx,by,6,6)}
X.fillStyle='rgba(180,180,180,0.25)';X.font='7px monospace';X.textAlign='center';X.fillText('FORTIFIED',d.x+d.w/2,d.y-5)}
if(d.sanctified){X.fillStyle='rgba(255,220,100,0.1)';X.fillRect(d.x,d.y,d.w,d.h)}
}}

function drawBloodDrops(){
for(let i=bloodDrops.length-1;i>=0;i--){
let b=bloodDrops[i];b.life-=.016;if(b.life<=0){bloodDrops.splice(i,1);continue}
let a=b.life/b.maxLife;X.fillStyle=`rgba(90,0,0,${a*.4})`;X.beginPath();X.arc(b.x,b.y,b.sz*a,0,TAU);X.fill()}}

function drawPlayer(){
let p=G.player;
X.fillStyle='rgba(0,0,0,0.2)';X.beginPath();X.ellipse(p.x,p.y+10,11,4,0,0,TAU);X.fill();
let col=p.hitFlash>.0?'#ff6666':'#2a0a2a';
X.fillStyle=col;X.fillRect(p.x-7,p.y-9,14,18);
X.fillStyle='#440022';X.beginPath();X.moveTo(p.x-7,p.y-7);X.lineTo(p.x-13,p.y+11);X.lineTo(p.x+13,p.y+11);X.lineTo(p.x+7,p.y-7);X.fill();
X.fillStyle='#ddaacc';X.fillRect(p.x-4,p.y-15,8,7);
X.fillStyle='#ff0000';X.fillRect(p.x-3,p.y-13,2,2);X.fillRect(p.x+1,p.y-13,2,2);
X.fillStyle='#fff';X.fillRect(p.x-1,p.y-8,1,2);X.fillRect(p.x+1,p.y-8,1,2);
if(p.level>1){X.fillStyle='#ffcc00';X.font='7px monospace';X.textAlign='center';X.fillText('Lv'+p.level,p.x,p.y-19)}
if(p.dashCD>0){X.strokeStyle='rgba(80,130,255,0.35)';X.lineWidth=2;X.beginPath();X.arc(p.x,p.y,16,-Math.PI/2,-Math.PI/2+TAU*(1-p.dashCD/3));X.stroke()}
if(p.invuln>0){X.strokeStyle='rgba(255,255,255,0.25)';X.lineWidth=1;X.beginPath();X.arc(p.x,p.y,14,0,TAU);X.stroke()}
}

let phaseBanner={text:'',timer:0};

function drawHUD(){
let p=G.player;
X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(6,6,200,24);
X.fillStyle='#2a0000';X.fillRect(8,8,196,20);
let bw=196*(p.blood/p.maxBlood);
X.fillStyle=p.blood<30?'#ff2222':'#cc0000';X.fillRect(8,8,bw,20);
X.strokeStyle='#550000';X.lineWidth=1;X.strokeRect(8,8,196,20);
X.fillStyle='#fff';X.font='bold 10px monospace';X.textAlign='left';
X.fillText(`BLOOD: ${Math.ceil(p.blood)}/${p.maxBlood}`,12,23);

X.textAlign='center';X.font='bold 14px monospace';X.fillStyle='#ddd';
X.fillText(`TIME: ${Math.floor(G.time)}s`,W/2,20);

X.textAlign='right';X.font='bold 12px monospace';X.fillStyle='#cc8800';
X.fillText(`SCORE: ${G.score}`,W-8,20);

X.textAlign='left';X.font='9px monospace';X.fillStyle='#aaa';
X.fillText(`Lv.${p.level} XP:${Math.floor(p.xp)}/${p.xpNeeded}`,8,40);
X.fillStyle='#2a2a2a';X.fillRect(8,44,80,3);X.fillStyle='#6644aa';X.fillRect(8,44,80*(p.xp/p.xpNeeded),3);

let phase=Math.floor(G.time/30)+1;
let phaseNames=['Dusk','Nightfall','Darkness','Blood Moon','Eclipse'];
let pn=phaseNames[Math.min(phase-1,phaseNames.length-1)];
X.textAlign='center';X.font='bold 9px monospace';
X.fillStyle=phase>=4?'#ff4444':phase>=3?'#cc6644':'#888';
X.fillText(`PHASE ${phase}: ${pn}`,W/2,40);
let phaseProg=(G.time%30)/30;
X.fillStyle='#222';X.fillRect(W/2-35,44,70,3);X.fillStyle=phase>=4?'#aa2222':'#555';X.fillRect(W/2-35,44,70*phaseProg,3);

if(weather.intensity>.1){X.textAlign='left';X.font='8px monospace';X.fillStyle='#7788aa';
X.fillText(weather.type==='storm'?'⛈ STORM':weather.type==='rain'?'🌧 RAIN':weather.type==='fog'?'🌫 FOG':'☀ CLEAR',8,H-8)}

X.textAlign='right';X.font='8px monospace';X.fillStyle='#444';
X.fillText('Iteration 20',W-8,H-8);

X.textAlign='left';X.font='8px monospace';X.fillStyle='#aa6666';
X.fillText(`Humans: ${humans.length} | Sanctified: ${sanctZones.length}`,8,H-8);

X.textAlign='center';X.font='7px monospace';X.fillStyle='#333';
X.fillText('WASD:Move | Click:Feed | Space:Dash',W/2,H-8);

if(phaseBanner.timer>0){let a=phaseBanner.timer<.5?phaseBanner.timer*2:phaseBanner.timer>2?1-(phaseBanner.timer-2):1;X.globalAlpha=a;X.fillStyle='rgba(0,0,0,0.55)';X.fillRect(W/2-130,55,260,28);X.fillStyle=phase>=4?'#ff4444':'#cc8800';X.font='bold 13px monospace';X.textAlign='center';X.fillText(phaseBanner.text,W/2,74);X.globalAlpha=1}
}

function drawBloodMoon(){
let phase=Math.floor(G.time/30)+1;
if(phase>=4){
let mx=W*.82,my=70,mr=20;
let grad=X.createRadialGradient(mx,my,0,mx,my,mr*2.5);
grad.addColorStop(0,'rgba(160,0,0,0.2)');grad.addColorStop(1,'rgba(160,0,0,0)');
X.fillStyle=grad;X.fillRect(mx-mr*2.5,my-mr*2.5,mr*5,mr*5);
X.fillStyle='#cc2222';X.beginPath();X.arc(mx,my,mr,0,TAU);X.fill();
X.fillStyle='#aa1111';X.beginPath();X.arc(mx+6,my-3,mr*.7,0,TAU);X.fill();
}}

function feed(){
let p=G.player;if(p.feedCD>0)return;
let fed=false;
for(let i=humans.length-1;i>=0;i--){
let h=humans[i];if(dist(p,h)<p.feedRange){
h.hp--;emit(h.x,h.y,6,'#cc0000',50,.4,3);spawnBloodDrop(h.x,h.y);
if(h.hp<=0){
emit(h.x,h.y,12,'#880000',80,.5,4);
p.blood=Math.min(p.maxBlood,p.blood+8+p.level*2);
p.xp+=10+h.tier*5;
G.score+=100*(h.tier+1);
humans.splice(i,1);
checkLevelUp();
}else{h.state='flee';h.stateTimer=rand(2,4)}
fed=true;p.feedCD=.22;break}}
if(!fed&&mouse.down){emit(p.x+Math.cos(p.angle)*18,p.y+Math.sin(p.angle)*18,1,'#660022',25,.15,2)}}

function checkLevelUp(){
let p=G.player;
while(p.xp>=p.xpNeeded){p.xp-=p.xpNeeded;p.level++;p.xpNeeded=Math.floor(p.xpNeeded*1.35);p.maxBlood+=8;p.blood=Math.min(p.maxBlood,p.blood+18);p.speed+=4;p.feedRange+=2;emit(p.x,p.y,16,'#aa44ff',100,.7,4);G.score+=500}}

function dash(){
let p=G.player;if(p.dashCD>0||p.dashTimer>0)return;
p.dashTimer=.12;p.dashCD=2.8;p.invuln=.18;
let dx=0,dy=0;
if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
if(keys['ArrowRight']||keys['KeyD'])dx=1;
if(keys['ArrowUp']||keys['KeyW'])dy=-1;
if(keys['ArrowDown']||keys['KeyS'])dy=1;
if(dx===0&&dy===0){dx=Math.cos(p.angle);dy=Math.sin(p.angle)}
let len=Math.hypot(dx,dy);if(len>0){dx/=len;dy/=len}
p.x+=dx*120;p.y+=dy*120;
p.x=clamp(p.x,10,W-10);p.y=clamp(p.y,10,H-10);
emit(p.x,p.y,10,'#6644cc',70,.35,3);
for(let h of humans){let d=dist(p,h);if(d<40){let a=Math.atan2(h.y-p.y,h.x-p.x);h.x+=Math.cos(a)*30;h.y+=Math.sin(a)*30;h.state='flee';h.stateTimer=1;h.hitFlash=.12}}}

addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'&&running&&!gameOver)dash();e.preventDefault()});
addEventListener('keyup',e=>{keys[e.code]=false});
C.addEventListener('mousemove',e=>{let r=C.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top});
C.addEventListener('mousedown',e=>{mouse.down=true;if(running&&!gameOver)feed()});
C.addEventListener('mouseup',()=>{mouse.down=false});
C.addEventListener('contextmenu',e=>e.preventDefault());

function initGame(){
G={player:initPlayer(),time:0,score:0,spawnTimer:0,spawnRate:3,districtTimer:0,prevPhase:1};
humans=[];particles=[];bloodDrops=[];sanctZones=[];gameOver=false;
initDistricts();
for(let i=0;i<5;i++)spawnHuman();
weather={type:'clear',timer:18,intensity:0,raindrops:[],lightning:0,lightningFlash:0};
phaseBanner={text:'',timer:0};
shake={x:0,y:0,intensity:0};
}

function endGame(){
gameOver=true;saveHS(G.score,G.time);
setTimeout(()=>{
document.getElementById('menu').style.display='flex';
showHS();
},400);
}

let lastTime=0;
function gameLoop(ts){
let dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
if(!running||gameOver){
if(gameOver){
X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
X.textAlign='center';X.font='bold 30px monospace';X.fillStyle='#cc2222';
X.fillText('YOU PERISHED',W/2,H/2-35);
X.font='13px monospace';X.fillStyle='#aaa';
X.fillText(`Survived: ${Math.floor(G.time)}s | Score: ${G.score} | Level: ${G.player.level}`,W/2,H/2+8);
X.font='10px monospace';X.fillStyle='#666';
X.fillText('Click AWAKEN to try again',W/2,H/2+38);
}
requestAnimationFrame(gameLoop);return}

G.time+=dt;
let p=G.player;
p.feedCD-=dt;p.dashCD-=dt;p.dashTimer-=dt;p.hitFlash-=dt;p.invuln-=dt;

let mx=0,my=0;
if(keys['ArrowLeft']||keys['KeyA'])mx=-1;
if(keys['ArrowRight']||keys['KeyD'])mx=1;
if(keys['ArrowUp']||keys['KeyW'])my=-1;
if(keys['ArrowDown']||keys['KeyS'])my=1;
if(mx||my){let len=Math.hypot(mx,my);p.x+=mx/len*p.speed*dt;p.y+=my/len*p.speed*dt;p.angle=Math.atan2(my,mx)}
p.x=clamp(p.x,10,W-10);p.y=clamp(p.y,10,H-10);

p.blood-=dt*(0.3+G.time*.005);
if(p.blood<=0){endGame();requestAnimationFrame(gameLoop);return}

G.spawnTimer-=dt;
if(G.spawnTimer<=0){G.spawnTimer=Math.max(.35,2.8-G.time*.015);spawnHuman()}

for(let h of humans)updateHuman(h,dt);
updateDistricts(dt);
updateSanctified(dt);
updateWeather(dt);
updateParticles(dt);
updateShake(dt);

G.score+=dt*(1+Math.floor(G.time/10));

p.angle=Math.atan2(mouse.y-p.y,mouse.x-p.x);
if(mouse.down)feed();

let phase=Math.floor(G.time/30)+1;
if(phase!==G.prevPhase){G.prevPhase=phase;phaseBanner.text=`⚠ PHASE ${phase}: ${['Dusk','Nightfall','Darkness','Blood Moon','Eclipse'][Math.min(phase-1,4)]}`;phaseBanner.timer=2.5;doShake(5)}
phaseBanner.timer-=dt;

X.save();X.translate(shake.x,shake.y);
drawBackground();
drawDistricts();
drawBloodDrops();
drawSanctified();
drawWeather();
drawBloodMoon();
for(let h of humans)drawHuman(h);
drawPlayer();
drawParticles();
X.restore();
drawHUD();

let vg=X.createRadialGradient(W/2,H/2,W*.22,W/2,H/2,W*.72);
vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.4)');
X.fillStyle=vg;X.fillRect(0,0,W,H);

requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click',()=>{
document.getElementById('menu').style.display='none';
initGame();running=true;lastTime=performance.now();
requestAnimationFrame(gameLoop);
});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
