<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival - Iteration 15</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;font-family:'Courier New',monospace;color:#ddd;user-select:none}
canvas{display:block;cursor:crosshair}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#hud{display:flex;justify-content:space-between;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent)}
.bar{height:18px;border:1px solid #444;border-radius:3px;overflow:hidden;position:relative;width:200px}
.bar-fill{height:100%;transition:width .2s}
.bar-label{position:absolute;top:0;left:0;width:100%;text-align:center;font-size:11px;line-height:18px;text-shadow:1px 1px 2px #000}
#blood-fill{background:linear-gradient(90deg,#8b0000,#dc143c)}
#xp-fill{background:linear-gradient(90deg,#4a0080,#9b30ff)}
#stats{display:flex;gap:20px;align-items:center;font-size:13px}
#phase-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#ff4444;text-shadow:0 0 20px #ff0000,0 0 40px #880000;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
#phase-banner.show{opacity:1}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:10}
#menu h1{font-size:42px;color:#dc143c;text-shadow:0 0 30px #8b0000;margin-bottom:5px}
#menu .sub{color:#888;font-size:14px;margin-bottom:20px}
#menu .controls{color:#aaa;font-size:12px;margin-bottom:20px;text-align:center;line-height:1.8}
#menu button{background:#8b0000;color:#fff;border:none;padding:12px 40px;font-size:18px;cursor:pointer;font-family:inherit;border-radius:4px;pointer-events:all}
#menu button:hover{background:#dc143c}
#hs{margin-top:20px;font-size:12px;color:#888;text-align:center;max-width:300px}
#hs table{margin:8px auto;border-collapse:collapse}
#hs td,#hs th{padding:3px 10px;border:1px solid #333;text-align:center}
#hs th{color:#dc143c}
#death{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(30,0,0,.9);z-index:10}
#death h2{color:#ff0000;font-size:36px;text-shadow:0 0 20px #880000}
#death .info{color:#ccc;font-size:16px;margin:10px 0}
#death button{background:#8b0000;color:#fff;border:none;padding:10px 30px;font-size:16px;cursor:pointer;font-family:inherit;border-radius:4px;margin-top:10px}
#death button:hover{background:#dc143c}
#iter{position:absolute;bottom:8px;right:12px;font-size:10px;color:#555}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="hud">
<div><div style="font-size:11px;margin-bottom:2px">BLOOD</div><div class="bar"><div class="bar-fill" id="blood-fill"></div><div class="bar-label" id="blood-label">100/100</div></div></div>
<div id="stats"><span id="timer">0:00</span><span id="score">Score: 0</span><span id="level">Lv 1</span></div>
<div><div style="font-size:11px;margin-bottom:2px">XP</div><div class="bar"><div class="bar-fill" id="xp-fill"></div><div class="bar-label" id="xp-label">0/100</div></div></div>
</div>
<div id="phase-banner"></div>
</div>
<div id="menu">
<h1>🧛 VAMPIRE SURVIVAL</h1>
<div class="sub">Iteration 15 — Blood Moon Rising</div>
<div class="controls">WASD/Arrows — Move &nbsp;|&nbsp; Mouse — Aim &amp; Feed<br>Click near humans to drain blood &nbsp;|&nbsp; SPACE — Dash<br>Survive as long as possible. Humans get stronger.</div>
<button id="startBtn">BEGIN NIGHT</button>
<div id="hs"></div>
</div>
<div id="death">
<h2>☠ YOU PERISHED</h2>
<div class="info" id="deathInfo"></div>
<button id="restartBtn">TRY AGAIN</button>
</div>
<div id="iter">Iteration 15</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

const PI=Math.PI,TAU=PI*2,RND=Math.random,FLR=Math.floor,ABS=Math.abs,MIN=Math.min,MAX=Math.max;

// Game state
let game,player,humans,particles,projectiles,buildings,props,ticks=0;
let keys={},mouse={x:0,y:0,down:false};
let phase=0,phaseTimer=0,phaseNames=['Dusk','Twilight','Nightfall','Blood Moon','Dawn\'s End'];
let phaseColors=['#1a1a2e','#16213e','#0f3460','#1a0a0a','#2d1b00'];
let highScores=JSON.parse(localStorage.getItem('vs_hs')||'[]');

function initGame(){
  game={running:false,over:false,blood:100,maxBlood:100,xp:0,xpNext:100,level:1,score:0,time:0,feedCooldown:0,dashCooldown:0,shake:0,flash:0};
  player={x:W/2,y:H/2,vx:0,vy:0,angle:0,speed:3,size:14,dashTimer:0,mistTimer:0,invuln:0};
  humans=[];particles=[];projectiles=[];buildings=[];props=[];
  ticks=0;phase=0;phaseTimer=0;
  generateWorld();
  updateHUD();
}

function generateWorld(){
  buildings=[];props=[];
  for(let i=0;i<12;i++){
    let bx=RND()*W*.8+W*.1,by=RND()*H*.8+H*.1;
    buildings.push({x:bx,y:by,w:40+RND()*60,h:30+RND()*50,color:`hsl(${20+RND()*20},${20+RND()*20}%,${15+RND()*15}%)`,roof:RND()>.5});
  }
  for(let i=0;i<20;i++){
    props.push({x:RND()*W,y:RND()*H,type:RND()>.6?'torch':'barrel',lit:RND()>.3,flicker:RND()*TAU});
  }
}

function spawnHuman(){
  let edge=RND()*4|0,side,x,y;
  switch(edge){
    case 0:x=RND()*W;y=-20;break;
    case 1:x=W+20;y=RND()*H;break;
    case 2:x=RND()*W;y=H+20;break;
    default:x=-20;y=RND()*H;
  }
  let tier=MIN(FLR(game.time/60),4);
  let hp=20+tier*15;
  let spd=1+RND()*.5+tier*.3;
  let dmg=5+tier*3;
  let hasShield=tier>=2&&RND()>.5;
  let hasTorch=tier>=1&&RND()>.4;
  let hasArmor=tier>=3&&RND()>.5;
  let hasCross=tier>=4&&RND()>.6;
  let states=['roam','patrol','chase','flee','fortify','hunt'];
  let state=tier<2?'roam':states[(RND()*MIN(tier+2,states.length))|0];
  let roamTarget={x:RND()*W,y:RND()*H};
  let patrolPoints=[];
  for(let p=0;p<3;p++)patrolPoints.push({x:RND()*W,y:RND()*H});
  let patrolIdx=0;
  humans.push({x,y,vx:0,vy:0,hp,maxHp:hp,spd,dmg,tier,state,roamTarget,patrolPoints,patrolIdx,
    hasShield,hasTorch,hasArmor,hasCross,shieldHp:hasShield?20:0,
    alertTimer:0,attackCd:0,investigateTarget:null,
    color:`hsl(${10+RND()*30},${40+RND()*30}%,${30+tier*8}%)`,
    size:8+tier,angle:0,fleeTimer:0,fortifyPos:null,
    aggroRange:80+tier*40,torchFlicker:RND()*TAU});
}

function spawnParticles(x,y,count,color,speed,life){
  for(let i=0;i<count;i++){
    let a=RND()*TAU,s=RND()*speed;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life*(0.5+RND()*.5),maxLife:life,color,size:1+RND()*3});
  }
}

function spawnProjectile(x,y,angle,speed,dmg,pierce){
  projectiles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,dmg,pierce:!!pierce,hit:[],life:120});
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function updatePlayer(){
  let p=player;
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my=-1;
  if(keys['s']||keys['arrowdown'])my=1;
  if(keys['a']||keys['arrowleft'])mx=-1;
  if(keys['d']||keys['arrowright'])mx=1;
  if(mx||my){let l=Math.hypot(mx,my);mx/=l;my/=l}
  let spd=p.speed;
  if(p.dashTimer>0){spd*=2.5;p.dashTimer--}
  if(p.mistTimer>0){spd*=1.5;p.mistTimer--}
  p.vx=mx*spd;p.vy=my*spd;
  p.x+=p.vx;p.y+=p.vy;
  p.x=MAX(10,MIN(W-10,p.x));
  p.y=MAX(10,MIN(H-10,p.y));
  p.angle=Math.atan2(mouse.y-p.y,mouse.x-p.x);
  if(p.invuln>0)p.invuln--;
  if(game.feedCooldown>0)game.feedCooldown--;
  if(game.dashCooldown>0)game.dashCooldown--;
  // Blood drain over time
  game.blood-=0.02+game.time*0.0003;
  if(game.blood<=0){game.blood=0;die()}
  // Dash particles
  if(p.dashTimer>0&&ticks%2===0)spawnParticles(p.x,p.y,1,'#9b30ff',2,15);
  if(p.mistTimer>0&&ticks%3===0)spawnParticles(p.x,p.y,1,'#666',1.5,20);
}

function updateHumans(){
  let p=player;
  for(let i=humans.length-1;i>=0;i--){
    let h=humans[i];
    let d=dist(h,p);
    h.angle=Math.atan2(p.y-h.y,p.x-h.x);
    h.attackCd=MAX(0,h.attackCd-1);
    h.fleeTimer=MAX(0,h.fleeTimer-1);
    h.torchFlicker+=0.1;

    // State machine
    switch(h.state){
      case 'roam':
        if(d<h.aggroRange)h.state='chase';
        else{
          let rd=dist(h,h.roamTarget);
          if(rd<20)h.roamTarget={x:RND()*W,y:RND()*H};
          let ra=Math.atan2(h.roamTarget.y-h.y,h.roamTarget.x-h.x);
          h.vx=Math.cos(ra)*h.spd*.5;h.vy=Math.sin(ra)*h.spd*.5;
        }
        break;
      case 'patrol':
        if(d<h.aggroRange)h.state='chase';
        else{
          let pt=h.patrolPoints[h.patrolIdx];
          let pd=dist(h,pt);
          if(pd<15){h.patrolIdx=(h.patrolIdx+1)%h.patrolPoints.length}
          let pa=Math.atan2(pt.y-h.y,pt.x-h.x);
          h.vx=Math.cos(pa)*h.spd*.7;h.vy=Math.sin(pa)*h.spd*.7;
        }
        break;
      case 'chase':
        if(d>h.aggroRange*2.5){h.state='roam';h.roamTarget={x:RND()*W,y:RND()*H};break}
        if(h.fleeTimer>0){h.state='flee';break}
        let ca=h.angle;
        h.vx=Math.cos(ca)*h.spd;h.vy=Math.sin(ca)*h.spd;
        if(d<30&&h.attackCd<=0){
          attackPlayer(h);h.attackCd=40;
        }
        // Crossbow attack
        if(h.hasCross&&d<200&&d>40&&h.attackCd<=0){
          spawnProjectile(h.x,h.y,h.angle,4,5,false);h.attackCd=80;
        }
        break;
      case 'flee':
        let fa=h.angle+PI;
        h.vx=Math.cos(fa)*h.spd*1.5;h.vy=Math.sin(fa)*h.spd*1.5;
        if(h.fleeTimer<=0)h.state='roam';
        break;
      case 'fortify':
        if(!h.fortifyPos)h.fortifyPos={x:h.x,y:h.y};
        let fd=dist(h,h.fortifyPos);
        if(fd>5){
          let ffa=Math.atan2(h.fortifyPos.y-h.y,h.fortifyPos.x-h.x);
          h.vx=Math.cos(ffa)*h.spd*.5;h.vy=Math.sin(ffa)*h.spd*.5;
        }else{h.vx=0;h.vy=0}
        if(d<h.aggroRange)h.state='chase';
        if(h.hasCross&&d<200&&h.attackCd<=0){
          spawnProjectile(h.x,h.y,h.angle,4,5,false);h.attackCd=90;
        }
        break;
      case 'hunt':
        if(d<h.aggroRange*3){
          let ha=h.angle;
          h.vx=Math.cos(ha)*h.spd*1.2;h.vy=Math.sin(ha)*h.spd*1.2;
          if(d<30&&h.attackCd<=0){attackPlayer(h);h.attackCd=35}
          if(h.hasCross&&d<250&&h.attackCd<=0){
            spawnProjectile(h.x,h.y,h.angle,5,8,false);h.attackCd=70;
          }
        }else{h.state='roam'}
        break;
    }

    h.x+=h.vx;h.y+=h.vy;
    h.x=MAX(5,MIN(W-5,h.x));h.y=MAX(5,MIN(H-5,h.y));

    // Shield regen
    if(h.hasShield&&h.shieldHp<20&&ticks%60===0)h.shieldHp++;

    // Torch damage to vampire nearby
    if(h.hasTorch&&d<40&&ticks%30===0){
      game.blood-=2;
      spawnParticles(p.x,p.y,2,'#ff6600',2,15);
    }

    // Investigate nearby feeding
    if(d<100&&game.flash>0&&h.state!=='chase'&&h.state!=='flee'){
      h.state='chase';
    }

    // Death
    if(h.hp<=0){
      game.score+=10+h.tier*15;
      game.xp+=5+h.tier*3;
      spawnParticles(h.x,h.y,15,'#8b0000',3,30);
      spawnParticles(h.x,h.y,8,'#ff0000',2,20);
      humans.splice(i,1);
    }
  }
}

function attackPlayer(h){
  let dmg=h.dmg;
  if(player.invuln>0)return;
  if(h.hasShield)dmg=MAX(1,dmg-2);
  if(player.mistTimer>0)dmg=FLR(dmg*.5);
  game.blood-=dmg;
  game.shake=8;
  spawnParticles(player.x,player.y,5,'#ff0000',3,20);
  if(game.blood<=0){game.blood=0;die()}
}

function updateProjectiles(){
  for(let i=projectiles.length-1;i>=0;i--){
    let p=projectiles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0||p.x<-10||p.x>W+10||p.y<-10||p.y>H+10){projectiles.splice(i,1);continue}
    let pl=player;
    if(dist(p,pl)<pl.size+3&&!p.hit.includes(pl)){
      if(pl.invuln<=0){
        game.blood-=p.dmg;game.shake=5;
        spawnParticles(pl.x,pl.y,4,'#ff0000',2,15);
        if(!p.pierce){projectiles.splice(i,1);continue}
        p.hit.push(pl);
      }
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function feed(){
  if(game.feedCooldown>0)return;
  let best=null,bestD=60;
  for(let h of humans){
    let d=dist(h,{x:mouse.x,y:mouse.y});
    if(d<bestD){bestD=d;best=h}
  }
  if(best){
    let drain=15+player.level*2;
    best.hp-=drain;
    game.blood=MIN(game.maxBlood,game.blood+drain*.6);
    game.score+=5;
    game.xp+=3;
    game.feedCooldown=15;
    game.flash=10;
    spawnParticles(best.x,best.y,10,'#dc143c',3,25);
    spawnParticles(player.x,player.y,5,'#ff6666',2,20);
    // Flee nearby humans
    for(let h of humans){
      if(h!==best&&dist(h,best)<120){
        h.state='flee';h.fleeTimer=120;
      }
    }
  }
}

function checkLevelUp(){
  while(game.xp>=game.xpNext){
    game.xp-=game.xpNext;
    game.level++;
    game.xpNext=FLR(game.xpNext*1.5);
    game.maxBlood+=10;
    game.blood=MIN(game.maxBlood,game.blood+20);
    player.speed+=.2;
    spawnParticles(player.x,player.y,30,'#9b30ff',4,40);
    showPhaseBanner('LEVEL UP! Lv '+game.level);
  }
}

function updatePhases(){
  phaseTimer++;
  let newPhase=MIN(FLR(game.time/120),4);
  if(newPhase!==phase){
    phase=newPhase;
    showPhaseBanner(phaseNames[phase]+' — Phase '+(phase+1));
  }
  // Spawn humans
  let spawnRate=MAX(30,120-game.time*.5);
  if(ticks%FLR(spawnRate)===0){
    let count=1+FLR(game.time/90);
    for(let i=0;i<count;i++)spawnHuman();
  }
  // Max humans
  let maxH=20+FLR(game.time/30);
  if(humans.length>maxH)humans.splice(0,humans.length-maxH);
}

function showPhaseBanner(text){
  let el=document.getElementById('phase-banner');
  el.textContent=text;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function die(){
  game.over=true;game.running=false;
  let s=FLR(game.score+game.time*10);
  highScores.push({score:s,time:FLR(game.time),level:game.level,date:new Date().toLocaleDateString()});
  highScores.sort((a,b)=>b.score-a.score);
  if(highScores.length>10)highScores.length=10;
  localStorage.setItem('vs_hs',JSON.stringify(highScores));
  document.getElementById('deathInfo').innerHTML=
    `Survived ${FLR(game.time/60)}m ${FLR(game.time%60)}s<br>Score: ${s} | Level: ${game.level}`;
  document.getElementById('death').style.display='flex';
}

function updateHUD(){
  let bp=MAX(0,game.blood/game.maxBlood*100);
  document.getElementById('blood-fill').style.width=bp+'%';
  document.getElementById('blood-label').textContent=FLR(game.blood)+'/'+game.maxBlood;
  let xpP=game.xp/game.xpNext*100;
  document.getElementById('xp-fill').style.width=xpP+'%';
  document.getElementById('xp-label').textContent=game.xp+'/'+game.xpNext;
  let m=FLR(game.time/60),s=FLR(game.time%60);
  document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('score').textContent='Score: '+FLR(game.score+game.time*10);
  document.getElementById('level').textContent='Lv '+game.level;
}

// Rendering
function drawWorld(){
  // Background
  let bg=phaseColors[phase];
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  // Ground texture
  X.fillStyle='rgba(255,255,255,0.02)';
  for(let x=0;x<W;x+=40)for(let y=0;y<H;y+=40){
    if((x+y)%80===0)X.fillRect(x,y,40,40);
  }

  // Buildings
  for(let b of buildings){
    X.fillStyle=b.color;
    X.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
    if(b.roof){
      X.beginPath();
      X.moveTo(b.x-b.w/2-5,b.y-b.h/2);
      X.lineTo(b.x,b.y-b.h/2-15);
      X.lineTo(b.x+b.w/2+5,b.y-b.h/2);
      X.fillStyle='#2a1a0a';X.fill();
    }
    // Windows
    X.fillStyle='rgba(255,200,50,'+(0.1+Math.sin(ticks*.02+b.x)*.05)+')';
    for(let wx=b.x-b.w/4;wx<b.x+b.w/4;wx+=15){
      for(let wy=b.y-b.h/4;wy<b.y+b.h/4;wy+=15){
        X.fillRect(wx,wy,6,8);
      }
    }
  }

  // Props
  for(let pr of props){
    if(pr.type==='torch'&&pr.lit){
      pr.flicker+=0.05;
      let glow=8+Math.sin(pr.flicker)*3;
      let grd=X.createRadialGradient(pr.x,pr.y,0,pr.x,pr.y,glow*4);
      grd.addColorStop(0,'rgba(255,150,50,0.3)');
      grd.addColorStop(1,'rgba(255,100,0,0)');
      X.fillStyle=grd;X.fillRect(pr.x-glow*4,pr.y-glow*4,glow*8,glow*8);
      X.fillStyle='#ff8800';
      X.fillRect(pr.x-2,pr.y-8,4,12);
      X.fillStyle='#ffcc00';
      X.fillRect(pr.x-1,pr.y-10,2,4);
    }else if(pr.type==='barrel'){
      X.fillStyle='#3a2a1a';
      X.beginPath();X.arc(pr.x,pr.y,6,0,TAU);X.fill();
      X.strokeStyle='#5a4a3a';X.lineWidth=1;X.stroke();
    }
  }

  // Sanctified zones (phase 3+)
  if(phase>=3){
    for(let i=0;i<3;i++){
      let sx=W*.2+i*W*.3,sy=H*.5;
      let pulse=Math.sin(ticks*.03+i)*.3+.5;
      X.fillStyle=`rgba(255,255,200,${pulse*.08})`;
      X.beginPath();X.arc(sx,sy,60,0,TAU);X.fill();
      X.strokeStyle=`rgba(255,255,200,${pulse*.15})`;
      X.lineWidth=2;
      // Cross symbol
      X.beginPath();X.moveTo(sx,sy-15);X.lineTo(sx,sy+15);X.moveTo(sx-10,sy);X.lineTo(sx+10,sy);X.stroke();
    }
  }
}

function drawHumans(){
  for(let h of humans){
    X.save();X.translate(h.x,h.y);X.rotate(h.angle);
    // Body
    X.fillStyle=h.color;
    X.beginPath();X.arc(0,0,h.size,0,TAU);X.fill();
    // Armor
    if(h.hasArmor){
      X.strokeStyle='#888';X.lineWidth=2;
      X.beginPath();X.arc(0,0,h.size+2,0,TAU);X.stroke();
    }
    // Shield
    if(h.hasShield&&h.shieldHp>0){
      X.strokeStyle=`rgba(100,150,255,${h.shieldHp/20*.6})`;
      X.lineWidth=2;
      X.beginPath();X.arc(0,0,h.size+4,0,TAU);X.stroke();
    }
    // Torch
    if(h.hasTorch){
      X.fillStyle='#ff8800';
      X.fillRect(h.size-2,-2,6,4);
      X.fillStyle='#ffcc00';
      X.fillRect(h.size+2,-3,3,6);
    }
    // Crossbow
    if(h.hasCross){
      X.strokeStyle='#aa8855';X.lineWidth=2;
      X.beginPath();X.moveTo(h.size,0);X.lineTo(h.size+8,0);X.stroke();
      X.strokeStyle='#666';
      X.beginPath();X.moveTo(h.size+4,-5);X.lineTo(h.size+4,5);X.stroke();
    }
    // Eyes
    X.fillStyle=h.state==='chase'||h.state==='hunt'?'#ff0':'#fff';
    X.fillRect(h.size*.3,-3,2,2);X.fillRect(h.size*.3,1,2,2);
    X.restore();
    // HP bar
    if(h.hp<h.maxHp){
      X.fillStyle='#300';X.fillRect(h.x-10,h.y-h.size-8,20,3);
      X.fillStyle='#f00';X.fillRect(h.x-10,h.y-h.size-8,20*(h.hp/h.maxHp),3);
    }
    // Tier indicator
    if(h.tier>0){
      X.fillStyle='#ff0';X.font='8px monospace';X.textAlign='center';
      X.fillText('★'.repeat(MIN(h.tier,4)),h.x,h.y-h.size-10);
    }
    // State indicator
    if(h.state==='flee'){
      X.fillStyle='#ff0';X.font='10px monospace';X.textAlign='center';
      X.fillText('!',h.x,h.y-h.size-12);
    }
  }
}

function drawPlayer(){
  let p=player;
  X.save();X.translate(p.x,p.y);
  // Shadow
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(0,p.size*.8,p.size,p.size*.4,0,0,TAU);X.fill();
  // Cape
  X.fillStyle='#1a0020';
  X.beginPath();
  X.moveTo(-p.size*.5,-p.size*.3);
  X.lineTo(-p.size*1.2,p.size*.8);
  X.lineTo(p.size*1.2,p.size*.8);
  X.lineTo(p.size*.5,-p.size*.3);
  X.fill();
  // Body
  X.fillStyle='#2a0030';
  X.beginPath();X.arc(0,0,p.size,0,TAU);X.fill();
  // Face
  X.fillStyle='#dda0a0';
  X.beginPath();X.arc(0,-2,p.size*.5,0,TAU);X.fill();
  // Eyes
  X.fillStyle='#ff0000';
  X.fillRect(-4,-4,3,2);X.fillRect(2,-4,3,2);
  // Fangs
  X.fillStyle='#fff';
  X.beginPath();X.moveTo(-3,1);X.lineTo(-1,5);X.lineTo(-5,1);X.fill();
  X.beginPath();X.moveTo(3,1);X.lineTo(5,5);X.lineTo(1,1);X.fill();
  // Invuln flash
  if(p.invuln>0&&ticks%4<2){
    X.strokeStyle='rgba(155,48,255,0.5)';X.lineWidth=2;
    X.beginPath();X.arc(0,0,p.size+5,0,TAU);X.stroke();
  }
  X.restore();
  // Aim line
  X.strokeStyle='rgba(220,20,60,0.3)';X.lineWidth=1;
  X.setLineDash([4,4]);
  X.beginPath();X.moveTo(p.x,p.y);X.lineTo(mouse.x,mouse.y);X.stroke();
  X.setLineDash([]);
}

function drawProjectiles(){
  for(let p of projectiles){
    X.fillStyle='#aaa';
    X.beginPath();X.arc(p.x,p.y,3,0,TAU);X.fill();
    X.fillStyle='rgba(170,170,170,0.3)';
    X.beginPath();X.arc(p.x-p.vx,p.y-p.vy,2,0,TAU);X.fill();
  }
}

function drawParticles(){
  for(let p of particles){
    let a=p.life/p.maxLife;
    X.globalAlpha=a;
    X.fillStyle=p.color;
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*a,p.size*a);
  }
  X.globalAlpha=1;
}

function drawVignette(){
  let grd=X.createRadialGradient(W/2,H/2,MIN(W,H)*.3,W/2,H/2,MAX(W,H)*.7);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(1,'rgba(0,0,0,0.6)');
  X.fillStyle=grd;X.fillRect(0,0,W,H);
}

function drawBloodMoon(){
  if(phase>=3){
    let mx=W*.8,my=H*.15;
    let pulse=Math.sin(ticks*.01)*.1+.9;
    X.fillStyle=`rgba(139,0,0,${pulse*.8})`;
    X.beginPath();X.arc(mx,my,30,0,TAU);X.fill();
    X.fillStyle=`rgba(200,0,0,${pulse*.4})`;
    X.beginPath();X.arc(mx,my,40,0,TAU);X.fill();
    // Crescent
    X.fillStyle=phaseColors[phase];
    X.beginPath();X.arc(mx+10,my-5,28,0,TAU);X.fill();
  }
}

function drawWeather(){
  if(phase>=2){
    X.strokeStyle='rgba(150,150,200,0.1)';X.lineWidth=1;
    for(let i=0;i<20;i++){
      let wx=(ticks*2+i*137)%W,wy=(ticks*1.5+i*89)%H;
      X.beginPath();X.moveTo(wx,wy);X.lineTo(wx-3,wy+8);X.stroke();
    }
  }
}

function drawFeedRange(){
  X.strokeStyle='rgba(220,20,60,0.15)';X.lineWidth=1;
  X.beginPath();X.arc(mouse.x,mouse.y,60,0,TAU);X.stroke();
}

// Main loop
function update(){
  if(!game.running)return;
  ticks++;
  game.time+=1/60;
  updatePlayer();
  updateHumans();
  updateProjectiles();
  updateParticles();
  updatePhases();
  checkLevelUp();
  if(game.shake>0)game.shake--;
  if(game.flash>0)game.flash--;
  updateHUD();
}

function render(){
  X.save();
  if(game.shake>0){
    X.translate((RND()-.5)*game.shake*2,(RND()-.5)*game.shake*2);
  }
  drawWorld();
  drawWeather();
  drawBloodMoon();
  drawFeedRange();
  drawProjectiles();
  drawHumans();
  drawPlayer();
  drawParticles();
  drawVignette();
  // Flash effect
  if(game.flash>0){
    X.fillStyle=`rgba(255,0,0,${game.flash*.05})`;
    X.fillRect(0,0,W,H);
  }
  X.restore();
}

function loop(){
  update();render();
  requestAnimationFrame(loop);
}

// Input
addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '&&game.running){
    e.preventDefault();
    if(game.dashCooldown<=0){
      player.dashTimer=10;player.invuln=15;game.dashCooldown=60;
      spawnParticles(player.x,player.y,8,'#9b30ff',3,20);
    }
  }
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
addEventListener('mousedown',e=>{
  mouse.down=true;
  if(game.running)feed();
});
addEventListener('mouseup',()=>{mouse.down=false});

// UI
function showHighScores(){
  let el=document.getElementById('hs');
  if(highScores.length===0){el.innerHTML='<div style="color:#555">No scores yet</div>';return}
  let html='<table><tr><th>#</th><th>Score</th><th>Time</th><th>Lv</th></tr>';
  highScores.slice(0,5).forEach((s,i)=>{
    let m=FLR(s.time/60),sec=FLR(s.time%60);
    html+=`<tr><td>${i+1}</td><td>${s.score}</td><td>${m}m${sec}s</td><td>${s.level}</td></tr>`;
  });
  html+='</table>';
  el.innerHTML=html;
}

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('menu').style.display='none';
  initGame();game.running=true;
};
document.getElementById('restartBtn').onclick=()=>{
  document.getElementById('death').style.display='none';
  initGame();game.running=true;
};

showHighScores();
initGame();
loop();
</script>
</body>
</html>
