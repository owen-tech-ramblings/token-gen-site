<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival - Iteration 10</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Courier New',monospace;color:#ddd;user-select:none}
canvas{display:block;cursor:crosshair}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#topbar{display:flex;justify-content:space-between;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,.7),transparent)}
.bar-wrap{width:200px;height:18px;background:#222;border:1px solid #444;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;transition:width .2s}
.bar-text{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;text-shadow:1px 1px 2px #000}
#blood-fill{background:linear-gradient(90deg,#8b0000,#dc143c)}
#xp-fill{background:linear-gradient(90deg,#4a0080,#9b30ff)}
#dash-fill{background:linear-gradient(90deg,#1a1a3a,#4488ff)}
.stat{font-size:13px;text-shadow:1px 1px 3px #000}
#center-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#center-msg.show{opacity:1}
#center-msg h1{font-size:36px;color:#dc143c;text-shadow:0 0 20px #8b0000}
#center-msg p{font-size:14px;color:#aaa;margin-top:8px}
#bloodmoon{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-size:18px;color:#ff4444;text-shadow:0 0 15px #ff0000;opacity:0;transition:opacity .5s;pointer-events:none}
#bloodmoon.show{opacity:1}
#minimap{position:absolute;bottom:10px;right:10px;border:1px solid #444;border-radius:4px;pointer-events:none}
#iter{position:absolute;bottom:10px;left:10px;font-size:11px;color:#666;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="topbar">
<div><span class="stat">🩸 Blood</span><div class="bar-wrap"><div class="bar-fill" id="blood-fill"></div><div class="bar-text" id="blood-text">100/100</div></div></div>
<div><span class="stat">⏱ <span id="timer">0:00</span></span><span class="stat" style="margin-left:12px">🏆 Lv.<span id="level">1</span></span><span class="stat" style="margin-left:12px">💀 <span id="kills">0</span></span></div>
<div><span class="stat">✨ XP</span><div class="bar-wrap"><div class="bar-fill" id="xp-fill"></div><div class="bar-text" id="xp-text">0/100</div></div></div>
<div><span class="stat">💨 Dash</span><div class="bar-wrap"><div class="bar-fill" id="dash-fill"></div><div class="bar-text" id="dash-text">Ready</div></div></div>
</div>
<div id="center-msg"><h1 id="msg-title"></h1><p id="msg-sub"></p></div>
<div id="bloodmoon">🌕 BLOOD MOON — Humans surge! Find the blood pool!</div>
<canvas id="minimap" width="120" height="120"></canvas>
<div id="iter">Iteration 10</div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),MM=document.getElementById('minimap'),MX=MM.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();addEventListener('resize',resize);
const WORLD=3000,TILE=64;
const keys={};addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;e.preventDefault()});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=0});
let mx=0,my=0,clicking=0;
C.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
C.addEventListener('mousedown',()=>clicking=1);
C.addEventListener('mouseup',()=>clicking=0);
C.addEventListener('contextmenu',e=>e.preventDefault());

const P={x:WORLD/2,y:WORLD/2,vx:0,vy:0,r:14,blood:100,maxBlood:100,xp:0,xpNext:100,level:1,
  speed:3.2,dashCD:0,dashMax:180,dashCDNow:0,dashing:0,dashTimer:0,dashDx:0,dashDy:0,
  feedRange:80,feedRate:2,feedTarget:null,invuln:0,angle:0};

let humans=[],particles=[],bloodPools=[],timer=0,kills=0,gameOver=0,started=0,shake=0;
let bloodMoonTimer=0,bloodMoonActive=0,bloodMoonDuration=0,bloodMoonPool=null;
let spawnTimer=0,difficulty=1;
let trees=[],buildings=[];

function genWorld(){
  trees=[];buildings=[];
  for(let i=0;i<120;i++){
    trees.push({x:Math.random()*WORLD,y:Math.random()*WORLD,r:12+Math.random()*18,
      shade:Math.random()*.3,type:Math.random()>.3?0:1});
  }
  for(let i=0;i<25;i++){
    buildings.push({x:Math.random()*(WORLD-200)+100,y:Math.random()*(WORLD-200)+100,
      w:60+Math.random()*80,h:60+Math.random()*80,
      color:`hsl(${20+Math.random()*20},${10+Math.random()*15}%,${15+Math.random()*10}%)`});
  }
}
genWorld();

function spawnHuman(){
  const edge=Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){x=Math.random()*WORLD;y=-20}
  else if(edge===1){x=WORLD+20;y=Math.random()*WORLD}
  else if(edge===2){x=Math.random()*WORLD;y=WORLD+20}
  else{x=-20;y=Math.random()*WORLD}
  const def=Math.min(difficulty,8);
  const hasWeapon=def>=3&&Math.random()<.3;
  const hasShield=def>=5&&Math.random()<.25;
  const hasTorch=def>=2&&Math.random()<.4;
  const hasSilver=def>=6&&Math.random()<.2;
  const hp=20+def*8;
  const spd=1+Math.random()*.8+def*.1;
  humans.push({x,y,vx:0,vy:0,r:10,hp,maxHp:hp,spd,
    hasWeapon,hasShield,hasTorch,hasSilver,
    stun:0,alert:0,alertTimer:0,
    attackCD:0,attackRate:60-def*3,
    color:`hsl(${Math.random()*30+10},${40+Math.random()*30}%,${35+Math.random()*20}%)`,
    type:Math.random()>.7?1:0});
}

function spawnParticles(x,y,color,count,speed,life){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*speed;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,r:1+Math.random()*3});
  }
}

function spawnBloodPool(x,y){
  bloodPools.push({x,y,r:30,amount:50,timer:600});
  spawnParticles(x,y,'#dc143c',15,2,40);
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function update(){
  if(gameOver||!started)return;
  timer++;
  difficulty=1+Math.floor(timer/600)*.5;
  spawnTimer++;
  const spawnRate=Math.max(20,80-difficulty*5);
  if(spawnTimer>=spawnRate){spawnTimer=0;
    const count=Math.min(1+Math.floor(difficulty/3),5);
    for(let i=0;i<count;i++)spawnHuman();
  }

  // Blood Moon event
  bloodMoonTimer++;
  if(!bloodMoonActive&&bloodMoonTimer>900+Math.random()*600){
    bloodMoonActive=1;bloodMoonDuration=300;
    document.getElementById('bloodmoon').classList.add('show');
    for(let i=0;i<8;i++)spawnHuman();
    const px=P.x+(Math.random()-.5)*400,py=P.y+(Math.random()-.5)*400;
    bloodMoonPool={x:Math.max(50,Math.min(WORLD-50,px)),y:Math.max(50,Math.min(WORLD-50,py)),r:35,amount:80,timer:400};
    bloodPools.push(bloodMoonPool);
    spawnParticles(bloodMoonPool.x,bloodMoonPool.y,'#ff0000',25,3,50);
  }
  if(bloodMoonActive){
    bloodMoonDuration--;
    if(bloodMoonDuration<=0){bloodMoonActive=0;bloodMoonTimer=0;bloodMoonPool=null;
      document.getElementById('bloodmoon').classList.remove('show');}
  }

  // Player movement
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy=-1;
  if(keys['s']||keys['arrowdown'])dy=1;
  if(keys['a']||keys['arrowleft'])dx=-1;
  if(keys['d']||keys['arrowright'])dx=1;
  if(dx||dy){const l=Math.hypot(dx,dy);dx/=l;dy/=l;}

  // Dash
  if((keys[' ']||keys['shift'])&&P.dashCDNow<=0&&!P.dashing&&(dx||dy)){
    P.dashing=1;P.dashTimer=10;P.dashDx=dx;P.dashDy=dy;P.dashCDNow=P.dashMax;P.invuln=15;
    spawnParticles(P.x,P.y,'#4488ff',10,3,20);
  }
  if(P.dashing){
    P.x+=P.dashDx*12;P.y+=P.dashDy*12;
    P.dashTimer--;
    if(P.dashTimer<=0)P.dashing=0;
  }else{
    P.x+=dx*P.speed;P.y+=dy*P.speed;
  }
  P.x=Math.max(P.r,Math.min(WORLD-P.r,P.x));
  P.y=Math.max(P.r,Math.min(WORLD-P.r,P.y));
  if(P.dashCDNow>0)P.dashCDNow--;
  if(P.invuln>0)P.invuln--;

  P.angle=Math.atan2(my-(P.y-camY),mx-(P.x-camX));

  // Feeding
  P.feedTarget=null;
  if(clicking){
    let closest=null,cd=P.feedRange;
    for(const h of humans){
      const d=dist(P,h);
      if(d<cd){closest=h;cd=d;}
    }
    if(closest){
      P.feedTarget=closest;
      const dmg=P.feedRate+P.level*.5;
      closest.hp-=dmg;
      P.blood=Math.min(P.maxBlood,P.blood+dmg*.6);
      P.xp+=dmg*.3;
      spawnParticles(closest.x,closest.y,'#dc143c',2,2,15);
      if(closest.hp<=0){
        kills++;
        P.xp+=15+P.level*2;
        spawnParticles(closest.x,closest.y,'#8b0000',12,3,25);
        if(Math.random()<.15)spawnBloodPool(closest.x,closest.y);
      }
    }
  }

  // Blood pool pickup
  for(let i=bloodPools.length-1;i>=0;i--){
    const bp=bloodPools[i];
    bp.timer--;
    if(bp.timer<=0){bloodPools.splice(i,1);continue;}
    if(dist(P,bp)<P.r+bp.r){
      P.blood=Math.min(P.maxBlood,P.blood+bp.amount);
      spawnParticles(bp.x,bp.y,'#dc143c',10,2,20);
      bloodPools.splice(i,1);
    }
  }

  // Level up
  while(P.xp>=P.xpNext){
    P.xp-=P.xpNext;P.level++;P.xpNext=Math.floor(P.xpNext*1.4);
    P.maxBlood+=10;P.blood=Math.min(P.blood+20,P.maxBlood);
    P.feedRate+=.3;P.speed+=.1;
    spawnParticles(P.x,P.y,'#9b30ff',20,4,30);
    shake=10;
    showMsg('LEVEL UP!','Level '+P.level);
  }

  // Blood drain over time
  P.blood-=.03+difficulty*.005;
  if(P.blood<=0){P.blood=0;gameOver=1;showMsg('YOU PERISHED','Survived '+formatTime(timer)+' | Kills: '+kills);}

  // Humans
  for(let i=humans.length-1;i>=0;i--){
    const h=humans[i];
    if(h.hp<=0){humans.splice(i,1);continue;}
    if(h.stun>0){h.stun--;continue;}

    const d=dist(h,P);
    const detectRange=h.hasTorch?250:150;
    if(d<detectRange||h.alert){
      h.alert=1;h.alertTimer=300;
      const a=Math.atan2(P.y-h.y,P.x-h.x);
      const moveSpeed=h.spd*(h.hasShield?.7:1);
      if(d>25){
        h.x+=Math.cos(a)*moveSpeed;
        h.y+=Math.sin(a)*moveSpeed;
      }
      // Attack
      if(d<P.r+h.r+10&&h.attackCD<=0){
        let dmg=1+difficulty*.3;
        if(h.hasWeapon)dmg*=2;
        if(h.hasSilver)dmg*=1.5;
        if(h.hasShield)dmg*=.7;
        if(P.invuln<=0){
          P.blood-=dmg;
          P.invuln=10;
          shake=5;
          spawnParticles(P.x,P.y,'#ff0000',5,2,15);
        }
        h.attackCD=h.attackRate;
      }
      if(h.attackCD>0)h.attackCD--;
    }
    if(h.alertTimer>0)h.alertTimer--;
    else h.alert=0;

    // Building collision
    for(const b of buildings){
      if(h.x>b.x&&h.x<b.x+b.w&&h.y>b.y&&h.y<b.y+b.h){
        const cx=Math.max(b.x,Math.min(b.x+b.w,h.x));
        const cy=Math.max(b.y,Math.min(b.y+b.h,h.y));
        const dx=h.x-cx,dy=h.y-cy;
        if(dx*dx+dy*dy<h.r*h.r){
          const a=Math.atan2(dy,dx);
          h.x=cx+Math.cos(a)*h.r;h.y=cy+Math.sin(a)*h.r;
        }
      }
    }
    h.x=Math.max(h.r,Math.min(WORLD-h.r,h.x));
    h.y=Math.max(h.r,Math.min(WORLD-h.r,h.y));
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  // Shake decay
  if(shake>0)shake*=.85;
  if(shake<.1)shake=0;

  updateUI();
}

let camX=0,camY=0;
function render(){
  X.fillStyle='#0a0a12';X.fillRect(0,0,W,H);
  camX=P.x-W/2;camY=P.y-H/2;
  if(shake>0){camX+=(Math.random()-.5)*shake*2;camY+=(Math.random()-.5)*shake*2;}
  X.save();X.translate(-camX,-camY);

  // Ground
  X.fillStyle='#12121a';X.fillRect(0,0,WORLD,WORLD);
  // Grid
  X.strokeStyle='#1a1a25';X.lineWidth=1;
  const gs=TILE;
  for(let x=0;x<=WORLD;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,WORLD);X.stroke();}
  for(let y=0;y<=WORLD;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(WORLD,y);X.stroke();}

  // Buildings
  for(const b of buildings){
    X.fillStyle=b.color;X.fillRect(b.x,b.y,b.w,b.h);
    X.strokeStyle='#333';X.lineWidth=2;X.strokeRect(b.x,b.y,b.w,b.h);
    // Windows
    X.fillStyle='#2a2010';
    for(let wx=b.x+10;wx<b.x+b.w-10;wx+=20){
      for(let wy=b.y+10;wy<b.y+b.h-10;wy+=20){
        X.fillRect(wx,wy,8,8);
      }
    }
  }

  // Trees
  for(const t of trees){
    if(t.x<camX-50||t.x>camX+W+50||t.y<camY-50||t.y>camY+H+50)continue;
    if(t.type===0){
      X.fillStyle='#1a2a1a';X.beginPath();X.arc(t.x,t.y,t.r,0,Math.PI*2);X.fill();
      X.fillStyle='#0f1f0f';X.beginPath();X.arc(t.x-2,t.y-2,t.r*.7,0,Math.PI*2);X.fill();
    }else{
      X.fillStyle='#2a1a1a';X.fillRect(t.x-4,t.y-4,8,8);
      X.fillStyle='#1a3a1a';X.beginPath();X.arc(t.x,t.y-8,t.r*.8,0,Math.PI*2);X.fill();
    }
  }

  // Blood pools
  for(const bp of bloodPools){
    const pulse=Math.sin(timer*.1)*.2+.8;
    X.fillStyle=`rgba(139,0,0,${.4*pulse})`;
    X.beginPath();X.arc(bp.x,bp.y,bp.r,0,Math.PI*2);X.fill();
    X.fillStyle=`rgba(220,20,60,${.6*pulse})`;
    X.beginPath();X.arc(bp.x,bp.y,bp.r*.5,0,Math.PI*2);X.fill();
    // Timer ring
    X.strokeStyle='rgba(220,20,60,.5)';X.lineWidth=2;
    X.beginPath();X.arc(bp.x,bp.y,bp.r+5,-Math.PI/2,-Math.PI/2+Math.PI*2*(bp.timer/600));X.stroke();
  }

  // Humans
  for(const h of humans){
    if(h.x<camX-30||h.x>camX+W+30||h.y<camY-30||h.y>camY+H+30)continue;
    const a=Math.atan2(P.y-h.y,P.x-h.x);
    X.save();X.translate(h.x,h.y);X.rotate(a);

    // Body
    X.fillStyle=h.color;
    X.beginPath();X.arc(0,0,h.r,0,Math.PI*2);X.fill();
    X.strokeStyle='#222';X.lineWidth=1.5;X.stroke();

    // Weapon
    if(h.hasWeapon){
      X.fillStyle='#888';X.fillRect(h.r-2,-2,14,4);
      X.fillStyle='#654321';X.fillRect(h.r-2,-3,4,6);
    }
    // Shield
    if(h.hasShield){
      X.fillStyle='#777';X.fillRect(-h.r-4,-8,6,16);
      X.strokeStyle='#555';X.lineWidth=1;X.strokeRect(-h.r-4,-8,6,16);
    }
    // Torch
    if(h.hasTorch){
      X.fillStyle='#654321';X.fillRect(-h.r-2,-2,4,12);
      const flicker=Math.sin(timer*.3+h.x)*.3+.7;
      X.fillStyle=`rgba(255,${100+Math.random()*50},0,${flicker})`;
      X.beginPath();X.arc(-h.r, -6, 5+Math.random()*2,0,Math.PI*2);X.fill();
      // Torch light
      X.fillStyle=`rgba(255,150,0,${.05*flicker})`;
      X.beginPath();X.arc(-h.r,-6,60,0,Math.PI*2);X.fill();
    }
    // Silver
    if(h.hasSilver){
      X.strokeStyle='#ccc';X.lineWidth=2;
      X.beginPath();X.arc(0,0,h.r+3,0,Math.PI*2);X.stroke();
    }

    X.restore();

    // HP bar
    if(h.hp<h.maxHp){
      const bw=h.r*2;
      X.fillStyle='#333';X.fillRect(h.x-bw/2,h.y-h.r-8,bw,4);
      X.fillStyle='#c00';X.fillRect(h.x-bw/2,h.y-h.r-8,bw*(h.hp/h.maxHp),4);
    }
    // Alert indicator
    if(h.alert){
      X.fillStyle='#ff4444';X.font='bold 10px monospace';X.textAlign='center';
      X.fillText('!',h.x,h.y-h.r-12);
    }
  }

  // Player (vampire)
  X.save();X.translate(P.x,P.y);
  // Cape
  const capeWave=Math.sin(timer*.08)*3;
  X.fillStyle='#1a0a2a';
  X.beginPath();
  X.moveTo(-8,-10);X.lineTo(-14+capeWave,12);X.lineTo(-4,8);X.closePath();X.fill();
  X.beginPath();
  X.moveTo(8,-10);X.lineTo(14-capeWave,12);X.lineTo(4,8);X.closePath();X.fill();
  // Body
  X.fillStyle='#2a1a3a';
  X.beginPath();X.arc(0,0,P.r,0,Math.PI*2);X.fill();
  X.strokeStyle='#4a2a6a';X.lineWidth=2;X.stroke();
  // Eyes
  const ea=P.angle;
  X.fillStyle='#ff0000';
  X.beginPath();X.arc(Math.cos(ea-.3)*6-2,Math.sin(ea-.3)*6-2,2.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(Math.cos(ea+.3)*6+2,Math.sin(ea+.3)*6+2,2.5,0,Math.PI*2);X.fill();
  // Fangs hint
  X.fillStyle='#fff';
  X.beginPath();X.moveTo(-3,4);X.lineTo(-1,8);X.lineTo(1,4);X.fill();
  X.beginPath();X.moveTo(3,4);X.lineTo(1,8);X.lineTo(-1,4);X.fill();
  // Dash effect
  if(P.dashing){
    X.strokeStyle='rgba(68,136,255,.5)';X.lineWidth=3;
    X.beginPath();X.arc(0,0,P.r+8,0,Math.PI*2);X.stroke();
  }
  // Invuln flash
  if(P.invuln>0&&Math.floor(timer/3)%2){
    X.fillStyle='rgba(255,255,255,.2)';
    X.beginPath();X.arc(0,0,P.r+4,0,Math.PI*2);X.fill();
  }
  X.restore();

  // Feeding line
  if(P.feedTarget){
    X.strokeStyle='rgba(220,20,60,.4)';X.lineWidth=2;X.setLineDash([4,4]);
    X.beginPath();X.moveTo(P.x,P.y);X.lineTo(P.feedTarget.x,P.feedTarget.y);X.stroke();
    X.setLineDash([]);
  }

  // Particles
  for(const p of particles){
    const a=p.life/p.maxLife;
    X.globalAlpha=a;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // Blood Moon overlay
  if(bloodMoonActive){
    const pulse=Math.sin(timer*.05)*.05+.08;
    X.fillStyle=`rgba(139,0,0,${pulse})`;X.fillRect(camX,camY,W,H);
  }

  X.restore();

  // Minimap
  renderMinimap();
}

function renderMinimap(){
  const s=120/WORLD;
  MX.fillStyle='#0a0a12';MX.fillRect(0,0,120,120);
  // Buildings
  MX.fillStyle='#222';
  for(const b of buildings)MX.fillRect(b.x*s,b.y*s,Math.max(1,b.w*s),Math.max(1,b.h*s));
  // Humans
  MX.fillStyle='#ff4444';
  for(const h of humans){
    if(h.alert)MX.fillRect(h.x*s-1,h.y*s-1,2,2);
  }
  // Blood pools
  MX.fillStyle='#dc143c';
  for(const bp of bloodPools)MX.fillRect(bp.x*s-2,bp.y*s-2,4,4);
  // Player
  MX.fillStyle='#9b30ff';MX.fillRect(P.x*s-2,P.y*s-2,4,4);
  // View rect
  MX.strokeStyle='rgba(255,255,255,.3)';MX.lineWidth=1;
  MX.strokeRect(camX*s,camY*s,W*s,H*s);
}

function updateUI(){
  const bp=Math.max(0,P.blood/P.maxBlood*100);
  document.getElementById('blood-fill').style.width=bp+'%';
  document.getElementById('blood-text').textContent=Math.ceil(P.blood)+'/'+P.maxBlood;
  const xp=Math.min(100,P.xp/P.xpNext*100);
  document.getElementById('xp-fill').style.width=xp+'%';
  document.getElementById('xp-text').textContent=Math.floor(P.xp)+'/'+P.xpNext;
  const dp=P.dashCDNow<=0?100:(1-P.dashCDNow/P.dashMax)*100;
  document.getElementById('dash-fill').style.width=dp+'%';
  document.getElementById('dash-text').textContent=P.dashCDNow<=0?'Ready':'...';
  document.getElementById('level').textContent=P.level;
  document.getElementById('kills').textContent=kills;
  document.getElementById('timer').textContent=formatTime(timer);
}

function formatTime(t){const s=Math.floor(t/60);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

function showMsg(title,sub){
  const el=document.getElementById('center-msg');
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=sub;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function startGame(){
  started=1;gameOver=0;timer=0;kills=0;difficulty=1;
  P.x=WORLD/2;P.y=WORLD/2;P.blood=P.maxBlood;P.xp=0;P.level=1;P.xpNext=100;
  P.feedRate=2;P.speed=3.2;P.dashCDNow=0;P.dashing=0;P.invuln=0;
  humans=[];particles=[];bloodPools=[];
  bloodMoonTimer=0;bloodMoonActive=0;spawnTimer=0;
  genWorld();
  showMsg('VAMPIRE SURVIVAL','WASD move · Click to feed · Space to dash');
}

function loop(){
  if(!started){
    X.fillStyle='#0a0a12';X.fillRect(0,0,W,H);
    X.fillStyle='#dc143c';X.font='bold 48px monospace';X.textAlign='center';
    X.fillText('VAMPIRE SURVIVAL',W/2,H/2-60);
    X.fillStyle='#9b30ff';X.font='18px monospace';
    X.fillText('Iteration 10 — Blood Moon Events',W/2,H/2-20);
    X.fillStyle='#888';X.font='14px monospace';
    X.fillText('WASD/Arrows: Move  |  Click: Feed  |  Space/Shift: Dash',W/2,H/2+30);
    X.fillText('Keep blood above zero. Humans get stronger over time.',W/2,H/2+55);
    X.fillStyle='#dc143c';X.font='bold 20px monospace';
    X.fillText('[ Click to Start ]',W/2,H/2+100);
    X.textAlign='left';
    if(clicking){startGame();clicking=0;}
  }else{
    update();
    render();
    if(gameOver){
      X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,0,W,H);
      X.fillStyle='#dc143c';X.font='bold 42px monospace';X.textAlign='center';
      X.fillText('GAME OVER',W/2,H/2-30);
      X.fillStyle='#aaa';X.font='16px monospace';
      X.fillText('Survived: '+formatTime(timer)+'  |  Kills: '+kills+'  |  Level: '+P.level,W/2,H/2+10);
      X.fillStyle='#888';X.font='14px monospace';
      X.fillText('Click to restart',W/2,H/2+45);
      X.textAlign='left';
      if(clicking){startGame();clicking=0;}
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
