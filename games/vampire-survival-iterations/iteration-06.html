<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival - Iteration 6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;font-family:'Courier New',monospace;color:#ddd;user-select:none}
canvas{display:block;cursor:crosshair}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#hud{display:flex;justify-content:space-between;padding:10px 20px;flex-wrap:wrap}
.bar-wrap{width:200px;height:18px;background:#222;border:1px solid #444;border-radius:3px;overflow:hidden;margin:3px 0}
.bar-fill{height:100%;transition:width .2s}
#blood-bar{background:linear-gradient(90deg,#8b0000,#dc143c)}
#xp-bar{background:linear-gradient(90deg,#4a0080,#9b30ff)}
#stamina-bar{background:linear-gradient(90deg,#006400,#32cd32)}
.hud-label{font-size:11px;color:#aaa;margin-bottom:1px}
#timer{font-size:20px;color:#ff6;font-weight:bold;text-shadow:0 0 10px #ff0}
#level{font-size:14px;color:#c0f}
#iter{position:absolute;top:5px;right:10px;font-size:10px;color:#555}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:10;pointer-events:all}
#overlay h1{font-size:36px;color:#dc143c;text-shadow:0 0 20px #8b0000;margin-bottom:10px}
#overlay p{font-size:14px;color:#aaa;margin:4px 0;text-align:center;line-height:1.6}
#overlay button{margin-top:20px;padding:12px 40px;font-size:18px;font-family:inherit;background:#8b0000;color:#fff;border:2px solid #dc143c;border-radius:5px;cursor:pointer;pointer-events:all}
#overlay button:hover{background:#dc143c}
#stats{font-size:12px;color:#888;margin-top:10px}
#minimap{position:absolute;bottom:10px;right:10px;border:1px solid #444;border-radius:4px;opacity:.7}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="hud">
<div><div class="hud-label">BLOOD</div><div class="bar-wrap"><div id="blood-bar" class="bar-fill" style="width:100%"></div></div><div class="hud-label">XP</div><div class="bar-wrap"><div id="xp-bar" class="bar-fill" style="width:0%"></div></div><div class="hud-label">DASH</div><div class="bar-wrap"><div id="stamina-bar" class="bar-fill" style="width:100%"></div></div></div>
<div style="text-align:right"><div id="timer">0:00</div><div id="level">LVL 1</div><div id="score">Kills: 0</div></div>
</div>
<div id="iter">Iteration 6 — Blood Mist Ability</div>
</div>
<canvas id="minimap" width="120" height="120"></canvas>
<div id="overlay"><h1>🧛 VAMPIRE SURVIVAL</h1><p>WASD/Arrows to move · Click to feed on humans<br>SHIFT to dash · SPACE for Blood Mist<br>Keep blood above zero to survive!</p><p id="stats"></p><button id="startBtn">AWAKEN</button></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),M=document.getElementById('minimap').getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();addEventListener('resize',resize);

const WORLD=3000,MAX_HUMANS=80,FEED_RANGE=50,MIST_RANGE=120,MIST_COST=30,DASH_COST=25,DASH_CD=2;
let state='menu',blood=100,maxBlood=100,xp=0,xpNeeded=50,level=1,kills=0,survTime=0;
let dashEnergy=100,dashCooldown=0,mistCooldown=0,mistActive=0;
let cam={x:0,y:0},keys={},mouse={x:W/2,y:H/2,down:false};
let player={x:WORLD/2,y:WORLD/2,vx:0,vy:0,speed:3.5,size:14,invuln:0,dashing:0,dashDx:0,dashDy:0};
let humans=[],particles=[],floats=[],buildings=[],torches=[];
let spawnTimer=0,spawnRate=2.5,humanLevel=1,dayTime=0;

function init(){
  humans=[];particles=[];floats=[];buildings=[];torches=[];
  blood=100;maxBlood=100;xp=0;xpNeeded=50;level=1;kills=0;survTime=0;
  dashEnergy=100;dashCooldown=0;mistCooldown=0;mistActive=0;
  player.x=WORLD/2;player.y=WORLD/2;player.vx=0;player.vy=0;player.invuln=0;player.dashing=0;
  spawnTimer=0;spawnRate=2.5;humanLevel=1;dayTime=0;
  for(let i=0;i<40;i++){
    let bx=Math.random()*WORLD,by=Math.random()*WORLD;
    buildings.push({x:bx,y:by,w:30+Math.random()*60,h:30+Math.random()*60,c:`hsl(${20+Math.random()*20},${20+Math.random()*20}%,${8+Math.random()*12}%)`});
  }
  for(let i=0;i<15;i++){
    let tx=Math.random()*WORLD,ty=Math.random()*WORLD;
    torches.push({x:tx,y:ty,phase:Math.random()*Math.PI*2});
  }
}

function spawnHuman(){
  if(humans.length>=MAX_HUMANS)return;
  let angle=Math.random()*Math.PI*2,dist=600+Math.random()*400;
  let hx=player.x+Math.cos(angle)*dist,hy=player.y+Math.sin(angle)*dist;
  hx=Math.max(20,Math.min(WORLD-20,hx));hy=Math.max(20,Math.min(WORLD-20,hy));
  let hasWeapon=humanLevel>=3&&Math.random()<Math.min(.4,humanLevel*.05);
  let hasShield=humanLevel>=5&&Math.random()<Math.min(.3,humanLevel*.04);
  let hasTorch=humanLevel>=2&&Math.random()<.3;
  let speed=1+humanLevel*.15+Math.random()*.5;
  let hp=2+Math.floor(humanLevel/2);
  humans.push({x:hx,y:hy,vx:0,vy:0,speed,hp,maxHp:hp,hasWeapon,hasShield,hasTorch,
    panic:0,fleeing:false,attackCd:0,size:10+Math.random()*4,
    color:`hsl(${Math.random()*30},${40+Math.random()*30}%,${30+Math.random()*20}%)`,
    alertTimer:0,state:'wander',wanderAngle:Math.random()*Math.PI*2,wanderTimer:Math.random()*3});
}

function addParticle(x,y,vx,vy,life,color,size){
  if(particles.length>300)return;
  particles.push({x,y,vx,vy,life,maxLife:life,color,size:size||3});
}

function addFloat(x,y,text,color){
  floats.push({x,y,text,color:color||'#fff',life:1.5,vy:-1.5});
}

function dist(a,b){let dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy)}

function update(dt){
  if(state!=='playing')return;
  survTime+=dt;dayTime+=dt;
  humanLevel=1+Math.floor(survTime/20);
  spawnRate=Math.max(.4,2.5-survTime*.02);
  spawnTimer-=dt;if(spawnTimer<=0){spawnTimer=spawnRate;spawnHuman()}

  let px=0,py=0;
  if(keys['w']||keys['arrowup'])py=-1;
  if(keys['s']||keys['arrowdown'])py=1;
  if(keys['a']||keys['arrowleft'])px=-1;
  if(keys['d']||keys['arrowright'])px=1;
  if(px||py){let len=Math.sqrt(px*px+py*py);px/=len;py/=len}

  if(player.dashing>0){
    player.x+=player.dashDx*12*dt;player.y+=player.dashDy*12*dt;
    player.dashing-=dt;
    if(Math.random()<.5)addParticle(player.x,player.y,(Math.random()-.5)*2,(Math.random()-.5)*2,.4,'#9b30ff',4);
    if(player.dashing<=0){player.dashing=0}
  }else{
    player.x+=px*player.speed;player.y+=py*player.speed;
  }
  player.x=Math.max(10,Math.min(WORLD-10,player.x));
  player.y=Math.max(10,Math.min(WORLD-10,player.y));

  if(player.invuln>0)player.invuln-=dt;
  if(dashCooldown>0)dashCooldown-=dt;
  if(mistCooldown>0)mistCooldown-=dt;
  if(mistActive>0)mistActive-=dt;
  dashEnergy=Math.min(100,dashEnergy+15*dt);

  if(mouse.down){
    for(let h of humans){
      if(dist(player,h)<FEED_RANGE){
        let dmg=1+level*.3;
        h.hp-=dmg*dt*3;
        blood=Math.min(maxBlood,blood+2*dt);
        if(Math.random()<.3)addParticle(h.x,h.y,(Math.random()-.5)*3,(Math.random()-.5)*3,.5,'#dc143c',3);
        if(h.hp<=0){
          xp+=10+level*2;kills++;
          addFloat(h.x,h.y-10,'+'+(10+level*2)+' XP','#9b30ff');
          for(let i=0;i<8;i++)addParticle(h.x,h.y,(Math.random()-.5)*5,(Math.random()-.5)*5,.6,'#dc143c',4);
        }
      }
    }
  }

  if(mistActive>0){
    for(let h of humans){
      if(dist(player,h)<MIST_RANGE){
        h.hp-=2*dt;h.panic=1;h.fleeing=true;
        if(Math.random()<.1)addParticle(h.x,h.y,(Math.random()-.5)*2,(Math.random()-.5)*2,.3,'#9b30ff',2);
        if(h.hp<=0){xp+=10+level*2;kills++;addFloat(h.x,h.y-10,'MIST KILL','#c0f');
          for(let i=0;i<6;i++)addParticle(h.x,h.y,(Math.random()-.5)*4,(Math.random()-.5)*4,.5,'#9b30ff',3);
        }
      }
    }
  }

  for(let i=humans.length-1;i>=0;i--){
    let h=humans[i];
    let d=dist(player,h);
    h.alertTimer=Math.max(0,h.alertTimer-dt);
    if(d<300||h.alertTimer>0)h.state='chase';
    else if(h.fleeing&&d<MIST_RANGE*1.5)h.state='flee';
    else{h.state='wander';h.wanderTimer-=dt;if(h.wanderTimer<=0){h.wanderAngle=Math.random()*Math.PI*2;h.wanderTimer=2+Math.random()*3}}

    let tx=0,ty=0;
    if(h.state==='chase'){
      if(d>0){tx=(player.x-h.x)/d;ty=(player.y-h.y)/d}
      if(h.hasWeapon&&d<40){
        h.attackCd-=dt;
        if(h.attackCd<=0&&player.invuln<=0){
          let dmg=h.hasShield?3+humanLevel*.3:1+humanLevel*.2;
          blood-=dmg;h.attackCd=1;
          addFloat(player.x,player.y-20,'-'+dmg.toFixed(1),'#f44');
          for(let j=0;j<4;j++)addParticle(player.x,player.y,(Math.random()-.5)*4,(Math.random()-.5)*4,.4,'#f00',3);
          if(blood<=0){blood=0;gameOver()}
        }
      }
    }else if(h.state==='flee'){
      if(d>0){tx=(h.x-player.x)/d;ty=(h.y-player.y)/d}
      h.fleeing=false;
    }else{
      tx=Math.cos(h.wanderAngle);ty=Math.sin(h.wanderAngle);
    }

    if(h.hasShield&&h.state==='chase'&&d<50){
      let awayX=h.x-player.x,awayY=h.y-player.y;
      let al=Math.sqrt(awayX*awayX+awayY*awayY)||1;
      tx=tx*.7+(awayX/al)*.3;ty=ty*.7+(awayY/al)*.3;
    }

    h.x+=tx*h.speed;h.y+=ty*h.speed;
    h.x=Math.max(10,Math.min(WORLD-10,h.x));
    h.y=Math.max(10,Math.min(WORLD-10,h.y));

    for(let b of buildings){
      if(h.x>b.x-10&&h.x<b.x+b.w+10&&h.y>b.y-10&&h.y<b.y+b.h+10){
        let cx=Math.max(b.x,Math.min(b.x+b.w,h.x)),cy=Math.max(b.y,Math.min(b.y+b.h,h.y));
        let dx=h.x-cx,dy=h.y-cy,dd=Math.sqrt(dx*dx+dy*dy)||1;
        h.x+=dx/dd*2;h.y+=dy/dd*2;
      }
    }

    if(h.hp<=0){humans.splice(i,1);continue}
  }

  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    let f=floats[i];f.y+=f.vy;f.life-=dt;if(f.life<=0)floats.splice(i,1);
  }

  while(xp>=xpNeeded){xp-=xpNeeded;level++;xpNeeded=Math.floor(50*Math.pow(1.4,level-1));
    maxBlood+=10;blood=Math.min(blood+20,maxBlood);player.speed+=.15;
    addFloat(player.x,player.y-30,'LEVEL UP!','#ff0');
    for(let i=0;i<20;i++)addParticle(player.x,player.y,(Math.random()-.5)*8,(Math.random()-.5)*8,.8,'#ff0',5);
  }

  cam.x=player.x-W/2;cam.y=player.y-H/2;

  document.getElementById('blood-bar').style.width=(blood/maxBlood*100)+'%';
  document.getElementById('xp-bar').style.width=(xp/xpNeeded*100)+'%';
  document.getElementById('stamina-bar').style.width=(dashEnergy/100*100)+'%';
  document.getElementById('timer').textContent=Math.floor(survTime/60)+':'+String(Math.floor(survTime%60)).padStart(2,'0');
  document.getElementById('level').textContent='LVL '+level;
  document.getElementById('score').textContent='Kills: '+kills+' | Humans: '+humans.length;
}

function drawVampire(x,y){
  let sx=x-cam.x,sy=y-cam.y;
  X.save();X.translate(sx,sy);
  if(player.invuln>0&&Math.sin(player.invuln*20)>0)X.globalAlpha=.5;
  X.fillStyle='#1a0a2e';X.beginPath();X.ellipse(0,4,16,10,0,0,Math.PI*2);X.fill();
  X.fillStyle='#2a1a3e';X.beginPath();X.arc(0,-4,10,0,Math.PI*2);X.fill();
  X.fillStyle='#c0c0c0';X.beginPath();X.arc(0,-4,8,0,Math.PI*2);X.fill();
  X.fillStyle='#ff0000';X.beginPath();X.arc(-3,-5,1.5,0,Math.PI*2);X.arc(3,-5,1.5,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';X.beginPath();X.moveTo(-2,-1);X.lineTo(0,1);X.lineTo(2,-1);X.fill();
  X.fillStyle='#1a0a2e';X.beginPath();X.moveTo(-14,-2);X.lineTo(-22,-12);X.lineTo(-10,0);X.fill();
  X.beginPath();X.moveTo(14,-2);X.lineTo(22,-12);X.lineTo(10,0);X.fill();
  if(player.dashing>0){X.globalAlpha=.3;X.fillStyle='#9b30ff';X.beginPath();X.arc(0,0,20,0,Math.PI*2);X.fill()}
  X.restore();
}

function drawHuman(h){
  let sx=h.x-cam.x,sy=h.y-cam.y;
  if(sx<-50||sx>W+50||sy<-50||sy>H+50)return;
  X.save();X.translate(sx,sy);
  let panic=h.panic>0?1:0;
  X.fillStyle=h.color;X.beginPath();X.arc(0,0,h.size,0,Math.PI*2);X.fill();
  X.fillStyle=panic?'#ff0':'#ddd';X.beginPath();X.arc(0,-2,h.size*.4,0,Math.PI*2);X.fill();
  X.fillStyle=panic?'#f00':'#333';X.beginPath();X.arc(-2,-3,1.5,0,Math.PI*2);X.arc(2,-3,1.5,0,Math.PI*2);X.fill();
  if(h.hasWeapon){X.strokeStyle='#aaa';X.lineWidth=2;X.beginPath();X.moveTo(h.size,0);X.lineTo(h.size+12,-4);X.stroke();
    X.fillStyle='#ccc';X.beginPath();X.arc(h.size+12,-4,2,0,Math.PI*2);X.fill()}
  if(h.hasShield){X.strokeStyle='#888';X.lineWidth=2;X.beginPath();X.arc(-h.size-2,0,6,0,Math.PI*2);X.stroke()}
  if(h.hasTorch){X.fillStyle='#ff6600';X.beginPath();X.arc(h.size+2,-h.size-6,3+Math.sin(dayTime*5+h.x)*1.5,0,Math.PI*2);X.fill();
    X.strokeStyle='#654';X.lineWidth=2;X.beginPath();X.moveTo(h.size,-h.size);X.lineTo(h.size+2,-h.size-8);X.stroke()}
  if(h.hp<h.maxHp){X.fillStyle='#400';X.fillRect(-h.size,-h.size-8,h.size*2,3);X.fillStyle='#f00';X.fillRect(-h.size,-h.size-8,h.size*2*(h.hp/h.maxHp),3)}
  X.restore();
}

function draw(){
  X.fillStyle='#0d0d15';X.fillRect(0,0,W,H);
  let gs=60,ox=-cam.x%gs,oy=-cam.y%gs;
  X.strokeStyle='#151520';X.lineWidth=1;
  for(let x=ox;x<W;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=oy;y<H;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}

  for(let t of torches){
    let tx=t.x-cam.x,ty=t.y-cam.y;
    if(tx<-100||tx>W+100||ty<-100||ty>H+100)continue;
    let flicker=.7+Math.sin(dayTime*3+t.phase)*.3;
    let grad=X.createRadialGradient(tx,ty,0,tx,ty,60*flicker);
    grad.addColorStop(0,'rgba(255,150,50,.15)');grad.addColorStop(1,'rgba(255,100,0,0)');
    X.fillStyle=grad;X.fillRect(tx-60,ty-60,120,120);
    X.fillStyle='#ff6600';X.beginPath();X.arc(tx,ty,3+Math.sin(dayTime*5+t.phase)*1.5,0,Math.PI*2);X.fill();
  }

  for(let b of buildings){
    let bx=b.x-cam.x,by=b.y-cam.y;
    if(bx+b.w<-10||bx>W+10||by+b.h<-10||by>H+10)continue;
    X.fillStyle=b.c;X.fillRect(bx,by,b.w,b.h);
    X.strokeStyle='#222';X.lineWidth=1;X.strokeRect(bx,by,b.w,b.h);
    X.fillStyle='#1a1a2a';
    for(let wx=bx+8;wx<bx+b.w-8;wx+=16)for(let wy=by+8;wy<by+b.h-8;wy+=16){
      X.fillRect(wx,wy,6,8);
    }
  }

  if(mistActive>0){
    let grad=X.createRadialGradient(player.x-cam.x,player.y-cam.y,0,player.x-cam.x,player.y-cam.y,MIST_RANGE);
    grad.addColorStop(0,'rgba(100,0,180,.3)');grad.addColorStop(.7,'rgba(80,0,150,.15)');grad.addColorStop(1,'rgba(60,0,120,0)');
    X.fillStyle=grad;X.beginPath();X.arc(player.x-cam.x,player.y-cam.y,MIST_RANGE,0,Math.PI*2);X.fill();
  }

  for(let h of humans)drawHuman(h);
  drawVampire(player.x,player.y);

  for(let p of particles){
    let a=p.life/p.maxLife;X.globalAlpha=a;X.fillStyle=p.color;
    X.fillRect(p.x-cam.x-p.size/2,p.y-cam.y-p.size/2,p.size*a+1,p.size*a+1);
  }
  X.globalAlpha=1;

  for(let f of floats){
    X.globalAlpha=Math.min(1,f.life);X.fillStyle=f.color;X.font='bold 12px Courier New';X.textAlign='center';
    X.fillText(f.text,f.x-cam.x,f.y-cam.y);
  }
  X.globalAlpha=1;

  let mx=player.x-cam.x,my=player.y-cam.y;
  X.strokeStyle='rgba(255,255,255,.15)';X.lineWidth=1;X.beginPath();X.arc(mx,my,FEED_RANGE,0,Math.PI*2);X.stroke();

  // Minimap
  M.fillStyle='#0a0a12';M.fillRect(0,0,120,120);
  let ms=120/WORLD;
  M.fillStyle='#333';for(let b of buildings)M.fillRect(b.x*ms,b.y*ms,Math.max(1,b.w*ms),Math.max(1,b.h*ms));
  M.fillStyle='#f44';for(let h of humans)M.fillRect(h.x*ms-.5,h.y*ms-.5,1.5,1.5);
  M.fillStyle='#0f0';M.fillRect(player.x*ms-2,player.y*ms-2,4,4);
  M.strokeStyle='#555';M.strokeRect((cam.x)*ms,(cam.y)*ms,W*ms,H*ms);
}

function gameOver(){
  state='gameover';
  document.getElementById('overlay').style.display='flex';
  document.getElementById('overlay').querySelector('h1').textContent='💀 YOU PERISHED';
  document.getElementById('overlay').querySelector('p').innerHTML='Survived '+Math.floor(survTime/60)+'m '+Math.floor(survTime%60)+'s<br>Kills: '+kills+' | Level: '+level;
  document.getElementById('startBtn').textContent='REAWAKEN';
}

function startGame(){
  init();state='playing';
  document.getElementById('overlay').style.display='none';
}

document.getElementById('startBtn').addEventListener('click',startGame);
addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '&&state==='playing'&&mistCooldown<=0&&blood>=MIST_COST){
    blood-=MIST_COST;mistActive=1.5;mistCooldown=4;
    addFloat(player.x,player.y-30,'BLOOD MIST!','#c0f');
    for(let i=0;i<30;i++){let a=Math.random()*Math.PI*2,r=Math.random()*MIST_RANGE;
      addParticle(player.x+Math.cos(a)*r,player.y+Math.sin(a)*r,Math.cos(a)*2,Math.sin(a)*2,.8,'#9b30ff',4)}
  }
  if((e.key==='Shift')&&state==='playing'&&dashEnergy>=DASH_COST&&dashCooldown<=0&&!player.dashing){
    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])dy=-1;
    if(keys['s']||keys['arrowdown'])dy=1;
    if(keys['a']||keys['arrowleft'])dx=-1;
    if(keys['d']||keys['arrowright'])dx=1;
    if(!dx&&!dy){dx=mouse.x-W/2;dy=mouse.y-H/2}
    let len=Math.sqrt(dx*dx+dy*dy)||1;dx/=len;dy/=len;
    player.dashing=.2;player.dashDx=dx;player.dashDy=dy;
    dashEnergy-=DASH_COST;dashCooldown=DASH_CD;player.invuln=.25;
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
addEventListener('mousedown',e=>{if(state==='playing')mouse.down=true});
addEventListener('mouseup',()=>{mouse.down=false});
addEventListener('contextmenu',e=>e.preventDefault());

let lastTime=0;
function loop(t){
  let dt=Math.min(.05,(t-lastTime)/1000);lastTime=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
