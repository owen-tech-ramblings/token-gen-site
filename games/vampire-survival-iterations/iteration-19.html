<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival — Iteration 19</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{image-rendering:pixelated;cursor:crosshair;display:block}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.88);z-index:10;pointer-events:all}
#menu h1{color:#cc2222;font-size:38px;text-shadow:0 0 24px #ff0000;margin-bottom:4px;letter-spacing:4px}
#menu h2{color:#777;font-size:13px;margin-bottom:16px}
#menu .info{color:#999;font-size:12px;margin:3px 0}
#menu button{margin-top:18px;padding:11px 36px;font-size:17px;font-family:monospace;background:#881111;color:#fff;border:2px solid #cc2222;cursor:pointer;pointer-events:all;letter-spacing:2px}
#menu button:hover{background:#aa2222}
#hs{color:#888;font-size:11px;margin-top:14px;text-align:center;line-height:1.7;max-width:320px}
#hs span{color:#cc2222}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<h1>🧛 VAMPIRE SURVIVAL</h1>
<h2>— Iteration 19 —</h2>
<div class="info">WASD/Arrows: Move &nbsp;|&nbsp; Mouse: Feed &nbsp;|&nbsp; Space: Dash</div>
<div class="info">Survive. Feed. Keep blood above zero.</div>
<div class="info">Humans fortify districts and create sanctified zones.</div>
<button id="startBtn">AWAKEN</button>
<div id="hs"></div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W=800,H=600;
function resize(){W=C.width=Math.min(innerWidth,960);H=C.height=Math.min(innerHeight,720)}
resize();addEventListener('resize',resize);

let G={},keys={},mouse={x:0,y:0,down:false},running=false,gameOver=false;
let highScores=[];
try{highScores=JSON.parse(localStorage.getItem('vs19_hs'))||[]}catch(e){highScores=[]}
function saveHS(s,t){try{highScores.push({s,t,d:new Date().toLocaleDateString()});highScores.sort((a,b)=>b.s-a.s);highScores=highScores.slice(0,10);localStorage.setItem('vs19_hs',JSON.stringify(highScores))}catch(e){}}
function showHS(){let h=document.getElementById('hs');if(!highScores.length){h.innerHTML='<span>No scores yet</span>';return}h.innerHTML='<span>TOP SCORES</span><br>'+highScores.slice(0,5).map((e,i)=>`${i+1}. ${e.t}s | Score: ${e.s}`).join('<br>')}
showHS();

const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const rand=(a,b)=>Math.random()*(b-a)+a;
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const TAU=Math.PI*2;

// Particles
let particles=[];
function emit(x,y,n,col,speed,life,size){for(let i=0;i<n;i++){let a=rand(0,TAU),s=rand(speed*.3,speed);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(life*.5,life),maxLife:life,col,sz:size||3})}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=.96;p.vy*=.96;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(let p of particles){let a=p.life/p.maxLife;X.globalAlpha=a;X.fillStyle=p.col;X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz*a+1,p.sz*a+1)}X.globalAlpha=1}

// Screen shake
let shake={x:0,y:0,intensity:0};
function doShake(i){shake.intensity=Math.max(shake.intensity,i)}
function updateShake(dt){shake.intensity*=.9;if(shake.intensity<.1)shake.intensity=0;shake.x=(Math.random()-.5)*shake.intensity*2;shake.y=(Math.random()-.5)*shake.intensity*2}

// Districts
let districts=[];
function initDistricts(){districts=[];for(let i=0;i<5;i++){let d={x:rand(60,W-200),y:rand(60,H-160),w:rand(120,220),h:rand(90,150),type:randInt(0,3),buildings:[],fortified:false,sanctified:false,sanctTimer:0,light:rand(.3,.8),name:['Old Town','Market','Church','Alley','Square'][i]};genBuildings(d);districts.push(d)}}
function genBuildings(d){d.buildings=[];let cols=Math.floor(d.w/28),rows=Math.floor(d.h/22);for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(Math.random()<.55)d.buildings.push({x:d.x+c*28+4,y:d.y+r*22+4,w:rand(14,22),h:rand(14,18),shade:rand(.12,.32)})}}
initDistricts();

// Weather
let weather={type:'clear',timer:0,intensity:0,raindrops:[],lightning:0};
function updateWeather(dt){weather.timer-=dt;if(weather.timer<=0){weather.timer=rand(12,35);let r=Math.random();if(r<.35)weather.type='clear';else if(r<.65)weather.type='rain';else if(r<.85)weather.type='fog';else weather.type='storm'}weather.intensity=lerp(weather.intensity,weather.type==='clear'?0:weather.type==='storm'?1:.45,.015);if(weather.type==='rain'||weather.type==='storm'){for(let i=0;i<weather.intensity*4;i++)weather.raindrops.push({x:rand(0,W),y:-5,speed:rand(250,450),len:rand(8,16)});for(let i=weather.raindrops.length-1;i>=0;i--){let r=weather.raindrops[i];r.y+=r.speed*dt;r.x-=40*dt;if(r.y>H)weather.raindrops.splice(i,1)}}if(weather.type==='storm'){weather.lightning-=dt;if(weather.lightning<=0&&Math.random()<.02){weather.lightning=rand(1,4);weather.lightningFlash=1}}weather.lightningFlash=lerp(weather.lightningFlash||0,0,.1)}
function drawWeather(){if(weather.intensity<.05)return;if(weather.type==='fog'){X.fillStyle=`rgba(80,80,100,${weather.intensity*.18})`;X.fillRect(0,0,W,H)}if(weather.type==='rain'||weather.type==='storm'){X.strokeStyle=`rgba(140,160,200,${weather.intensity*.35})`;X.lineWidth=1;X.beginPath();for(let r of weather.raindrops){X.moveTo(r.x,r.y);X.lineTo(r.x-3,r.y+r.len)}X.stroke()}if(weather.lightningFlash>.01){X.fillStyle=`rgba(200,200,255,${weather.lightningFlash*.15})`;X.fillRect(0,0,W,H)}}

// Player
function initPlayer(){return{x:W/2,y:H/2,speed:165,blood:100,maxBlood:100,xp:0,level:1,xpNeeded:55,dashCD:0,dashTimer:0,angle:0,feedRange:42,feedCD:0,hitFlash:0,invuln:0}}

// Humans
let humans=[];
const H_TYPES=['civilian','guard','hunter','elite'];
const H_COLS=['#8B7355','#556B8A','#8B4513','#4A0E0E'];
const H_ARMOR=[0,1,2,3];
function spawnHuman(){let tier=Math.min(3,Math.floor(G.time/35));let typeIdx=Math.random()<.25+tier*.18?Math.min(3,randInt(0,tier)):0;let d=districts[randInt(0,districts.length-1)];let sx=d.x+rand(10,d.w-10),sy=d.y+rand(10,d.h-10);if(Math.random()<.3){let side=randInt(0,3);if(side===0){sx=rand(0,W);sy=-20}else if(side===1){sx=W+20;sy=rand(0,H)}else if(side===2){sx=rand(0,W);sy=H+20}else{sx=-20;sy=rand(0,H)}}let h={x:sx,y:sy,type:typeIdx,tier,tierLabel:H_TYPES[typeIdx],speed:rand(35,55)+tier*12,hp:2+typeIdx*2,maxHp:2+typeIdx*2,state:'roam',stateTimer:rand(2,5),target:null,angle:rand(0,TAU),armor:H_ARMOR[typeIdx],hasTorch:typeIdx>=1&&Math.random()<.3+tier*.25,hasShield:typeIdx>=2&&Math.random()<.35,hasCross:typeIdx>=2&&Math.random()<.3,aggroRange:90+typeIdx*45+tier*25,attackCD:0,hitFlash:0,patrolTarget:null,investigateTarget:null,group:null,alertLevel:0};humans.push(h);return h}

function updateHuman(h,dt){
h.stateTimer-=dt;h.attackCD-=dt;h.hitFlash-=dt;
let dx=G.player.x-h.x,dy=G.player.y-h.y,d=Math.hypot(dx,dy);
let nearPlayer=d<h.aggroRange;
if(nearPlayer){h.alertLevel=Math.min(3,h.alertLevel+.5*dt);if(h.state!=='flee')h.state=h.type>=2?'hunt':'investigate'}else{h.alertLevel=Math.max(0,h.alertLevel-.2*dt)}
if(h.state==='roam'&&h.stateTimer<=0){h.stateTimer=rand(2,6);let d=districts[randInt(0,districts.length-1)];h.patrolTarget={x:d.x+rand(10,d.w-10),y:d.y+rand(10,d.h-10)};h.state='patrol'}
if(h.state==='patrol'&&h.patrolTarget){let pd=dist(h,h.patrolTarget);if(pd<25){h.state='roam';h.stateTimer=rand(1,4)}else{h.angle=Math.atan2(h.patrolTarget.y-h.y,h.patrolTarget.x-h.x)}}
if(h.state==='investigate'){if(!h.investigateTarget||dist(h,h.investigateTarget)<35){h.investigateTarget={x:G.player.x+rand(-120,120),y:G.player.y+rand(-120,120)};h.stateTimer=rand(2,4)}else{h.angle=Math.atan2(h.investigateTarget.y-h.y,h.investigateTarget.x-h.x)}}
if(h.state==='hunt'){h.angle=Math.atan2(dy,dx);if(d<28&&h.attackCD<=0){if(G.player.invuln<=0){G.player.blood-=1+h.tier*.5;G.player.hitFlash=.2;doShake(4);emit(G.player.x,G.player.y,6,'#ff0000',80,.4,3)}h.attackCD=.8;if(G.player.blood<=0)endGame()}}
if(h.state==='flee'){h.angle=Math.atan2(-dy,-dx);if(h.stateTimer<=0)h.state='roam'}
let spd=h.speed*(h.state==='flee'?1.6:h.state==='hunt'?1.25:1);
h.x+=Math.cos(h.angle)*spd*dt;h.y+=Math.sin(h.angle)*spd*dt;
h.x=clamp(h.x,8,W-8);h.y=clamp(h.y,8,H-8);
if(h.hasTorch&&Math.random()<.08)emit(h.x+rand(-6,6),h.y+rand(-6,6),1,'#ff8800',20,.3,2);
}

function drawHuman(h){
let s=9+Math.floor(h.tier*1.5);
X.save();X.translate(h.x,h.y);
let col=h.hitFlash>.0?'#fff':H_COLS[h.type];
X.fillStyle=col;X.fillRect(-s/2,-s/2,s,s);
if(h.armor>0){X.fillStyle=`rgba(90,90,110,${h.armor*.22})`;X.fillRect(-s/2-1,-s/2-1,s+2,s+2)}
if(h.hasShield){X.fillStyle='#778899';X.fillRect(s/2-1,-s/2,4,s)}
if(h.hasTorch){X.fillStyle='#ff6600';X.fillRect(-s/2-4,-s/2,3,6);X.fillStyle='#ffaa00';X.fillRect(-s/2-3,-s/2-3,5,4)}
if(h.hasCross){X.fillStyle='#ffdd44';X.fillRect(-1,-s/2-7,2,9);X.fillRect(-3,-s/2-5,6,2)}
X.fillStyle=h.state==='hunt'?'#ff0000':h.alertLevel>1?'#ff8800':'#ffff00';
let ex=Math.cos(h.angle)*2,ey=Math.sin(h.angle)*2;
X.fillRect(-2+ex,-2+ey,2,2);X.fillRect(1+ex,-2+ey,2,2);
if(h.tier>0){X.fillStyle='#ff4444';for(let t=0;t<h.tier;t++)X.fillRect(-s/2+t*4,-s/2-4,3,2)}
X.restore();
}

// Blood drops
let bloodDrops=[];
function spawnBloodDrop(x,y){bloodDrops.push({x,y,life:12+rand(0,8),maxLife:20,sz:rand(2,5)})}

// Sanctified zones
let sanctZones=[];
function updateSanctified(dt){
for(let i=sanctZones.length-1;i>=0;i--){let z=sanctZones[i];z.timer-=dt;z.pulse+=dt;if(z.timer<=0){sanctZones.splice(i,1);continue}
let p=G.player;if(dist(p,z)<z.r){if(p.invuln<=0){p.blood-=dt*3;p.hitFlash=.1;doShake(2)}}
if(Math.random()<.05)emit(z.x+rand(-z.r,z.r),z.y+rand(-z.r,z.r),1,'#ffdd44',15,.4,2)}
for(let d of districts){if(d.fortified&&!d.sanctified&&G.time>40&&Math.random()<.002){d.sanctified=true;sanctZones.push({x:d.x+d.w/2,y:d.y+d.h/2,r:60,timer:25,pulse:0})}}}

function drawSanctified(){for(let z of sanctZones){let a=.15+Math.sin(z.pulse*3)*.08;X.fillStyle=`rgba(255,220,100,${a})`;X.beginPath();X.arc(z.x,z.y,z.r,0,TAU);X.fill();X.strokeStyle=`rgba(255,220,100,${a*1.5})`;X.lineWidth=1;X.beginPath();X.arc(z.x,z.y,z.r,0,TAU);X.stroke();X.fillStyle=`rgba(255,220,100,${a*2})`;X.font='8px monospace';X.textAlign='center';X.fillText('✝',z.x,z.y+3)}}

// District update
function updateDistricts(dt){
for(let d of districts){
if(!d.fortified&&G.time>25){let nearHuman=humans.some(h=>dist(h,{x:d.x+d.w/2,y:d.y+d.h/2})<120&&h.tier>=1);if(nearHuman&&Math.random()<.004){d.fortified=true;emit(d.x+d.w/2,d.y+d.h/2,12,'#888888',60,.8,4)}}
d.light=lerp(d.light,.4+Math.sin(G.time*.08+d.x)*.2,.01);
}}

// Day/night
function getDayNight(){let t=(G.time%120)/120;return clamp(Math.sin(t*Math.PI)*.5+.5,0,1)}

// Drawing
function drawBackground(){
let day=getDayNight();
let r=lerp(8,35,day),g=lerp(8,25,day),b=lerp(12,22,day);
X.fillStyle=`rgb(${r},${g},${b})`;X.fillRect(0,0,W,H);
X.fillStyle=`rgba(18,18,22,0.4)`;
for(let i=0;i<60;i++){let gx=(i*137+G.time*.05)%W,gy=(i*251)%H;X.fillRect(gx,gy,2,2)}
}

function drawDistricts(){
for(let d of districts){
X.fillStyle=`rgba(${25+d.light*18},${20+d.light*12},${18+d.light*8},0.55)`;
X.fillRect(d.x,d.y,d.w,d.h);
for(let b of d.buildings){
X.fillStyle=`rgb(${Math.floor(b.shade*55)},${Math.floor(b.shade*45)},${Math.floor(b.shade*35)})`;
X.fillRect(b.x,b.y,b.w,b.h);
if(Math.random()<.25){X.fillStyle=`rgba(255,200,100,${rand(.08,.25)})`;X.fillRect(b.x+3,b.y+3,4,4)}
}
if(d.fortified){
X.strokeStyle='rgba(140,140,140,0.45)';X.lineWidth=2;X.strokeRect(d.x,d.y,d.w,d.h);
X.fillStyle='rgba(140,140,140,0.25)';
for(let i=0;i<4;i++){let bx=d.x+i*(d.w/4)+8,by=d.y-4;X.fillRect(bx,by,8,8)}
X.fillStyle='rgba(200,200,200,0.3)';X.font='8px monospace';X.textAlign='center';X.fillText('FORTIFIED',d.x+d.w/2,d.y-6)}
if(d.sanctified){X.fillStyle='rgba(255,220,100,0.15)';X.fillRect(d.x,d.y,d.w,d.h)}
}}

function drawBloodDrops(){
for(let i=bloodDrops.length-1;i>=0;i--){
let b=bloodDrops[i];b.life-=.016;if(b.life<=0){bloodDrops.splice(i,1);continue}
let a=b.life/b.maxLife;X.fillStyle=`rgba(100,0,0,${a*.5})`;X.beginPath();X.arc(b.x,b.y,b.sz*a,0,TAU);X.fill()}}

function drawPlayer(){
let p=G.player;
X.fillStyle='rgba(0,0,0,0.25)';X.beginPath();X.ellipse(p.x,p.y+10,12,5,0,0,TAU);X.fill();
let col=p.hitFlash>.0?'#ff6666':'#2a0a2a';
X.fillStyle=col;X.fillRect(p.x-8,p.y-10,16,20);
X.fillStyle='#440022';X.beginPath();X.moveTo(p.x-8,p.y-8);X.lineTo(p.x-14,p.y+12);X.lineTo(p.x+14,p.y+12);X.lineTo(p.x+8,p.y-8);X.fill();
X.fillStyle='#ddaacc';X.fillRect(p.x-5,p.y-16,10,8);
X.fillStyle='#ff0000';X.fillRect(p.x-4,p.y-14,3,2);X.fillRect(p.x+1,p.y-14,3,2);
X.fillStyle='#fff';X.fillRect(p.x-2,p.y-9,1,2);X.fillRect(p.x+1,p.y-9,1,2);
if(p.level>1){X.fillStyle='#ffcc00';X.font='8px monospace';X.textAlign='center';X.fillText('Lv'+p.level,p.x,p.y-20)}
if(p.dashCD>0){X.strokeStyle='rgba(100,150,255,0.4)';X.lineWidth=2;X.beginPath();X.arc(p.x,p.y,18,-Math.PI/2,-Math.PI/2+TAU*(1-p.dashCD/3));X.stroke()}
if(p.invuln>0){X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;X.beginPath();X.arc(p.x,p.y,16,0,TAU);X.stroke()}
}

// Phase banner
let phaseBanner={text:'',timer:0};

function drawHUD(){
let p=G.player;
X.fillStyle='rgba(0,0,0,0.55)';X.fillRect(8,8,210,26);
X.fillStyle='#2a0000';X.fillRect(10,10,206,22);
let bw=206*(p.blood/p.maxBlood);
X.fillStyle=p.blood<30?'#ff2222':'#cc0000';X.fillRect(10,10,bw,22);
X.strokeStyle='#550000';X.lineWidth=1;X.strokeRect(10,10,206,22);
X.fillStyle='#fff';X.font='bold 11px monospace';X.textAlign='left';
X.fillText(`BLOOD: ${Math.ceil(p.blood)}/${p.maxBlood}`,14,25);

X.textAlign='center';X.font='bold 15px monospace';X.fillStyle='#ddd';
X.fillText(`TIME: ${Math.floor(G.time)}s`,W/2,22);

X.textAlign='right';X.font='bold 13px monospace';X.fillStyle='#cc8800';
X.fillText(`SCORE: ${G.score}`,W-10,22);

X.textAlign='left';X.font='10px monospace';X.fillStyle='#aaa';
X.fillText(`Lv.${p.level} XP:${Math.floor(p.xp)}/${p.xpNeeded}`,10,42);
X.fillStyle='#2a2a2a';X.fillRect(10,46,90,4);X.fillStyle='#6644aa';X.fillRect(10,46,90*(p.xp/p.xpNeeded),4);

let phase=Math.floor(G.time/30)+1;
let phaseNames=['Dusk','Nightfall','Darkness','Blood Moon','Eclipse'];
let pn=phaseNames[Math.min(phase-1,phaseNames.length-1)];
X.textAlign='center';X.font='bold 10px monospace';
X.fillStyle=phase>=4?'#ff4444':phase>=3?'#cc6644':'#888';
X.fillText(`PHASE ${phase}: ${pn}`,W/2,42);
let phaseProg=(G.time%30)/30;
X.fillStyle='#222';X.fillRect(W/2-40,46,80,3);X.fillStyle=phase>=4?'#aa2222':'#555';X.fillRect(W/2-40,46,80*phaseProg,3);

if(weather.intensity>.1){X.textAlign='left';X.font='9px monospace';X.fillStyle='#7788aa';
X.fillText(weather.type==='storm'?'⛈ STORM':weather.type==='rain'?'🌧 RAIN':weather.type==='fog'?'🌫 FOG':'☀ CLEAR',10,H-10)}

X.textAlign='right';X.font='9px monospace';X.fillStyle='#555';
X.fillText('Iteration 19',W-10,H-10);

X.textAlign='left';X.font='9px monospace';X.fillStyle='#aa6666';
X.fillText(`Humans: ${humans.length} | Sanctified: ${sanctZones.length}`,10,H-10);

X.textAlign='center';X.font='8px monospace';X.fillStyle='#333';
X.fillText('WASD:Move | Click:Feed | Space:Dash',W/2,H-10);

// Phase banner
if(phaseBanner.timer>0){let a=phaseBanner.timer<.5?phaseBanner.timer*2:phaseBanner.timer>2?1-(phaseBanner.timer-2):1;X.globalAlpha=a;X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(W/2-140,60,280,30);X.fillStyle=phase>=4?'#ff4444':'#cc8800';X.font='bold 14px monospace';X.textAlign='center';X.fillText(phaseBanner.text,W/2,80);X.globalAlpha=1}
}

function drawBloodMoon(){
let phase=Math.floor(G.time/30)+1;
if(phase>=4){
let mx=W*.82,my=75,mr=22;
let grad=X.createRadialGradient(mx,my,0,mx,my,mr*2.5);
grad.addColorStop(0,'rgba(180,0,0,0.25)');grad.addColorStop(1,'rgba(180,0,0,0)');
X.fillStyle=grad;X.fillRect(mx-mr*2.5,my-mr*2.5,mr*5,mr*5);
X.fillStyle='#cc2222';X.beginPath();X.arc(mx,my,mr,0,TAU);X.fill();
X.fillStyle='#aa1111';X.beginPath();X.arc(mx+7,my-4,mr*.75,0,TAU);X.fill();
}}

// Feeding
function feed(){
let p=G.player;if(p.feedCD>0)return;
let fed=false;
for(let i=humans.length-1;i>=0;i--){
let h=humans[i];if(dist(p,h)<p.feedRange){
h.hp--;emit(h.x,h.y,8,'#cc0000',60,.5,3);spawnBloodDrop(h.x,h.y);
if(h.hp<=0){
emit(h.x,h.y,15,'#880000',100,.6,4);
p.blood=Math.min(p.maxBlood,p.blood+8+p.level*2);
p.xp+=10+h.tier*5;
G.score+=100*(h.tier+1);
humans.splice(i,1);
checkLevelUp();
}else{h.state='flee';h.stateTimer=rand(2,4)}
fed=true;p.feedCD=.25;break}}
if(!fed&&mouse.down){emit(p.x+Math.cos(p.angle)*20,p.y+Math.sin(p.angle)*20,2,'#660022',30,.2,2)}}

function checkLevelUp(){
let p=G.player;
while(p.xp>=p.xpNeeded){p.xp-=p.xpNeeded;p.level++;p.xpNeeded=Math.floor(p.xpNeeded*1.4);p.maxBlood+=10;p.blood=Math.min(p.maxBlood,p.blood+20);p.speed+=5;p.feedRange+=3;emit(p.x,p.y,20,'#aa44ff',120,.8,4);G.score+=500}}

// Dash
function dash(){
let p=G.player;if(p.dashCD>0||p.dashTimer>0)return;
p.dashTimer=.15;p.dashCD=3;p.invuln=.2;
let dx=0,dy=0;
if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
if(keys['ArrowRight']||keys['KeyD'])dx=1;
if(keys['ArrowUp']||keys['KeyW'])dy=-1;
if(keys['ArrowDown']||keys['KeyS'])dy=1;
if(dx===0&&dy===0){dx=Math.cos(p.angle);dy=Math.sin(p.angle)}
let len=Math.hypot(dx,dy);if(len>0){dx/=len;dy/=len}
p.x+=dx*130;p.y+=dy*130;
p.x=clamp(p.x,10,W-10);p.y=clamp(p.y,10,H-10);
emit(p.x,p.y,12,'#6644cc',80,.4,3);
for(let h of humans){let d=dist(p,h);if(d<45){let a=Math.atan2(h.y-p.y,h.x-p.x);h.x+=Math.cos(a)*35;h.y+=Math.sin(a)*35;h.state='flee';h.stateTimer=1.2;h.hitFlash=.15}}}

// Input
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'&&running&&!gameOver)dash();e.preventDefault()});
addEventListener('keyup',e=>{keys[e.code]=false});
C.addEventListener('mousemove',e=>{let r=C.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top});
C.addEventListener('mousedown',e=>{mouse.down=true;if(running&&!gameOver)feed()});
C.addEventListener('mouseup',()=>{mouse.down=false});
C.addEventListener('contextmenu',e=>e.preventDefault());

// Game init
function initGame(){
G={player:initPlayer(),time:0,score:0,spawnTimer:0,spawnRate:3,districtTimer:0,prevPhase:1};
humans=[];particles=[];bloodDrops=[];sanctZones=[];gameOver=false;
initDistricts();
for(let i=0;i<6;i++)spawnHuman();
weather={type:'clear',timer:20,intensity:0,raindrops:[],lightning:0};
phaseBanner={text:'',timer:0};
shake={x:0,y:0,intensity:0};
}

function endGame(){
gameOver=true;saveHS(G.score,G.time);
setTimeout(()=>{
document.getElementById('menu').style.display='flex';
showHS();
},500);
}

// Main loop
let lastTime=0;
function gameLoop(ts){
let dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
if(!running||gameOver){
if(gameOver){
X.fillStyle='rgba(0,0,0,0.75)';X.fillRect(0,0,W,H);
X.textAlign='center';X.font='bold 34px monospace';X.fillStyle='#cc2222';
X.fillText('YOU PERISHED',W/2,H/2-40);
X.font='14px monospace';X.fillStyle='#aaa';
X.fillText(`Survived: ${Math.floor(G.time)}s | Score: ${G.score} | Level: ${G.player.level}`,W/2,H/2+10);
X.font='11px monospace';X.fillStyle='#666';
X.fillText('Click AWAKEN to try again',W/2,H/2+45);
}
requestAnimationFrame(gameLoop);return}

G.time+=dt;
let p=G.player;
p.feedCD-=dt;p.dashCD-=dt;p.dashTimer-=dt;p.hitFlash-=dt;p.invuln-=dt;

let mx=0,my=0;
if(keys['ArrowLeft']||keys['KeyA'])mx=-1;
if(keys['ArrowRight']||keys['KeyD'])mx=1;
if(keys['ArrowUp']||keys['KeyW'])my=-1;
if(keys['ArrowDown']||keys['KeyS'])my=1;
if(mx||my){let len=Math.hypot(mx,my);p.x+=mx/len*p.speed*dt;p.y+=my/len*p.speed*dt;p.angle=Math.atan2(my,mx)}
p.x=clamp(p.x,10,W-10);p.y=clamp(p.y,10,H-10);

p.blood-=dt*(0.35+G.time*.006);
if(p.blood<=0){endGame();requestAnimationFrame(gameLoop);return}

G.spawnTimer-=dt;
if(G.spawnTimer<=0){G.spawnTimer=Math.max(.4,3-G.time*.018);spawnHuman()}

for(let h of humans)updateHuman(h,dt);
updateDistricts(dt);
updateSanctified(dt);
updateWeather(dt);
updateParticles(dt);
updateShake(dt);

G.score+=dt*(1+Math.floor(G.time/10));

p.angle=Math.atan2(mouse.y-p.y,mouse.x-p.x);
if(mouse.down)feed();

// Phase transition
let phase=Math.floor(G.time/30)+1;
if(phase!==G.prevPhase){G.prevPhase=phase;phaseBanner.text=`⚠ PHASE ${phase}: ${['Dusk','Nightfall','Darkness','Blood Moon','Eclipse'][Math.min(phase-1,4)]}`;phaseBanner.timer=2.5;doShake(6)}
phaseBanner.timer-=dt;

// Draw
X.save();X.translate(shake.x,shake.y);
drawBackground();
drawDistricts();
drawBloodDrops();
drawSanctified();
drawWeather();
drawBloodMoon();
for(let h of humans)drawHuman(h);
drawPlayer();
drawParticles();
X.restore();
drawHUD();

let vg=X.createRadialGradient(W/2,H/2,W*.25,W/2,H/2,W*.75);
vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.45)');
X.fillStyle=vg;X.fillRect(0,0,W,H);

requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click',()=>{
document.getElementById('menu').style.display='none';
initGame();running=true;lastTime=performance.now();
requestAnimationFrame(gameLoop);
});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
