<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival - Iteration 18</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}
canvas{image-rendering:pixelated;cursor:crosshair}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.85);z-index:10;pointer-events:all}
#menu h1{color:#cc2222;font-size:42px;text-shadow:0 0 20px #ff0000;margin-bottom:8px;letter-spacing:4px}
#menu h2{color:#888;font-size:14px;margin-bottom:20px}
#menu .info{color:#aaa;font-size:13px;margin:4px 0}
#menu button{margin-top:20px;padding:12px 40px;font-size:18px;font-family:monospace;background:#881111;color:#fff;border:2px solid #cc2222;cursor:pointer;pointer-events:all;letter-spacing:2px}
#menu button:hover{background:#aa2222}
#hs{color:#999;font-size:12px;margin-top:16px;text-align:center;line-height:1.6}
#hs span{color:#cc2222}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<h1>🧛 VAMPIRE SURVIVAL</h1>
<h2>— Iteration 18 —</h2>
<div class="info">WASD/Arrows: Move | Mouse: Feed | Space: Dash</div>
<div class="info">Survive. Feed. Keep blood above zero.</div>
<div class="info">Humans grow stronger over time. They will hunt you.</div>
<button id="startBtn">AWAKEN</button>
<div id="hs"></div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W=800,H=600;
function resize(){W=C.width=Math.min(innerWidth,960);H=C.height=Math.min(innerHeight,720)}
resize();addEventListener('resize',resize);

// Game state
let G={},keys={},mouse={x:0,y:0,down:false},running=false,gameOver=false;
let highScores=[];
try{highScores=JSON.parse(localStorage.getItem('vs18_hs'))||[]}catch(e){highScores=[]}
function saveHS(s,t){try{highScores.push({s,t,d:new Date().toLocaleDateString()});highScores.sort((a,b)=>b.s-a.s);highScores=highScores.slice(0,10);localStorage.setItem('vs18_hs',JSON.stringify(highScores))}catch(e){}}
function showHS(){let h=document.getElementById('hs');if(!highScores.length){h.innerHTML='<span>No scores yet</span>';return}h.innerHTML='<span>TOP SCORES</span><br>'+highScores.slice(0,5).map((e,i)=>`${i+1}. ${e.t}s | Score: ${e.s}`).join('<br>')}
showHS();

// Helpers
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const rand=(a,b)=>Math.random()*(b-a)+a;
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const TAU=Math.PI*2;

// Particle system (compact)
let particles=[];
function emit(x,y,n,col,speed,life,size){for(let i=0;i<n;i++){let a=rand(0,TAU),s=rand(speed*.3,speed);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(life*.5,life),maxLife:life,col,sz:size||3})}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=.96;p.vy*=.96;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(let p of particles){let a=p.life/p.maxLife;X.globalAlpha=a;X.fillStyle=p.col;X.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz*a+1,p.sz*a+1)}X.globalAlpha=1}

// Districts / environment
let districts=[];
function initDistricts(){districts=[];for(let i=0;i<6;i++){districts.push({x:rand(80,W-80),y:rand(80,H-80),w:rand(100,200),h:rand(80,160),type:randInt(0,3),buildings:[],fortified:false,light:rand(.3,.8)})}}
function genBuildings(d){d.buildings=[];let cols=Math.floor(d.w/30),rows=Math.floor(d.h/25);for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(Math.random()<.6)d.buildings.push({x:d.x+c*30+5,y:d.y+r*25+5,w:rand(15,25),h:rand(15,20),shade:rand(.15,.35)})}}
initDistricts();districts.forEach(genBuildings);

// Weather
let weather={type:'clear',timer:0,intensity:0,raindrops:[]};
function updateWeather(dt){weather.timer-=dt;if(weather.timer<=0){weather.timer=rand(15,40);let r=Math.random();if(r<.4)weather.type='clear';else if(r<.7)weather.type='rain';else if(r<.9)weather.type='fog';else weather.type='storm'}weather.intensity=lerp(weather.intensity,weather.type==='clear'?0:weather.type==='storm'?1:.5,.02);if(weather.type==='rain'||weather.type==='storm'){for(let i=0;i<weather.intensity*3;i++)weather.raindrops.push({x:rand(0,W),y:-5,speed:rand(200,400),len:rand(8,15)});for(let i=weather.raindrops.length-1;i>=0;i--){let r=weather.raindrops[i];r.y+=r.speed*dt;r.x-=30*dt;if(r.y>H)weather.raindrops.splice(i,1)}}}
function drawWeather(){if(weather.intensity<.05)return;if(weather.type==='fog'){X.fillStyle=`rgba(100,100,120,${weather.intensity*.15})`;X.fillRect(0,0,W,H)}if(weather.type==='rain'||weather.type==='storm'){X.strokeStyle=`rgba(150,170,200,${weather.intensity*.4})`;X.lineWidth=1;X.beginPath();for(let r of weather.raindrops){X.moveTo(r.x,r.y);X.lineTo(r.x-2,r.y+r.len)}X.stroke()}}

// Player
function initPlayer(){return{x:W/2,y:H/2,speed:160,blood:100,maxBlood:100,xp:0,level:1,xpNeeded:50,dashCD:0,dashTimer:0,mist:false,angle:0,feedRange:40,feedCD:0,hitFlash:0}}

// Humans
let humans=[];
const HUMAN_TYPES=['civilian','guard','hunter','elite'];
const HUMAN_COLORS=['#8B7355','#556B8A','#8B4513','#4A0E0E'];
const HUMAN_ARMOR=[0,1,2,3];
function spawnHuman(){let tier=Math.min(3,Math.floor(G.time/30));let typeIdx=Math.random()<.3+tier*.15?Math.min(3,randInt(0,tier)):0;let side=randInt(0,3),sx,sy;if(side===0){sx=rand(0,W);sy=-20}else if(side===1){sx=W+20;sy=rand(0,H)}else if(side===2){sx=rand(0,W);sy=H+20}else{sx=-20;sy=rand(0,H)}let h={x:sx,y:sy,type:typeIdx,tier,tierLabel:HUMAN_TYPES[typeIdx],speed:rand(30,50)+tier*10,hp:2+typeIdx*2,maxHp:2+typeIdx*2,state:'roam',stateTimer:rand(2,5),target:null,angle:rand(0,TAU),armor:HUMAN_ARMOR[typeIdx],hasTorch:typeIdx>=1&&Math.random()<.3+tier*.2,hasShield:typeIdx>=2&&Math.random()<.3,hasCross:typeIdx>=2&&Math.random()<.25,aggroRange:80+typeIdx*40+tier*20,attackCD:0,hitFlash:0,patrolTarget:null,investigateTarget:null};humans.push(h);return h}

function updateHuman(h,dt){
h.stateTimer-=dt;h.attackCD-=dt;h.hitFlash-=dt;
let dx=G.player.x-h.x,dy=G.player.y-h.y,d=Math.hypot(dx,dy);
let nearPlayer=d<h.aggroRange;
if(nearPlayer&&h.state!=='flee')h.state=h.type>=2?'hunt':'investigate';
if(h.state==='roam'&&h.stateTimer<=0){h.stateTimer=rand(2,6);h.patrolTarget={x:rand(60,W-60),y:rand(60,H-60)};h.state='patrol'}
if(h.state==='patrol'&&h.patrolTarget){let pd=dist(h,h.patrolTarget);if(pd<20){h.state='roam';h.stateTimer=rand(1,3)}else{h.angle=Math.atan2(h.patrolTarget.y-h.y,h.patrolTarget.x-h.x)}}
if(h.state==='investigate'){if(!h.investigateTarget||dist(h,h.investigateTarget)<30){h.investigateTarget={x:G.player.x+rand(-100,100),y:G.player.y+rand(-100,100)};h.stateTimer=rand(2,4)}else{h.angle=Math.atan2(h.investigateTarget.y-h.y,h.investigateTarget.x-h.x)}}
if(h.state==='hunt'){h.angle=Math.atan2(dy,dx);if(d<30&&h.attackCD<=0){G.player.blood-=1+h.tier*.5;G.player.hitFlash=.2;emit(G.player.x,G.player.y,5,'#ff0000',80,.4,3);h.attackCD=1;if(G.player.blood<=0)endGame()}}
if(h.state==='flee'){h.angle=Math.atan2(-dy,-dx);if(h.stateTimer<=0)h.state='roam'}
let spd=h.speed*(h.state==='flee'?1.5:h.state==='hunt'?1.2:1);
h.x+=Math.cos(h.angle)*spd*dt;h.y+=Math.sin(h.angle)*spd*dt;
h.x=clamp(h.x,10,W-10);h.y=clamp(h.y,10,H-10);
// Torch light
if(h.hasTorch&&Math.random()<.1)emit(h.x+rand(-5,5),h.y+rand(-5,5),1,'#ff8800',20,.3,2);
}

function drawHuman(h){
let s=8+Math.floor(h.tier*1.5);
X.save();X.translate(h.x,h.y);
// Body
let col=h.hitFlash>.0?'#fff':HUMAN_COLORS[h.type];
X.fillStyle=col;X.fillRect(-s/2,-s/2,s,s);
// Armor overlay
if(h.armor>0){X.fillStyle=`rgba(100,100,120,${h.armor*.2})`;X.fillRect(-s/2-1,-s/2-1,s+2,s+2)}
// Shield
if(h.hasShield){X.fillStyle='#778899';X.fillRect(s/2-2,-s/2,4,s)}
// Torch
if(h.hasTorch){X.fillStyle='#ff6600';X.fillRect(-s/2-4,-s/2,3,6);X.fillStyle='#ffaa00';X.fillRect(-s/2-3,-s/2-3,5,4)}
// Cross
if(h.hasCross){X.fillStyle='#ffdd44';X.fillRect(-1,-s/2-6,2,8);X.fillRect(-3,-s/2-4,6,2)}
// Eyes
X.fillStyle=h.state==='hunt'?'#ff0000':'#ffff00';
let ex=Math.cos(h.angle)*2,ey=Math.sin(h.angle)*2;
X.fillRect(-2+ex,-2+ey,2,2);X.fillRect(1+ex,-2+ey,2,2);
// Tier indicator
if(h.tier>0){X.fillStyle='#ff4444';X.fillRect(-s/2,-s/2-4,h.tier*3,2)}
X.restore();
}

// Blood drops on ground
let bloodDrops=[];
function spawnBloodDrop(x,y){bloodDrops.push({x,y,life:15+rand(0,10),maxLife:25,sz:rand(2,5)})}

// District fortification
function updateDistricts(dt){
for(let d of districts){
if(!d.fortified&&G.time>20){
let nearHuman=humans.some(h=>dist(h,d)<100&&h.tier>=1);
if(nearHuman&&Math.random()<.005){d.fortified=true;emit(d.x+d.w/2,d.y+d.h/2,10,'#888888',60,.8,4)}}
d.light=lerp(d.light,.5+Math.sin(G.time*.1+d.x)*.2,.01);
}}

// Day/night cycle
function getDayNight(){let t=(G.time%120)/120;return clamp(Math.sin(t*Math.PI)*.5+.5,0,1)}

// Drawing
function drawBackground(){
let day=getDayNight();
let r=lerp(10,40,day),g=lerp(10,30,day),b=lerp(15,25,day);
X.fillStyle=`rgb(${r},${g},${b})`;X.fillRect(0,0,W,H);
// Ground texture
X.fillStyle=`rgba(20,20,25,0.5)`;
for(let i=0;i<80;i++){let gx=(i*137+G.time*.1)%W,gy=(i*251)%H;X.fillRect(gx,gy,2,2)}
}

function drawDistricts(){
for(let d of districts){
X.fillStyle=`rgba(${30+d.light*20},${25+d.light*15},${20+d.light*10},0.6)`;
X.fillRect(d.x,d.y,d.w,d.h);
// Buildings
for(let b of d.buildings){
X.fillStyle=`rgb(${Math.floor(b.shade*60)},${Math.floor(b.shade*50)},${Math.floor(b.shade*40)})`;
X.fillRect(b.x,b.y,b.w,b.h);
// Windows
if(Math.random()<.3){X.fillStyle=`rgba(255,200,100,${rand(.1,.3)})`;X.fillRect(b.x+3,b.y+3,4,4)}
}
// Fortification
if(d.fortified){
X.strokeStyle='rgba(150,150,150,0.5)';X.lineWidth=2;X.strokeRect(d.x,d.y,d.w,d.h);
X.fillStyle='rgba(150,150,150,0.3)';
for(let i=0;i<4;i++){let bx=d.x+i*(d.w/4)+10,by=d.y-5;X.fillRect(bx,by,8,10)}
}
}
}

function drawBloodDrops(){
for(let i=bloodDrops.length-1;i>=0;i--){
let b=bloodDrops[i];b.life-=.016;if(b.life<=0){bloodDrops.splice(i,1);continue}
let a=b.life/b.maxLife;X.fillStyle=`rgba(120,0,0,${a*.6})`;X.beginPath();X.arc(b.x,b.y,b.sz*a,0,TAU);X.fill()}}

function drawPlayer(){
let p=G.player;
// Shadow
X.fillStyle='rgba(0,0,0,0.3)';X.beginPath();X.ellipse(p.x,p.y+10,12,5,0,0,TAU);X.fill();
// Body
let col=p.hitFlash>.0?'#ff6666':'#2a0a2a';
X.fillStyle=col;X.fillRect(p.x-8,p.y-10,16,20);
// Cape
X.fillStyle='#440022';X.beginPath();X.moveTo(p.x-8,p.y-8);X.lineTo(p.x-14,p.y+12);X.lineTo(p.x+14,p.y+12);X.lineTo(p.x+8,p.y-8);X.fill();
// Head
X.fillStyle='#ddaacc';X.fillRect(p.x-5,p.y-16,10,8);
// Eyes
X.fillStyle='#ff0000';X.fillRect(p.x-4,p.y-14,3,2);X.fillRect(p.x+1,p.y-14,3,2);
// Fangs hint
X.fillStyle='#fff';X.fillRect(p.x-2,p.y-9,1,2);X.fillRect(p.x+1,p.y-9,1,2);
// Level indicator
if(p.level>1){X.fillStyle='#ffcc00';X.font='8px monospace';X.textAlign='center';X.fillText('Lv'+p.level,p.x,p.y-20)}
// Dash cooldown indicator
if(p.dashCD>0){X.strokeStyle='rgba(100,150,255,0.5)';X.lineWidth=2;X.beginPath();X.arc(p.x,p.y,18,0,TAU*(1-p.dashCD/3));X.stroke()}
}

function drawHUD(){
let p=G.player;
// Blood bar
X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(10,10,204,24);
X.fillStyle='#330000';X.fillRect(12,12,200,20);
let bw=200*(p.blood/p.maxBlood);
X.fillStyle=p.blood<30?'#ff2222':'#cc0000';X.fillRect(12,12,bw,20);
X.strokeStyle='#660000';X.lineWidth=1;X.strokeRect(12,12,200,20);
X.fillStyle='#fff';X.font='bold 12px monospace';X.textAlign='left';
X.fillText(`BLOOD: ${Math.ceil(p.blood)}/${p.maxBlood}`,16,26);
// Timer
X.textAlign='center';X.font='bold 16px monospace';X.fillStyle='#ddd';
X.fillText(`TIME: ${Math.floor(G.time)}s`,W/2,24);
// Score
X.textAlign='right';X.font='bold 14px monospace';X.fillStyle='#cc8800';
X.fillText(`SCORE: ${G.score}`,W-10,24);
// Level/XP
X.textAlign='left';X.font='11px monospace';X.fillStyle='#aaa';
X.fillText(`Lv.${p.level} XP:${Math.floor(p.xp)}/${p.xpNeeded}`,10,44);
X.fillStyle='#333';X.fillRect(10,48,100,4);X.fillStyle='#6644aa';X.fillRect(10,48,100*(p.xp/p.xpNeeded),4);
// Phase indicator
let phase=Math.floor(G.time/30)+1;
let phaseNames=['Dusk','Nightfall','Darkness','Blood Moon','Eclipse'];
let pn=phaseNames[Math.min(phase-1,phaseNames.length-1)];
X.textAlign='center';X.font='bold 11px monospace';
X.fillStyle=phase>=4?'#ff4444':phase>=3?'#cc6644':'#888';
X.fillText(`PHASE ${phase}: ${pn}`,W/2,44);
// Weather
if(weather.intensity>.1){X.textAlign='left';X.font='10px monospace';X.fillStyle='#8899aa';
X.fillText(weather.type==='storm'?'⛈ STORM':weather.type==='rain'?'🌧 RAIN':weather.type==='fog'?'🌫 FOG':'☀ CLEAR',10,H-10)}
// Iteration note
X.textAlign='right';X.font='9px monospace';X.fillStyle='#555';
X.fillText('Iteration 18',W-10,H-10);
// Human count
X.textAlign='left';X.font='10px monospace';X.fillStyle='#aa6666';
X.fillText(`Humans: ${humans.length}`,10,H-10);
// Controls hint
X.textAlign='center';X.font='9px monospace';X.fillStyle='#444';
X.fillText('WASD:Move | Click:Feed | Space:Dash',W/2,H-10);
}

function drawBloodMoon(){
let phase=Math.floor(G.time/30)+1;
if(phase>=4){
let mx=W*.8,my=80,mr=25;
let grad=X.createRadialGradient(mx,my,0,mx,my,mr*2);
grad.addColorStop(0,'rgba(200,0,0,0.3)');grad.addColorStop(1,'rgba(200,0,0,0)');
X.fillStyle=grad;X.fillRect(mx-mr*2,my-mr*2,mr*4,mr*4);
X.fillStyle='#cc2222';X.beginPath();X.arc(mx,my,mr,0,TAU);X.fill();
X.fillStyle='#aa1111';X.beginPath();X.arc(mx+8,my-5,mr*.8,0,TAU);X.fill();
}}

// Feeding
function feed(){
let p=G.player;if(p.feedCD>0)return;
let fed=false;
for(let i=humans.length-1;i>=0;i--){
let h=humans[i];if(dist(p,h)<p.feedRange){
h.hp--;emit(h.x,h.y,8,'#cc0000',60,.5,3);spawnBloodDrop(h.x,h.y);
if(h.hp<=0){
emit(h.x,h.y,15,'#880000',100,.6,4);
p.blood=Math.min(p.maxBlood,p.blood+8+p.level*2);
p.xp+=10+h.tier*5;
G.score+=100*(h.tier+1);
humans.splice(i,1);
checkLevelUp();
}else{h.state='flee';h.stateTimer=rand(2,4)}
fed=true;p.feedCD=.3;break}}
if(!fed&&mouse.down){emit(p.x+Math.cos(p.angle)*20,p.y+Math.sin(p.angle)*20,2,'#660022',30,.2,2)}}

function checkLevelUp(){
let p=G.player;
while(p.xp>=p.xpNeeded){p.xp-=p.xpNeeded;p.level++;p.xpNeeded=Math.floor(p.xpNeeded*1.4);p.maxBlood+=10;p.blood=Math.min(p.maxBlood,p.blood+20);p.speed+=5;p.feedRange+=3;emit(p.x,p.y,20,'#aa44ff',120,.8,4);G.score+=500}}

// Dash
function dash(){
let p=G.player;if(p.dashCD>0||p.dashTimer>0)return;
p.dashTimer=.15;p.dashCD=3;
let dx=0,dy=0;
if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
if(keys['ArrowRight']||keys['KeyD'])dx=1;
if(keys['ArrowUp']||keys['KeyW'])dy=-1;
if(keys['ArrowDown']||keys['KeyS'])dy=1;
if(dx===0&&dy===0){dx=Math.cos(p.angle);dy=Math.sin(p.angle)}
let len=Math.hypot(dx,dy);if(len>0){dx/=len;dy/=len}
p.x+=dx*120;p.y+=dy*120;
p.x=clamp(p.x,10,W-10);p.y=clamp(p.y,10,H-10);
emit(p.x,p.y,10,'#6644cc',80,.4,3);
// Push humans
for(let h of humans){let d=dist(p,h);if(d<40){let a=Math.atan2(h.y-p.y,h.x-p.x);h.x+=Math.cos(a)*30;h.y+=Math.sin(a)*30;h.state='flee';h.stateTimer=1}}}

// Input
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'&&running&&!gameOver)dash();e.preventDefault()});
addEventListener('keyup',e=>{keys[e.code]=false});
C.addEventListener('mousemove',e=>{let r=C.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top});
C.addEventListener('mousedown',e=>{mouse.down=true;if(running&&!gameOver)feed()});
C.addEventListener('mouseup',()=>{mouse.down=false});
C.addEventListener('contextmenu',e=>e.preventDefault());

// Game init
function initGame(){
G={player:initPlayer(),time:0,score:0,spawnTimer:0,spawnRate:3,districtTimer:0};
humans=[];particles=[];bloodDrops=[];gameOver=false;
initDistricts();districts.forEach(genBuildings);
// Spawn initial humans
for(let i=0;i<5;i++)spawnHuman();
weather={type:'clear',timer:20,intensity:0,raindrops:[]};
}

function endGame(){
gameOver=true;saveHS(G.score,G.time);
let p=G.player;
X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
X.textAlign='center';X.font='bold 36px monospace';X.fillStyle='#cc2222';
X.fillText('YOU PERISHED',W/2,H/2-40);
X.font='16px monospace';X.fillStyle='#aaa';
X.fillText(`Survived: ${Math.floor(G.time)}s | Score: ${G.score} | Level: ${p.level}`,W/2,H/2+10);
X.font='12px monospace';X.fillStyle='#666';
X.fillText('Click AWAKEN to try again',W/2,H/2+50);
showHS();
document.getElementById('menu').style.display='flex';
}

// Main loop
let lastTime=0;
function gameLoop(ts){
let dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;
if(!running||gameOver){requestAnimationFrame(gameLoop);return}

// Update
G.time+=dt;
let p=G.player;
p.feedCD-=dt;p.dashCD-=dt;p.dashTimer-=dt;p.hitFlash-=dt;

// Movement
let mx=0,my=0;
if(keys['ArrowLeft']||keys['KeyA'])mx=-1;
if(keys['ArrowRight']||keys['KeyD'])mx=1;
if(keys['ArrowUp']||keys['KeyW'])my=-1;
if(keys['ArrowDown']||keys['KeyS'])my=1;
if(mx||my){let len=Math.hypot(mx,my);p.x+=mx/len*p.speed*dt;p.y+=my/len*p.speed*dt;p.angle=Math.atan2(my,mx)}
p.x=clamp(p.x,10,W-10);p.y=clamp(p.y,10,H-10);

// Passive blood drain
p.blood-=dt*(0.3+G.time*.005);
if(p.blood<=0){endGame();requestAnimationFrame(gameLoop);return}

// Spawning
G.spawnTimer-=dt;
if(G.spawnTimer<=0){G.spawnTimer=Math.max(.5,3-G.time*.02);spawnHuman()}

// Humans
for(let h of humans)updateHuman(h,dt);

// Districts
updateDistricts(dt);

// Weather
updateWeather(dt);

// Particles
updateParticles(dt);

// Score over time
G.score+=dt*(1+Math.floor(G.time/10));

// Mouse angle
p.angle=Math.atan2(mouse.y-p.y,mouse.x-p.x);

// Continuous feeding on hold
if(mouse.down)feed();

// Draw
drawBackground();
drawDistricts();
drawBloodDrops();
drawWeather();
drawBloodMoon();
for(let h of humans)drawHuman(h);
drawPlayer();
drawParticles();
drawHUD();

// Vignette
let vg=X.createRadialGradient(W/2,H/2,W*.3,W/2,H/2,W*.7);
vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.4)');
X.fillStyle=vg;X.fillRect(0,0,W,H);

requestAnimationFrame(gameLoop);
}

// Start
document.getElementById('startBtn').addEventListener('click',()=>{
document.getElementById('menu').style.display='none';
initGame();running=true;lastTime=performance.now();
requestAnimationFrame(gameLoop);
});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
