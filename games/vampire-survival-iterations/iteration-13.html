<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vampire Survival - Iteration 13</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Courier New',monospace;color:#ddd;user-select:none}
canvas{display:block;cursor:crosshair}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#topbar{display:flex;justify-content:space-between;padding:6px 12px;background:linear-gradient(180deg,rgba(0,0,0,.85),transparent)}
.bar-wrap{width:150px;height:14px;background:#1a1a2a;border:1px solid #333;border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;transition:width .1s}
.bar-text{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;text-shadow:1px 1px 2px #000}
#blood-fill{background:linear-gradient(90deg,#6b0000,#dc143c)}
#xp-fill{background:linear-gradient(90deg,#3a0060,#9b30ff)}
#dash-fill{background:linear-gradient(90deg,#0a0a2a,#4488ff)}
.stat{font-size:11px;text-shadow:1px 1px 3px #000}
#center-msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#center-msg.show{opacity:1}
#center-msg h1{font-size:28px;color:#dc143c;text-shadow:0 0 20px #8b0000}
#center-msg p{font-size:12px;color:#aaa;margin-top:6px}
#phase-banner{position:absolute;top:45px;left:50%;transform:translateX(-50%);font-size:15px;color:#ff8844;text-shadow:0 0 15px #ff4400;opacity:0;transition:opacity .5s;pointer-events:none;white-space:nowrap}
#phase-banner.show{opacity:1}
#bloodmoon{position:absolute;top:70px;left:50%;transform:translateX(-50%);font-size:14px;color:#ff4444;text-shadow:0 0 15px #ff0000;opacity:0;transition:opacity .5s;pointer-events:none;white-space:nowrap}
#bloodmoon.show{opacity:1}
#minimap{position:absolute;bottom:10px;right:10px;border:1px solid #444;border-radius:4px;pointer-events:none}
#iter{position:absolute;bottom:10px;left:10px;font-size:10px;color:#555;pointer-events:none}
#leaderboard{position:absolute;top:50px;right:10px;background:rgba(0,0,0,.85);border:1px solid #555;border-radius:4px;padding:6px 10px;font-size:10px;pointer-events:none;min-width:160px}
#leaderboard h3{color:#dc143c;margin-bottom:3px;font-size:11px}
#leaderboard .entry{color:#aaa;margin:2px 0;display:flex;justify-content:space-between}
#leaderboard .entry span{color:#ddd}
#threat-meter{position:absolute;top:45px;left:10px;font-size:11px;pointer-events:none;text-shadow:1px 1px 3px #000}
#threat-bar{width:100px;height:8px;background:#1a1a2a;border:1px solid #333;border-radius:2px;overflow:hidden;margin-top:2px}
#threat-fill{height:100%;width:0%;background:linear-gradient(90deg,#44aa44,#ffaa00,#ff4444);transition:width .3s}
#weather-indicator{position:absolute;top:95px;left:50%;transform:translateX(-50%);font-size:12px;color:#88aacc;text-shadow:0 0 10px #4488aa;opacity:0;transition:opacity .5s;pointer-events:none}
#weather-indicator.show{opacity:1}
#district-label{position:absolute;top:115px;left:50%;transform:translateX(-50%);font-size:11px;color:#aa8844;text-shadow:0 0 8px #664400;opacity:0;transition:opacity .5s;pointer-events:none}
#district-label.show{opacity:1}
#phase-info{position:absolute;top:135px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;text-shadow:0 0 5px #444;opacity:0;transition:opacity .5s;pointer-events:none}
#phase-info.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="topbar">
<div><span class="stat">🩸 Blood</span><div class="bar-wrap"><div class="bar-fill" id="blood-fill"></div><div class="bar-text" id="blood-text">100/100</div></div></div>
<div><span class="stat">⏱ <span id="timer">0:00</span></span><span class="stat" style="margin-left:8px">🏆 Lv.<span id="level">1</span></span><span class="stat" style="margin-left:8px">💀 <span id="kills">0</span></span></div>
<div><span class="stat">✨ XP</span><div class="bar-wrap"><div class="bar-fill" id="xp-fill"></div><div class="bar-text" id="xp-text">0/100</div></div></div>
<div><span class="stat">💨 Dash</span><div class="bar-wrap"><div class="bar-fill" id="dash-fill"></div><div class="bar-text" id="dash-text">Ready</div></div></div>
</div>
<div id="center-msg"><h1 id="msg-title"></h1><p id="msg-sub"></p></div>
<div id="phase-banner"></div>
<div id="bloodmoon">🌕 BLOOD MOON — Humans surge! Find the blood pool!</div>
<div id="weather-indicator"></div>
<div id="district-label"></div>
<div id="phase-info"></div>
<div id="threat-meter">⚠ Threat<div id="threat-bar"><div id="threat-fill"></div></div></div>
<canvas id="minimap" width="120" height="120"></canvas>
<div id="leaderboard"><h3>🏆 HIGH SCORES</h3><div id="lb-entries"></div></div>
<div id="iter">Iteration 13</div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),MM=document.getElementById('minimap'),MX=MM.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();addEventListener('resize',resize);
const keys={};addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(['w','a','s','d',' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault()});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=0});
let mx=0,my=0,clicking=0;
C.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
C.addEventListener('mousedown',()=>clicking=1);
C.addEventListener('mouseup',()=>clicking=0);
C.addEventListener('contextmenu',e=>e.preventDefault());

const P={x:0,y:0,r:14,blood:100,maxBlood:100,xp:0,xpNext:100,level:1,
  speed:3.2,dashMax:150,dashCDNow:0,dashing:0,dashTimer:0,dashDx:0,dashDy:0,
  feedRange:90,feedRate:2,feedTarget:null,invuln:0,angle:0};

let humans=[],particles=[],bloodPools=[],timer=0,kills=0,gameOver=0,started=0,shake=0;
let bloodMoonTimer=0,bloodMoonActive=0,bloodMoonDuration=0;
let spawnTimer=0,difficulty=1,phase=1;
let trees=[],buildings=[],sanctifiedZones=[],districts=[],guardPosts=[];
let dayNight=0,dayNightSpeed=.0025;
let weather='clear',weatherTimer=0,weatherDuration=0;
let rainDrops=[];
let camX=0,camY=0;
let dmgNums=[];
const WORLD=3200,TILE=64;

function genWorld(){
  trees=[];buildings=[];sanctifiedZones=[];districts=[];guardPosts=[];
  for(let i=0;i<140;i++){
    trees.push({x:Math.random()*WORLD,y:Math.random()*WORLD,r:10+Math.random()*16,
      shade:Math.random()*.3,type:Math.random()>.3?0:1,sway:Math.random()*Math.PI*2});
  }
  for(let i=0;i<30;i++){
    buildings.push({x:Math.random()*(WORLD-200)+100,y:Math.random()*(WORLD-200)+100,
      w:50+Math.random()*70,h:50+Math.random()*70,
      color:`hsl(${20+Math.random()*20},${10+Math.random()*15}%,${15+Math.random()*10}%)`,
      hasTorch:Math.random()<.35,windowLit:Math.random()<.4});
  }
  for(let i=0;i<8;i++){
    sanctifiedZones.push({x:Math.random()*(WORLD-400)+200,y:Math.random()*(WORLD-400)+200,
      r:60+Math.random()*40,dmg:.15+Math.random()*.1});
  }
  const names=['Old Quarter','Market District','Temple Grounds','Watchtower District','Dark Alley','Riverside','Blacksmith Row','Town Square'];
  for(let i=0;i<8;i++){
    districts.push({x:Math.random()*(WORLD-600)+300,y:Math.random()*(WORLD-600)+300,
      r:150+Math.random()*100,name:names[i],color:`hsl(${Math.random()*360},20%,15%)`});
  }
  for(let i=0;i<10;i++){
    guardPosts.push({x:Math.random()*(WORLD-200)+100,y:Math.random()*(WORLD-200)+100,
      patrolRadius:80+Math.random()*60,active:true});
  }
}
genWorld();

function getHumanTier(){
  const r=Math.random();
  if(difficulty<3)return 0;
  if(difficulty<5){if(r<.6)return 0;if(r<.85)return 1;return 2;}
  if(difficulty<8){if(r<.3)return 0;if(r<.6)return 1;if(r<.85)return 2;return 3;}
  if(r<.15)return 0;if(r<.4)return 1;if(r<.65)return 2;return 3;
}

function spawnHuman(preset){
  let x,y;
  const edge=Math.random();
  if(edge<.4){
    const side=Math.floor(Math.random()*4);
    if(side===0){x=Math.random()*WORLD;y=-50}
    else if(side===1){x=WORLD+50;y=Math.random()*WORLD}
    else if(side===2){x=Math.random()*WORLD;y=WORLD+50}
    else{x=-50;y=Math.random()*WORLD}
  }else if(edge<.7){
    const gp=guardPosts[Math.floor(Math.random()*guardPosts.length)];
    x=gp.x+(Math.random()-.5)*gp.patrolRadius;
    y=gp.y+(Math.random()-.5)*gp.patrolRadius;
  }else{
    x=Math.random()*WORLD;y=Math.random()*WORLD;
    if(Math.hypot(x-P.x,y-P.y)<200){x=Math.random()*WORLD;y=Math.random()*WORLD;}
  }
  const tier=getHumanTier();
  const def=Math.min(difficulty,12);
  const hp=[20,35,55,80][tier]+def*4;
  const spd=[1.2,1.0,.8,.6][tier]+Math.random()*.4+def*.04;
  const hasWeapon=tier>=1||(tier===0&&def>=4&&Math.random()<.35);
  const hasShield=tier>=2||(tier===1&&def>=6&&Math.random()<.25);
  const hasTorch=tier>=1&&Math.random()<.55;
  const hasSilver=tier>=3&&Math.random()<.5;
  const colors=['#8B6914','#6B4914','#4B3914','#2B2924'];
  const states=['roam','patrol','investigate','wander'];
  const state=states[Math.floor(Math.random()*states.length)];
  const roamTarget={x:Math.max(50,Math.min(WORLD-50,h.x+(Math.random()-.5)*800)),y:Math.max(50,Math.min(WORLD-50,h.y+(Math.random()-.5)*800))};
  const patrolCenter={x:Math.random()*WORLD,y:Math.random()*WORLD};
  const patrolAngle=Math.random()*Math.PI*2;
  const h={x,y,vx:0,vy:0,r:10,hp,maxHp:hp,spd,tier,
    hasWeapon,hasShield,hasTorch,hasSilver,
    stun:0,alert:0,alertTimer:0,
    attackCD:0,attackRate:Math.max(18,55-tier*10-def*2),
    color:colors[tier],state,roamTarget,patrolCenter,patrolAngle,
    stateTimer:Math.random()*300+100,
    fleeTimer:0,investigateTarget:null,
    packId:Math.random()<.4?Math.floor(Math.random()*20):-1,
    fortifyTarget:null,regroupTarget:null,
    lastDirX:Math.random()-.5,lastDirY:Math.random()-.5,
    wanderTimer:Math.random()*120+60};
  return h;
}

function spawnParticles(x,y,color,count,speed,life){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*speed;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,r:1+Math.random()*3});
  }
}

function spawnBloodPool(x,y){
  bloodPools.push({x,y,r:30,amount:50,timer:600});
  spawnParticles(x,y,'#dc143c',15,2,40);
}

function addDmgNum(x,y,text,color){
  dmgNums.push({x,y,text,color,life:45,vy:-1.5});
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function updateHumanAI(h){
  const d=dist(h,P);
  const detectRange=h.hasTorch?320:180;
  
  if(h.stun>0){h.stun--;return;}
  if(h.fleeTimer>0){h.fleeTimer--;
    const a=Math.atan2(h.y-P.y,h.x-P.x);
    h.x+=Math.cos(a)*h.spd*1.6;h.y+=Math.sin(a)*h.spd*1.6;
    if(h.hp<h.maxHp*.3&&Math.random()<.02)h.fleeTimer=120;
    return;
  }
  
  if(h.alert&&h.packId>=0){
    for(const other of humans){
      if(other!==h&&other.packId===h.packId&&!other.alert&&dist(h,other)<250){
        other.alert=1;other.alertTimer=200;other.state='hunt';
      }
    }
  }
  
  if(d<detectRange||h.alert){
    h.alert=1;h.alertTimer=400;
    if(h.state!=='hunt')h.state='hunt';
    const a=Math.atan2(P.y-h.y,P.x-h.x);
    const moveSpeed=h.spd*(h.hasShield?.7:1);
    if(d>35){h.x+=Math.cos(a)*moveSpeed;h.y+=Math.sin(a)*moveSpeed;}
    if(d<P.r+h.r+14&&h.attackCD<=0){
      let dmg=1+difficulty*.35;
      if(h.hasWeapon)dmg*=2.2;
      if(h.hasSilver)dmg*=1.6;
      if(h.hasShield)dmg*=.65;
      if(P.invuln<=0){P.blood-=dmg;P.invuln=14;shake=6;
        spawnParticles(P.x,P.y,'#ff0000',6,2.5,18);
        addDmgNum(P.x,P.y-20,'-'+Math.ceil(dmg),'#ff4444');}
      h.attackCD=h.attackRate;
    }
    if(h.attackCD>0)h.attackCD--;
    if(h.hp<h.maxHp*.25&&Math.random()<.015)h.fleeTimer=90;
    return;
  }
  
  h.stateTimer--;
  if(h.stateTimer<=0){
    const r=Math.random();
    if(r<.3){h.state='roam';h.roamTarget={x:Math.max(50,Math.min(WORLD-50,h.x+(Math.random()-.5)*900)),y:Math.max(50,Math.min(WORLD-50,h.y+(Math.random()-.5)*900));}
    }else if(r<.55){h.state='patrol';h.patrolCenter={x:h.x,y:h.y};h.patrolAngle=Math.random()*Math.PI*2;}
    else if(r<.7&&h.packId>=0){h.state='regroup';h.regroupTarget={x:h.patrolCenter.x,y:h.patrolCenter.y};}
    else if(r<.85){h.state='investigate';h.investigateTarget={x:h.x+(Math.random()-.5)*500,y:h.y+(Math.random()-.5)*500};}
    else{h.state='wander';h.wanderTimer=Math.random()*120+60;}
    h.stateTimer=Math.random()*350+120;
  }
  
  if(h.state==='roam'&&h.roamTarget){
    const a=Math.atan2(h.roamTarget.y-h.y,h.roamTarget.x-h.x);
    h.x+=Math.cos(a)*h.spd*.55;h.y+=Math.sin(a)*h.spd*.55;
    if(dist(h,h.roamTarget)<25)h.stateTimer=0;
  }else if(h.state==='patrol'&&h.patrolCenter){
    h.patrolAngle+=.008;
    const tx=h.patrolCenter.x+Math.cos(h.patrolAngle)*130;
    const ty=h.patrolCenter.y+Math.sin(h.patrolAngle)*130;
    const a=Math.atan2(ty-h.y,tx-h.x);
    h.x+=Math.cos(a)*h.spd*.45;h.y+=Math.sin(a)*h.spd*.45;
  }else if(h.state==='investigate'&&h.investigateTarget){
    const a=Math.atan2(h.investigateTarget.y-h.y,h.investigateTarget.x-h.x);
    h.x+=Math.cos(a)*h.spd*.6;h.y+=Math.sin(a)*h.spd*.6;
    if(dist(h,h.investigateTarget)<30)h.stateTimer=0;
  }else if(h.state==='regroup'&&h.regroupTarget){
    const a=Math.atan2(h.regroupTarget.y-h.y,h.regroupTarget.x-h.x);
    h.x+=Math.cos(a)*h.spd*.5;h.y+=Math.sin(a)*h.spd*.5;
    if(dist(h,h.regroupTarget)<40)h.stateTimer=0;
  }else{
    h.wanderTimer--;
    if(h.wanderTimer<=0){
      h.lastDirX=Math.random()-.5;h.lastDirY=Math.random()-.5;
      const l=Math.hypot(h.lastDirX,h.lastDirY)||1;
      h.lastDirX/=l;h.lastDirY/=l;
      h.wanderTimer=Math.random()*120+60;
    }
    h.x+=h.lastDirX*h.spd*.35;h.y+=h.lastDirY*h.spd*.35;
  }
  
  if(h.alertTimer>0)h.alertTimer--;
  else{h.alert=0;if(h.state==='hunt')h.stateTimer=0;}
}

function update(){
  if(gameOver||!started)return;
  timer++;
  difficulty=1+Math.floor(timer/480)*.65;
  const newPhase=Math.min(5,1+Math.floor(timer/600));
  if(newPhase!==phase){phase=newPhase;showPhaseBanner(phase);}
  
  spawnTimer++;
  const spawnRate=Math.max(12,65-difficulty*4);
  if(spawnTimer>=spawnRate){spawnTimer=0;
    const count=Math.min(1+Math.floor(difficulty/3),7);
    for(let i=0;i<count;i++){const h=spawnHuman();humans.push(h);}
  }
  
  dayNight+=dayNightSpeed;
  if(dayNight>1)dayNight-=1;
  
  weatherTimer++;
  if(weatherTimer>=weatherDuration){
    weatherTimer=0;
    const r=Math.random();
    if(r<.45){weather='clear';weatherDuration=600+Math.random()*600;}
    else if(r<.78){weather='fog';weatherDuration=400+Math.random()*400;}
    else{weather='rain';weatherDuration=300+Math.random()*300;}
    const wi=document.getElementById('weather-indicator');
    if(weather!=='clear'){wi.textContent=weather==='fog'?'🌫 Fog rolls in...':'🌧 Rain begins...';wi.classList.add('show');}
    else wi.classList.remove('show');
  }
  if(weather==='rain'){
    for(let i=0;i<4;i++)rainDrops.push({x:camX+Math.random()*W,y:camY-10,vy:4+Math.random()*3,life:60});
  }
  for(let i=rainDrops.length-1;i>=0;i--){
    rainDrops[i].y+=rainDrops[i].vy;rainDrops[i].x-=1;rainDrops[i].life--;
    if(rainDrops[i].life<=0)rainDrops.splice(i,1);
  }
  
  bloodMoonTimer++;
  if(!bloodMoonActive&&bloodMoonTimer>1400+Math.random()*900){
    bloodMoonActive=1;bloodMoonDuration=380;
    document.getElementById('bloodmoon').classList.add('show');
    for(let i=0;i<12;i++){const h=spawnHuman();humans.push(h);}
    const px=P.x+(Math.random()-.5)*600,py=P.y+(Math.random()-.5)*600;
    bloodPools.push({x:Math.max(50,Math.min(WORLD-50,px)),y:Math.max(50,Math.min(WORLD-50,py)),r:35,amount:80,timer:480});
    spawnParticles(px,py,'#ff0000',25,3,50);
  }
  if(bloodMoonActive){
    bloodMoonDuration--;
    if(bloodMoonDuration<=0){bloodMoonActive=0;bloodMoonTimer=0;
      document.getElementById('bloodmoon').classList.remove('show');}
  }
  
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy=-1;
  if(keys['s']||keys['arrowdown'])dy=1;
  if(keys['a']||keys['arrowleft'])dx=-1;
  if(keys['d']||keys['arrowright'])dx=1;
  if(dx||dy){const l=Math.hypot(dx,dy);dx/=l;dy/=l;}
  
  if((keys[' ']||keys['shift'])&&P.dashCDNow<=0&&!P.dashing&&(dx||dy)){
    P.dashing=1;P.dashTimer=10;P.dashDx=dx;P.dashDy=dy;P.dashCDNow=P.dashMax;P.invuln=15;
    spawnParticles(P.x,P.y,'#4488ff',14,3,20);
  }
  if(P.dashing){
    P.x+=P.dashDx*14;P.y+=P.dashDy*14;
    P.dashTimer--;
    if(P.dashTimer<=0)P.dashing=0;
  }else{
    P.x+=dx*P.speed;P.y+=dy*P.speed;
  }
  P.x=Math.max(P.r,Math.min(WORLD-P.r,P.x));
  P.y=Math.max(P.r,Math.min(WORLD-P.r,P.y));
  if(P.dashCDNow>0)P.dashCDNow--;
  if(P.invuln>0)P.invuln--;
  P.angle=Math.atan2(my-(P.y-camY),mx-(P.x-camX));
  
  for(const sz of sanctifiedZones){
    if(dist(P,sz)<sz.r+P.r){
      P.blood-=sz.dmg;
      if(timer%30===0)spawnParticles(P.x,P.y,'#ffdd44',3,1,15);
    }
  }
  
  P.feedTarget=null;
  if(clicking){
    let closest=null,cd=P.feedRange;
    for(const h of humans){
      const d=dist(P,h);
      if(d<cd){closest=h;cd=d;}
    }
    if(closest){
      P.feedTarget=closest;
      const dmg=P.feedRate+P.level*.5;
      closest.hp-=dmg;
      P.blood=Math.min(P.maxBlood,P.blood+dmg*.6);
      P.xp+=dmg*.3;
      spawnParticles(closest.x,closest.y,'#dc143c',2,2,15);
      if(closest.hp<=0){
        kills++;
        P.xp+=15+P.level*2;
        spawnParticles(closest.x,closest.y,'#8b0000',14,3,25);
        addDmgNum(closest.x,closest.y-15,'💀','#ffaa00');
        if(Math.random()<.2)spawnBloodPool(closest.x,closest.y);
      }
    }
  }
  
  for(let i=bloodPools.length-1;i>=0;i--){
    const bp=bloodPools[i];
    bp.timer--;
    if(bp.timer<=0){bloodPools.splice(i,1);continue;}
    if(dist(P,bp)<P.r+bp.r){
      P.blood=Math.min(P.maxBlood,P.blood+bp.amount);
      spawnParticles(bp.x,bp.y,'#dc143c',10,2,20);
      addDmgNum(bp.x,bp.y-15,'+'+bp.amount,'#dc143c');
      bloodPools.splice(i,1);
    }
  }
  
  while(P.xp>=P.xpNext){
    P.xp-=P.xpNext;P.level++;P.xpNext=Math.floor(P.xpNext*1.4);
    P.maxBlood+=10;P.blood=Math.min(P.blood+25,P.maxBlood);
    P.feedRate+=.3;P.speed+=.08;
    spawnParticles(P.x,P.y,'#9b30ff',25,4,30);
    shake=12;
    showMsg('LEVEL UP!','Level '+P.level+' — Stats increased!');
  }
  
  P.blood-=.03+difficulty*.007;
  if(P.blood<=0){P.blood=0;gameOver=1;saveScore();showMsg('YOU PERISHED','Survived '+formatTime(timer)+' | Kills: '+kills);}
  
  for(let i=humans.length-1;i>=0;i--){
    const h=humans[i];
    if(h.hp<=0){humans.splice(i,1);continue;}
    updateHumanAI(h);
    for(const b of buildings){
      if(h.x>b.x-5&&h.x<b.x+b.w+5&&h.y>b.y-5&&h.y<b.y+b.h+5){
        const cx=Math.max(b.x,Math.min(b.x+b.w,h.x));
        const cy=Math.max(b.y,Math.min(b.y+b.h,h.y));
        const ddx=h.x-cx,ddy=h.y-cy;
        if(ddx*ddx+ddy*ddy<h.r*h.r){
          const a=Math.atan2(ddy,ddx);
          h.x=cx+Math.cos(a)*h.r;h.y=cy+Math.sin(a)*h.r;
        }
      }
    }
    h.x=Math.max(h.r,Math.min(WORLD-h.r,h.x));
    h.y=Math.max(h.r,Math.min(WORLD-h.r,h.y));
  }
  
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.94;p.vy*=.94;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=dmgNums.length-1;i>=0;i--){
    dmgNums[i].y+=dmgNums[i].vy;dmgNums[i].life--;
    if(dmgNums[i].life<=0)dmgNums.splice(i,1);
  }
  if(shake>0)shake*=.85;
  if(shake<.1)shake=0;
  updateUI();
}

function render(){
  X.fillStyle='#0a0a12';X.fillRect(0,0,W,H);
  camX=P.x-W/2;camY=P.y-H/2;
  if(shake>0){camX+=(Math.random()-.5)*shake*2;camY+=(Math.random()-.5)*shake*2;}
  X.save();X.translate(-camX,-camY);
  
  const nightAlpha=dayNight<.5?dayNight*2:2-dayNight*2;
  const groundLight=12+Math.floor(nightAlpha*8);
  X.fillStyle=`rgb(${groundLight},${groundLight},${groundLight+8})`;
  X.fillRect(0,0,WORLD,WORLD);
  
  for(const d of districts){
    if(d.x+d.r<camX||d.x-d.r>camX+W||d.y+d.r<camY||d.y-d.r>camY+H)continue;
    const pulse=Math.sin(timer*.02+d.x)*.03+.06;
    X.fillStyle=d.color.replace(')',`,${pulse})`).replace('hsl','hsla');
    X.beginPath();X.arc(d.x,d.y,d.r,0,Math.PI*2);X.fill();
    X.strokeStyle=`rgba(170,136,68,${.15+Math.sin(timer*.03)*.05})`;
    X.lineWidth=1;X.setLineDash([8,8]);
    X.beginPath();X.arc(d.x,d.y,d.r,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
    if(dist(P,d)<d.r+100){
      X.fillStyle=`rgba(170,136,68,${.5+Math.sin(timer*.04)*.15})`;
      X.font='bold 11px monospace';X.textAlign='center';
      X.fillText(d.name,d.x,d.y-d.r-8);
    }
  }
  
  X.strokeStyle=`rgba(${26+nightAlpha*10},${26+nightAlpha*10},${37+nightAlpha*10},.4)`;
  X.lineWidth=1;
  const gs=TILE;
  for(let x=0;x<=WORLD;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,WORLD);X.stroke();}
  for(let y=0;y<=WORLD;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(WORLD,y);X.stroke();}
  
  for(const sz of sanctifiedZones){
    if(sz.x<camX-80||sz.x>camX+W+80||sz.y<camY-80||sz.y>camY+H+80)continue;
    const pulse=Math.sin(timer*.04)*.15+.25;
    X.fillStyle=`rgba(255,221,68,${pulse*.25})`;
    X.beginPath();X.arc(sz.x,sz.y,sz.r,0,Math.PI*2);X.fill();
    X.strokeStyle=`rgba(255,221,68,${pulse})`;X.lineWidth=2;
    X.beginPath();X.arc(sz.x,sz.y,sz.r,0,Math.PI*2);X.stroke();
    X.fillStyle=`rgba(255,221,68,${pulse*.7})`;
    X.fillRect(sz.x-2,sz.y-12,4,24);
    X.fillRect(sz.x-8,sz.y-4,16,4);
  }
  
  for(const b of buildings){
    if(b.x+b.w<camX||b.x>camX+W||b.y+b.h<camY||b.y>camY+H)continue;
    X.fillStyle=b.color;X.fillRect(b.x,b.y,b.w,b.h);
    X.strokeStyle='#333';X.lineWidth=2;X.strokeRect(b.x,b.y,b.w,b.h);
    X.fillStyle=`rgba(42,32,16,${.5+nightAlpha*.3})`;
    for(let wx=b.x+8;wx<b.x+b.w-8;wx+=18){
      for(let wy=b.y+8;wy<b.y+b.h-8;wy+=18){
        X.fillRect(wx,wy,7,7);
      }
    }
    if(b.hasTorch&&phase>=2){
      const flicker=Math.sin(timer*.25+b.x)*.3+.7;
      X.fillStyle=`rgba(255,${100+Math.random()*50},0,${flicker*.8})`;
      X.beginPath();X.arc(b.x+b.w/2,b.y-4,4+Math.random()*2,0,Math.PI*2);X.fill();
      X.fillStyle=`rgba(255,150,0,${.03*flicker})`;
      X.beginPath();X.arc(b.x+b.w/2,b.y-4,40,0,Math.PI*2);X.fill();
    }
    if(b.windowLit&&phase>=3){
      const flicker=Math.sin(timer*.15+b.y)*.2+.6;
      X.fillStyle=`rgba(255,200,100,${flicker*.4})`;
      X.fillRect(b.x+10,b.y+10,8,8);
      X.fillRect(b.x+b.w-18,b.y+10,8,8);
    }
  }
  
  for(const gp of guardPosts){
    if(gp.x<camX-60||gp.x>camX+W+60||gp.y<camY-60||gp.y>camY+H+60)continue;
    const pulse=Math.sin(timer*.03+gp.x)*.1+.2;
    X.strokeStyle=`rgba(255,100,50,${pulse})`;X.lineWidth=1;X.setLineDash([4,6]);
    X.beginPath();X.arc(gp.x,gp.y,gp.patrolRadius,0,Math.PI*2);X.stroke();
    X.setLineDash([]);
    X.fillStyle=`rgba(255,100,50,${pulse*.5})`;
    X.fillRect(gp.x-3,gp.y-3,6,6);
  }
  
  for(const t of trees){
    if(t.x<camX-50||t.x>camX+W+50||t.y<camY-50||t.y>camY+H+50)continue;
    const sway=Math.sin(timer*.015+t.sway)*2;
    if(t.type===0){
      X.fillStyle=`rgba(26,42,26,${.8+nightAlpha*.2})`;
      X.beginPath();X.arc(t.x+sway,t.y,t.r,0,Math.PI*2);X.fill();
      X.fillStyle=`rgba(15,31,15,${.8+nightAlpha*.2})`;
      X.beginPath();X.arc(t.x+sway-2,t.y-2,t.r*.7,0,Math.PI*2);X.fill();
    }else{
      X.fillStyle=`rgba(42,26,26,${.8+nightAlpha*.2})`;X.fillRect(t.x-4,t.y-4,8,8);
      X.fillStyle=`rgba(26,58,26,${.8+nightAlpha*.2})`;
      X.beginPath();X.arc(t.x+sway,t.y-8,t.r*.8,0,Math.PI*2);X.fill();
    }
  }
  
  for(const bp of bloodPools){
    const pulse=Math.sin(timer*.1)*.2+.8;
    X.fillStyle=`rgba(139,0,0,${.4*pulse})`;
    X.beginPath();X.arc(bp.x,bp.y,bp.r,0,Math.PI*2);X.fill();
    X.fillStyle=`rgba(220,20,60,${.6*pulse})`;
    X.beginPath();X.arc(bp.x,bp.y,bp.r*.5,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(220,20,60,.5)';X.lineWidth=2;
    X.beginPath();X.arc(bp.x,bp.y,bp.r+5,-Math.PI/2,-Math.PI/2+Math.PI*2*(bp.timer/600));X.stroke();
  }
  
  for(const h of humans){
    if(h.x<camX-40||h.x>camX+W+40||h.y<camY-40||h.y>camY+H+40)continue;
    const a=Math.atan2(P.y-h.y,P.x-h.x);
    X.save();X.translate(h.x,h.y);X.rotate(a);
    const br=h.r+h.tier*1.5;
    X.fillStyle=h.color;
    X.beginPath();X.arc(0,0,br,0,Math.PI*2);X.fill();
    X.strokeStyle=h.tier>=2?'#555':'#333';X.lineWidth=1.5;X.stroke();
    if(h.tier>=2){
      X.fillStyle=h.tier===3?'#556':'#667';
      X.beginPath();X.arc(0,0,br-2,0,Math.PI*2);X.fill();
      X.strokeStyle='#889';X.lineWidth=1;X.stroke();
    }
    if(h.hasWeapon){
      X.fillStyle=h.tier>=2?'#aaa':'#888';
      X.fillRect(br-2,-2,14+Math.floor(h.tier*2),3+h.tier);
      X.fillStyle='#654321';X.fillRect(br-2,-3,4,5+h.tier);
    }
    if(h.hasShield){
      X.fillStyle='#777';X.fillRect(-br-4,-9,6,18);
      X.strokeStyle='#555';X.lineWidth=1;X.strokeRect(-br-4,-9,6,18);
    }
    if(h.hasTorch){
      X.fillStyle='#654321';X.fillRect(-br-2,-2,4,12);
      const flicker=Math.sin(timer*.3+h.x)*.3+.7;
      X.fillStyle=`rgba(255,${100+Math.random()*50},0,${flicker})`;
      X.beginPath();X.arc(-br,-6,5+Math.random()*2,0,Math.PI*2);X.fill();
      X.fillStyle=`rgba(255,150,0,${.04*flicker})`;
      X.beginPath();X.arc(-br,-6,60,0,Math.PI*2);X.fill();
    }
    if(h.hasSilver){
      X.strokeStyle='#ccc';X.lineWidth=2;
      X.beginPath();X.arc(0,0,br+3,0,Math.PI*2);X.stroke();
    }
    if(h.tier>=1){
      X.fillStyle=h.tier===3?'#ff4444':h.tier===2?'#ffaa44':'#88aaff';
      X.font='bold 8px monospace';X.textAlign='center';
      X.fillText(['','M','H','E'][h.tier],0,-br-4);
    }
    X.restore();
    if(h.hp<h.maxHp){
      const bw=br*2+4;
      X.fillStyle='#222';X.fillRect(h.x-bw/2,h.y-br-8,bw,3);
      X.fillStyle=h.tier>=2?'#ff4444':'#c00';
      X.fillRect(h.x-bw/2,h.y-br-8,bw*(h.hp/h.maxHp),3);
    }
    if(h.alert){
      X.fillStyle='#ff4444';X.font='bold 11px monospace';X.textAlign='center';
      X.fillText('!',h.x,h.y-br-12);
    }
  }
  
  X.save();X.translate(P.x,P.y);
  const capeWave=Math.sin(timer*.08)*3;
  X.fillStyle='#1a0a2a';
  X.beginPath();X.moveTo(-8,-10);X.lineTo(-14+capeWave,12);X.lineTo(-4,8);X.closePath();X.fill();
  X.beginPath();X.moveTo(8,-10);X.lineTo(14-capeWave,12);X.lineTo(4,8);X.closePath();X.fill();
  X.fillStyle='#2a1a3a';
  X.beginPath();X.arc(0,0,P.r,0,Math.PI*2);X.fill();
  X.strokeStyle='#4a2a6a';X.lineWidth=2;X.stroke();
  const ea=P.angle;
  X.fillStyle='#ff0000';
  X.beginPath();X.arc(Math.cos(ea-.3)*6-2,Math.sin(ea-.3)*6-2,2.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(Math.cos(ea+.3)*6+2,Math.sin(ea+.3)*6+2,2.5,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';
  X.beginPath();X.moveTo(-3,4);X.lineTo(-1,8);X.lineTo(1,4);X.fill();
  X.beginPath();X.moveTo(3,4);X.lineTo(1,8);X.lineTo(-1,4);X.fill();
  if(P.dashing){
    X.strokeStyle='rgba(68,136,255,.5)';X.lineWidth=3;
    X.beginPath();X.arc(0,0,P.r+8,0,Math.PI*2);X.stroke();
  }
  if(P.invuln>0&&Math.floor(timer/3)%2){
    X.fillStyle='rgba(255,255,255,.2)';
    X.beginPath();X.arc(0,0,P.r+4,0,Math.PI*2);X.fill();
  }
  X.restore();
  
  if(P.feedTarget){
    X.strokeStyle='rgba(220,20,60,.4)';X.lineWidth=2;X.setLineDash([4,4]);
    X.beginPath();X.moveTo(P.x,P.y);X.lineTo(P.feedTarget.x,P.feedTarget.y);X.stroke();
    X.setLineDash([]);
  }
  
  for(const p of particles){
    const a=p.life/p.maxLife;
    X.globalAlpha=a;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
  
  for(const dn of dmgNums){
    const a=dn.life/45;
    X.globalAlpha=a;X.fillStyle=dn.color;
    X.font='bold 12px monospace';X.textAlign='center';
    X.fillText(dn.text,dn.x,dn.y);
  }
  X.globalAlpha=1;
  
  if(weather==='rain'){
    X.strokeStyle='rgba(150,180,220,.3)';X.lineWidth=1;
    for(const rd of rainDrops){
      X.beginPath();X.moveTo(rd.x,rd.y);X.lineTo(rd.x-1,rd.y+6);X.stroke();
    }
  }
  
  if(bloodMoonActive){
    const pulse=Math.sin(timer*.05)*.05+.08;
    X.fillStyle=`rgba(139,0,0,${pulse})`;X.fillRect(camX,camY,W,H);
  }
  if(nightAlpha>.3){
    X.fillStyle=`rgba(0,0,20,${nightAlpha*.25})`;X.fillRect(camX,camY,W,H);
  }
  if(weather==='fog'){
    X.fillStyle=`rgba(100,100,120,.15)`;X.fillRect(camX,camY,W,H);
  }
  X.restore();
  renderMinimap();
}

function renderMinimap(){
  const s=120/WORLD;
  MX.fillStyle='#0a0a12';MX.fillRect(0,0,120,120);
  MX.fillStyle='#222';
  for(const b of buildings)MX.fillRect(b.x*s,b.y*s,Math.max(1,b.w*s),Math.max(1,b.h*s));
  MX.fillStyle='rgba(255,221,68,.3)';
  for(const sz of sanctifiedZones){MX.beginPath();MX.arc(sz.x*s,sz.y*s,sz.r*s,0,Math.PI*2);MX.fill();}
  MX.fillStyle='rgba(255,100,50,.4)';
  for(const gp of guardPosts){MX.beginPath();MX.arc(gp.x*s,gp.y*s,gp.patrolRadius*s,0,Math.PI*2);MX.stroke();}
  MX.fillStyle='#ff4444';
  for(const h of humans){if(h.alert)MX.fillRect(h.x*s-1,h.y*s-1,2,2);}
  MX.fillStyle='#dc143c';
  for(const bp of bloodPools)MX.fillRect(bp.x*s-2,bp.y*s-2,4,4);
  MX.fillStyle='#9b30ff';MX.fillRect(P.x*s-2,P.y*s-2,4,4);
  MX.strokeStyle='rgba(255,255,255,.3)';MX.lineWidth=1;
  MX.strokeRect(camX*s,camY*s,W*s,H*s);
}

function updateUI(){
  const bp=Math.max(0,P.blood/P.maxBlood*100);
  document.getElementById('blood-fill').style.width=bp+'%';
  document.getElementById('blood-text').textContent=Math.ceil(P.blood)+'/'+P.maxBlood;
  const xp=Math.min(100,P.xp/P.xpNext*100);
  document.getElementById('xp-fill').style.width=xp+'%';
  document.getElementById('xp-text').textContent=Math.floor(P.xp)+'/'+P.xpNext;
  const dp=P.dashCDNow<=0?100:(1-P.dashCDNow/P.dashMax)*100;
  document.getElementById('dash-fill').style.width=dp+'%';
  document.getElementById('dash-text').textContent=P.dashCDNow<=0?'Ready':'...';
  document.getElementById('level').textContent=P.level;
  document.getElementById('kills').textContent=kills;
  document.getElementById('timer').textContent=formatTime(timer);
  let threatCount=0;
  for(const h of humans){if(dist(h,P)<250)threatCount++;}
  const threatPct=Math.min(100,threatCount*12);
  document.getElementById('threat-fill').style.width=threatPct+'%';
  let inDistrict=null;
  for(const d of districts){if(dist(P,d)<d.r){inDistrict=d;break;}}
  const dl=document.getElementById('district-label');
  if(inDistrict){dl.textContent='📍 '+inDistrict.name;dl.classList.add('show');}
  else dl.classList.remove('show');
  const pi=document.getElementById('phase-info');
  const phaseNames=['','Dawn Patrol','Organized Defense','Hunter\'s Moon','Silver Crusade','Final Stand'];
  pi.textContent='Phase '+phase+' — '+phaseNames[phase]+' | Difficulty: '+difficulty.toFixed(1);
  pi.classList.add('show');
}

function formatTime(t){const s=Math.floor(t/60);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

function showMsg(title,sub){
  const el=document.getElementById('center-msg');
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=sub;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function showPhaseBanner(p){
  const names=['','Phase 1: Dawn Patrol','Phase 2: Organized Defense','Phase 3: Hunter\'s Moon','Phase 4: Silver Crusade','Phase 5: Final Stand'];
  const el=document.getElementById('phase-banner');
  el.textContent='⚔ '+names[p]+' ⚔';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function saveScore(){
  let scores=JSON.parse(localStorage.getItem('vampireSurvivalScores')||'[]');
  scores.push({time:timer,kills,level,date:new Date().toLocaleDateString()});
  scores.sort((a,b)=>b.time-a.time);
  scores=scores.slice(0,5);
  localStorage.setItem('vampireSurvivalScores',JSON.stringify(scores));
  renderLeaderboard();
}

function renderLeaderboard(){
  const scores=JSON.parse(localStorage.getItem('vampireSurvivalScores')||'[]');
  const el=document.getElementById('lb-entries');
  if(!scores.length){el.innerHTML='<div class="entry" style="color:#666">No scores yet</div>';return;}
  el.innerHTML=scores.map((s,i)=>`<div class="entry">${i+1}. <span>${formatTime(s.time)}</span> <span>💀${s.kills}</span></div>`).join('');
}
renderLeaderboard();

function startGame(){
  started=1;gameOver=0;timer=0;kills=0;difficulty=1;phase=1;
  P.x=WORLD/2;P.y=WORLD/2;P.blood=P.maxBlood;P.xp=0;P.level=1;P.xpNext=100;
  P.feedRate=2;P.speed=3.2;P.dashCDNow=0;P.dashing=0;P.invuln=0;
  humans=[];particles=[];bloodPools=[];rainDrops=[];dmgNums=[];
  bloodMoonTimer=0;bloodMoonActive=0;spawnTimer=0;
  dayNight=.3;weather='clear';weatherTimer=0;weatherDuration=600;
  genWorld();
  showMsg('VAMPIRE SURVIVAL','WASD move · Click to feed · Space to dash');
}

function loop(){
  if(!started){
    X.fillStyle='#0a0a12';X.fillRect(0,0,W,H);
    for(let i=0;i<30;i++){
      const px=(Math.sin(timer*.005+i*1.3)*.5+.5)*W;
      const py=(Math.cos(timer*.003+i*.9)*.5+.5)*H;
      X.fillStyle=`rgba(139,0,0,${.1+Math.sin(timer*.01+i)*.05})`;
      X.beginPath();X.arc(px,py,2+Math.sin(timer*.02+i)*1,0,Math.PI*2);X.fill();
    }
    X.fillStyle='#dc143c';X.font='bold 42px monospace';X.textAlign='center';
    X.fillText('VAMPIRE SURVIVAL',W/2,H/2-100);
    X.fillStyle='#9b30ff';X.font='14px monospace';
    X.fillText('Iteration 13 — Guard Posts, Dynamic Spawns & Phase Progression',W/2,H/2-65);
    X.fillStyle='#888';X.font='12px monospace';
    X.fillText('WASD/Arrows: Move  |  Click: Feed  |  Space/Shift: Dash',W/2,H/2-15);
    X.fillText('Keep blood above zero. Humans roam, patrol, investigate & hunt.',W/2,H/2+7);
    X.fillText('Avoid sanctified zones (golden circles). Watch the threat meter!',W/2,H/2+27);
    X.fillStyle='#dc143c';X.font='bold 16px monospace';
    const blink=Math.sin(timer*.06)*.3+.7;
    X.globalAlpha=blink;
    X.fillText('[ Click to Start ]',W/2,H/2+70);
    X.globalAlpha=1;
    X.textAlign='left';
    if(clicking){startGame();clicking=0;}
  }else{
    update();
    render();
    if(gameOver){
      X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,0,W,H);
      X.fillStyle='#dc143c';X.font='bold 40px monospace';X.textAlign='center';
      X.fillText('GAME OVER',W/2,H/2-30);
      X.fillStyle='#aaa';X.font='15px monospace';
      X.fillText('Survived: '+formatTime(timer)+'  |  Kills: '+kills+'  |  Level: '+P.level,W/2,H/2+10);
      X.fillStyle='#888';X.font='13px monospace';
      X.fillText('Click to restart',W/2,H/2+45);
      X.textAlign='left';
      if(clicking){startGame();clicking=0;}
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
