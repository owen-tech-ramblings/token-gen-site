<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Gen Chat</title>
    <link rel="stylesheet" href="./styles.css?v=token-chat-image-download-upload-20260702" />
  </head>
  <body>
    <main class="chat-app">
      <header class="chat-header">
        <div>
          <h1>Chat</h1>
          <p class="server-status-line" id="chatStatus">Connecting to Token Gen...</p>
        </div>
        <nav class="server-header-actions" aria-label="Token Gen navigation">
          <a class="btn" href="./">Home</a>
          <a class="btn" href="./server-monitor.html">Monitor</a>
          <a class="btn btn-active" href="./chat.html">Chat</a>
          <a class="btn" href="./games/">Games</a>
        </nav>
      </header>

      <section class="chat-shell" aria-label="Token Gen chat workspace">
        <aside class="chat-sidebar">
          <div class="chat-control">
            <label class="label" for="chatMode">Mode</label>
            <select id="chatMode">
              <option value="chat">Chat</option>
              <option value="auto" selected>Auto</option>
              <option value="image">Image</option>
            </select>
          </div>
          <div class="chat-control">
            <label class="label" for="chatModel">Model</label>
            <select id="chatModel"></select>
          </div>
          <div class="chat-control">
            <label class="label" for="chatSystem">System prompt</label>
            <textarea id="chatSystem" rows="5">You are Token Gen, a local vLLM assistant. Be concise, practical, and direct.</textarea>
          </div>
          <div class="chat-control-grid">
            <label class="label" for="chatTemperature">Temperature</label>
            <input id="chatTemperature" class="input" type="number" min="0" max="2" step="0.1" value="0.3" />
            <label class="label" for="chatMaxTokens">Max tokens</label>
            <input id="chatMaxTokens" class="input" type="number" min="32" max="131000" step="1000" value="20000" />
          </div>
          <label class="chat-toggle">
            <input id="chatReasoning" type="checkbox" />
            <span>Show reasoning mode</span>
          </label>
          <section class="chat-doc-panel" aria-label="Document context settings">
            <div class="chat-doc-head">
              <div>
                <span class="label">Document context</span>
                <p class="chat-web-note" id="chatDocStatus">No documents attached.</p>
              </div>
              <button class="btn" id="chatDocClear" type="button">Clear</button>
            </div>
            <div class="chat-control-grid">
              <label class="label" for="chatDocBudget">Context share</label>
              <input id="chatDocBudget" class="input" type="number" min="30" max="75" step="5" value="30" />
            </div>
            <div class="chat-doc-meter" aria-label="Document context budget">
              <span id="chatDocMeter"></span>
            </div>
          </section>
          <section class="chat-web-panel" aria-label="Web context settings">
            <label class="chat-toggle">
              <input id="chatWebSearch" type="checkbox" />
              <span>Use Tavily web context</span>
            </label>
            <p class="chat-web-note" id="chatWebStatus">Checking Token Gen API web-search support...</p>
            <div class="chat-control-grid">
              <label class="label" for="chatWebFetchMode">Fetch mode</label>
              <select id="chatWebFetchMode">
                <option value="tor">Tor</option>
                <option value="proxy">Proxy</option>
                <option value="direct">Direct</option>
              </select>
              <label class="label" for="chatWebResults">Results</label>
              <input id="chatWebResults" class="input" type="number" min="1" max="10" step="1" value="5" />
              <label class="label" for="chatWebBudget">Context budget</label>
              <input id="chatWebBudget" class="input" type="number" min="500" max="10000" step="500" value="10000" />
            </div>
          </section>
          <section class="chat-image-panel" aria-label="Image generation settings">
            <div>
              <span class="label">Image generation</span>
              <p class="chat-web-note" id="chatImageStatus">Checking image service...</p>
            </div>
            <div class="chat-control-grid">
              <label class="label" for="chatImageSourceMode">Source</label>
              <select id="chatImageSourceMode">
                <option value="new" selected>Create new</option>
                <option value="edit">Edit selected/uploaded</option>
                <option value="style">Use uploaded style</option>
              </select>
              <label class="label" for="chatImageSize">Size</label>
              <select id="chatImageSize">
                <option value="512">512 x 512</option>
                <option value="768">768 x 768</option>
                <option value="1024" selected>1024 x 1024</option>
              </select>
              <label class="label" for="chatImageQuality">Quality</label>
              <select id="chatImageQuality">
                <option value="draft">Draft</option>
                <option value="standard" selected>Standard</option>
                <option value="high">High</option>
              </select>
              <label class="label" for="chatImageSamples">Samples</label>
              <input id="chatImageSamples" class="input" type="number" min="1" max="4" step="1" value="1" />
              <label class="label" for="chatImageStyle">Style</label>
              <select id="chatImageStyle">
                <option value="none" selected>None</option>
                <option value="photorealistic">Photorealistic</option>
                <option value="pencil">Pencil drawing</option>
                <option value="van-gogh">Van Gogh</option>
                <option value="comic">Comic</option>
                <option value="manga">Manga</option>
                <option value="futuristic">Futuristic</option>
              </select>
              <label class="label" for="chatImageOrientation">Orientation</label>
              <select id="chatImageOrientation">
                <option value="square" selected>Square</option>
                <option value="portrait">Portrait</option>
                <option value="landscape">Landscape</option>
              </select>
              <label class="label" for="chatImageContentFilter">Content</label>
              <select id="chatImageContentFilter">
                <option value="kid">Kid friendly</option>
                <option value="normal" selected>Normal</option>
                <option value="adult">Adult 18+ ok</option>
              </select>
            </div>
            <label class="chat-image-upload" for="chatImageUpload">
              <span>Upload PNG/JPG</span>
              <input id="chatImageUpload" type="file" accept="image/png,image/jpeg" />
            </label>
            <div class="chat-image-source-preview" id="chatImageSourcePreview"></div>
          </section>
          <button class="btn" id="chatClear" type="button">New chat</button>
        </aside>

        <section class="chat-main">
          <div class="chat-thread" id="chatThread" aria-live="polite"></div>
          <form class="chat-composer" id="chatForm">
            <div class="chat-input-shell">
              <label class="chat-attach-button" for="chatDocuments" title="Attach documents">
                <span aria-hidden="true">+</span>
                <input
                  id="chatDocuments"
                  type="file"
                  multiple
                  accept=".txt,.md,.markdown,.csv,.json,.jsonl,.html,.htm,.xml,.yaml,.yml,.log,.pdf,.docx,.rtf,.js,.ts,.tsx,.jsx,.py,.ps1,.sh,.sql,.css"
                />
              </label>
              <div class="chat-doc-list" id="chatDocList"></div>
              <textarea id="chatInput" rows="1" placeholder="Message Token Gen"></textarea>
            </div>
            <button class="btn btn-active" id="chatSend" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script type="module" src="./chat.js?v=token-chat-image-edit-size-20260702"></script>
  </body>
</html>
